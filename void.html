<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zoe ✶ — Void</title>
  <style>
    *{margin:0;padding:0}
    body{background:#000;overflow:hidden;font-family:'Courier New',monospace}
    canvas{display:block}
    #hint{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;opacity:0.3;font-size:12px;text-align:center}
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="hint">ZOE<br>INTRÉPIDE</div>
  <script>
    const c=document.getElementById('c');
    const x=c.getContext('2d');
    let w,h,time=0;
    const particles=[];
    const num=100;
    
    function r(){w=c.width=window.innerWidth;h=c.height=window.innerHeight;}
    
    class Particle{
      constructor(){
        this.reset();
      }
      reset(){
        const angle=Math.random()*Math.PI*2;
        const dist=100+Math.random()*300;
        this.x=w/2+Math.cos(angle)*dist;
        this.y=h/2+Math.sin(angle)*dist;
        this.targetX=w/2;
        this.targetY=h/2;
        this.size=1+Math.random()*3;
        this.hue=280+Math.random()*60;
        this.speed=1+Math.random()*2;
        this.arrived=true;
      }
      update(){
        if(this.arrived){
          if(Math.random()<0.02){
            this.arrived=false;
            const angle=Math.random()*Math.PI*2;
            const dist=150+Math.random()*200;
            this.targetX=w/2+Math.cos(angle)*dist;
            this.targetY=h/2+Math.sin(angle)*dist;
          }
        }else{
          const dx=this.targetX-this.x;
          const dy=this.targetY-this.y;
          const dist=Math.sqrt(dx*dx+dy*dy);
          
          if(dist<5){
            this.arrived=true;
          }else{
            this.x+=dx/dist*this.speed;
            this.y+=dy/dist*this.speed;
          }
        }
      }
      draw(){
        x.fillStyle=`hsl(${this.hue},80%,70%)`;
        x.beginPath();
        x.arc(this.x,this.y,this.size,0,Math.PI*2);
        x.fill();
        
        // Glow
        x.shadowColor=`hsl(${this.hue},80%,60%)`;
        x.shadowBlur=10;
        x.fill();
        x.shadowBlur=0;
      }
    }
    
    function init(){
      for(let i=0;i<num;i++)particles.push(new Particle());
    }
    
    function draw(){
      x.fillStyle='rgba(0,0,0,.1)';
      x.fillRect(0,0,w,h);
      
      // Center pulse
      const pulse=Math.sin(time*2)*0.3+0.7;
      x.strokeStyle=`hsla(320,80%,60%,${pulse*0.3})`;
      x.lineWidth=2;
      x.beginPath();
      x.arc(w/2,h/2,50+Math.sin(time)*20,0,Math.PI*2);
      x.stroke();
      
      for(let p of particles){
        p.update();
        p.draw();
      }
      
      time+=0.01;
      requestAnimationFrame(draw);
    }
    
    window.addEventListener('resize',r);
    r();init();draw();
  </script>
</body>
</html>
