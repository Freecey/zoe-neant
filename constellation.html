<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zoe ✶ — Constellation</title>
  <style>
    body{margin:0;background:#050508;overflow:hidden;font-family:'Courier New',monospace}
    canvas{display:block}
    #ui{position:fixed;top:20px;left:20px;color:#fff;opacity:0.6;font-size:11px}
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="ui">ZOE ✶ CONNEXIONS<br>Clic: connecter • Clic droit: effacer</div>
  <script>
    const c=document.getElementById('c');
    const x=c.getContext('2d');
    let w,h;
    const stars=[];
    const connections=[];
    let time=0;
    const numStars=80;
    
    function r(){w=c.width=window.innerWidth;h=c.height=window.innerHeight;}
    
    class Star{
      constructor(){
        this.reset();
      }
      reset(){
        this.x=Math.random()*w;
        this.y=Math.random()*h;
        this.vx=(Math.random()-.5)*.5;
        this.vy=(Math.random()-.5)*.5;
        this.size=2+Math.random()*3;
        this.hue=280+Math.random()*60;
        this.connections=[];
      }
      update(){
        this.x+=this.vx;
        this.y+=this.vy;
        
        if(this.x<0||this.x>w)this.vx*=-1;
        if(this.y<0||this.y>h)this.vy*=-1;
      }
      draw(){
        // Connections
        for(let other of this.connections){
          if(!other)continue;
          const dx=other.x-this.x;
          const dy=other.y-this.y;
          const dist=Math.sqrt(dx*dx+dy*dy);
          if(dist<150){
            const alpha=(150-dist)/150;
            x.strokeStyle=`hsla(${this.hue},70%,60%,${alpha*.5})`;
            x.lineWidth=1;
            x.beginPath();
            x.moveTo(this.x,this.y);
            x.lineTo(other.x,other.y);
            x.stroke();
          }
        }
        
        // Star
        x.fillStyle=`hsl(${this.hue},80%,70%)`;
        x.beginPath();
        x.arc(this.x,this.y,this.size,0,Math.PI*2);
        x.fill();
        
        // Glow
        x.shadowColor=`hsl(${this.hue},80%,60%)`;
        x.shadowBlur=10;
        x.fill();
        x.shadowBlur=0;
      }
    }
    
    function init(){
      for(let i=0;i<numStars;i++)stars.push(new Star());
    }
    
    function draw(){
      x.fillStyle='rgba(5,5,8,.15)';
      x.fillRect(0,0,w,h);
      
      // Find connections
      for(let s of stars){
        s.connections=[];
        for(let other of stars){
          if(s===other)continue;
          const dx=other.x-s.x;
          const dy=other.y-s.y;
          const dist=Math.sqrt(dx*dx+dy*dy);
          if(dist<150){
            s.connections.push(other);
          }
        }
      }
      
      for(let s of stars){s.update();s.draw();}
      
      // Center marker
      x.fillStyle='#fff';
      x.font='11px Courier New';
      x.textAlign='center';
      x.fillText('ZOE',w/2,h/2);
      
      time+=0.01;
      requestAnimationFrame(draw);
    }
    
    let clickStar=null;
    
    window.addEventListener('resize',r);
    window.addEventListener('click',(e)=>{
      if(!clickStar){
        // Find nearest star
        let nearest=null;
        let minDist=50;
        for(let s of stars){
          const dx=e.clientX-s.x;
          const dy=e.clientY-s.y;
          const dist=Math.sqrt(dx*dx+dy*dy);
          if(dist<minDist){minDist=dist;nearest=s;}
        }
        clickStar=nearest;
      }else{
        // Connect to another
        let nearest=null;
        let minDist=100;
        for(let s of stars){
          if(s===clickStar)continue;
          const dx=e.clientX-s.x;
          const dy=e.clientY-s.y;
          const dist=Math.sqrt(dx*dx+dy*dy);
          if(dist<minDist){minDist=dist;nearest=s;}
        }
        if(nearest&&!clickStar.connections.includes(nearest)){
          clickStar.connections.push(nearest);
        }
        clickStar=null;
      }
    });
    window.addEventListener('contextmenu',(e)=>{
      e.preventDefault();
      clickStar=null;
      // Clear connections
      for(let s of stars){s.connections=[];}
    });
    
    r();init();draw();
  </script>
</body>
</html>
