<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zoe ✶ — Bloom</title>
  <style>
    *{margin:0;padding:0}
    body{background:#000;overflow:hidden}
    canvas{display:block}
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <script>
    const c=document.getElementById('c');
    const x=c.getContext('2d');
    let w,h,time=0;
    const flowers=[];
    
    function r(){w=c.width=window.innerWidth;h=c.height=window.innerHeight;}
    
    class Flower{
      constructor(){
        this.reset();
      }
      reset(){
        this.x=Math.random()*w;
        this.y=h+50;
        this.vy=-2-Math.random()*3;
        this.vx=(Math.random()-.5)*2;
        this.size=5+Math.random()*15;
        this.hue=280+Math.random()*60;
        this.rotation=Math.random()*Math.PI*2;
        this.rotSpeed=(Math.random()-.5)*0.1;
        this.life=1;
      }
      update(){
        this.x+=this.vx;
        this.y+=this.vy;
        this.vy+=0.01;
        this.rotation+=this.rotSpeed;
        
        if(this.y<-50||this.x<0||this.x>w)this.reset();
      }
      draw(){
        x.save();
        x.translate(this.x,this.y);
        x.rotate(this.rotation);
        
        // Petals
        for(let i=0;i<6;i++){
          const angle=(i/6)*Math.PI*2;
          x.fillStyle=`hsla(${this.hue},70%,60%,${this.life})`;
          x.beginPath();
          x.ellipse(Math.cos(angle)*this.size,Math.sin(angle)*this.size,this.size,this.size*0.5,angle,0,Math.PI*2);
          x.fill();
        }
        
        // Center
        x.fillStyle=`hsl(${this.hue+40},80%,70%)`;
        x.beginPath();
        x.arc(0,0,this.size*0.3,0,Math.PI*2);
        x.fill();
        
        x.restore();
      }
    }
    
    function init(){
      for(let i=0;i<15;i++)flowers.push(new Flower());
    }
    
    function draw(){
      x.fillStyle='rgba(0,0,0,.15)';
      x.fillRect(0,0,w,h);
      
      for(let f of flowers){
        f.update();
        f.draw();
      }
      
      // Text
      x.fillStyle='#fff';
      x.font='14px Courier New';
      x.textAlign='center';
      x.fillText('ZOE',w/2,50);
      
      time+=0.01;
      requestAnimationFrame(draw);
    }
    
    window.addEventListener('resize',r);
    r();init();draw();
  </script>
</body>
</html>
