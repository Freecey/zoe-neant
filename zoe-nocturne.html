<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zoe ✶ — Nocturne</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #000;
}

canvas {
  display: block;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
}

#title {
  position: fixed;
  top: 36px; left: 40px;
  z-index: 10;
  font-family: 'Segoe UI', 'Helvetica Neue', 'Arial', sans-serif;
  font-size: 22px;
  font-weight: 300;
  letter-spacing: 3px;
  color: rgba(180, 210, 240, 0.45);
  text-shadow:
    0 0 12px rgba(100, 160, 255, 0.25),
    0 0 40px rgba(100, 160, 255, 0.10);
  pointer-events: none;
  user-select: none;
}
</style>
</head>
<body>
<div id="title">Zoe ✶ — Nocturne</div>
<canvas id="canvas"></canvas>
<script>
(() => {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  let W, H;
  const PARTICLE_COUNT = 200;
  const CONNECTION_DIST = 130;
  const MOUSE_RADIUS = 200;
  const MOUSE_STRENGTH = 0.00035;
  const FRICTION = 0.998;
  const EPS = 0.01;

  // Color palette: deep blues, cyans, purples, occasional warm gold
  const PALETTE = [
    { r: 30,  g: 80,  b: 180 },  // deep blue
    { r: 50,  g: 120, b: 220 },  // medium blue
    { r: 60,  g: 180, b: 230 },  // cyan
    { r: 80,  g: 200, b: 240 },  // light cyan
    { r: 100, g: 140, b: 220 },  // blue-purple
    { r: 140, g: 100, b: 210 },  // soft purple
    { r: 170, g: 120, b: 220 },  // lavender
    { r: 120, g: 160, b: 255 },  // periwinkle
    { r: 255, g: 200, b: 60  },  // warm gold (accent)
    { r: 255, g: 170, b: 50  },  // amber accent
  ];

  // Gold appears ~10% of the time
  function randomColor() {
    const roll = Math.random();
    if (roll < 0.10) {
      return PALETTE[8 + Math.floor(Math.random() * 2)];
    }
    return PALETTE[Math.floor(Math.random() * 8)];
  }

  let mouse = { x: -9999, y: -9999, active: false };

  function resize() {
    const dpr = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    generateStars();
  }

  // Stars (static background)
  let stars = [];
  function generateStars() {
    stars = [];
    const count = Math.floor((W * H) / 3000);
    for (let i = 0; i < count; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.1 + 0.2,
        opacity: Math.random() * 0.5 + 0.15,
        twinkleSpeed: Math.random() * 0.008 + 0.002,
        twinkleOffset: Math.random() * Math.PI * 2,
      });
    }
  }

  // Particles
  class Particle {
    constructor() {
      this.reset();
    }
    reset() {
      this.x = Math.random() * W;
      this.y = Math.random() * H;
      this.vx = (Math.random() - 0.5) * 0.4;
      this.vy = (Math.random() - 0.5) * 0.4;
      this.baseRadius = Math.random() * 2.5 + 1.0;
      this.color = randomColor();
      this.baseOpacity = Math.random() * 0.45 + 0.35;
      this.pulseSpeed = Math.random() * 0.015 + 0.008;
      this.pulseOffset = Math.random() * Math.PI * 2;
      this.phase = this.pulseOffset;
    }
    update(time) {
      this.phase += this.pulseSpeed;

      // Mouse attraction
      if (mouse.active) {
        const dx = mouse.x - this.x;
        const dy = mouse.y - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || EPS;
        if (dist < MOUSE_RADIUS) {
          const force = MOUSE_STRENGTH * (MOUSE_RADIUS - dist);
          this.vx += (dx / dist) * force;
          this.vy += (dy / dist) * force;
        }
      }

      this.vx *= FRICTION;
      this.vy *= FRICTION;
      this.x += this.vx;
      this.y += this.vy;

      // Wrap around edges with margin
      const m = 30;
      if (this.x < -m) this.x = W + m;
      if (this.x > W + m) this.x = -m;
      if (this.y < -m) this.y = H + m;
      if (this.y > H + m) this.y = -m;
    }
    draw(time) {
      const pulse = Math.sin(this.phase) * 0.3 + 0.7;
      const radius = Math.max(EPS, this.baseRadius * (0.85 + pulse * 0.3));
      const opacity = this.baseOpacity * (0.7 + pulse * 0.3);
      const { r, g, b } = this.color;

      // Outer glow
      const glowRadius = radius * 5;
      const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, glowRadius);
      grad.addColorStop(0, `rgba(${r},${g},${b},${(opacity * 0.5).toFixed(3)})`);
      grad.addColorStop(0.3, `rgba(${r},${g},${b},${(opacity * 0.15).toFixed(3)})`);
      grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
      ctx.beginPath();
      ctx.arc(this.x, this.y, glowRadius, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();

      // Core
      const coreGrad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, radius);
      coreGrad.addColorStop(0, `rgba(${Math.min(255, r + 80)},${Math.min(255, g + 80)},${Math.min(255, b + 80)},${opacity.toFixed(3)})`);
      coreGrad.addColorStop(1, `rgba(${r},${g},${b},${(opacity * 0.2).toFixed(3)})`);
      ctx.beginPath();
      ctx.arc(this.x, this.y, radius, 0, Math.PI * 2);
      ctx.fillStyle = coreGrad;
      ctx.fill();
    }
  }

  let particles = [];
  function initParticles() {
    particles = [];
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      particles.push(new Particle());
    }
  }

  // Draw background gradient
  function drawBackground() {
    const grad = ctx.createRadialGradient(W * 0.5, H * 0.4, 0, W * 0.5, H * 0.5, Math.max(W, H) * 0.75);
    grad.addColorStop(0, '#0a0e1a');
    grad.addColorStop(0.5, '#060a14');
    grad.addColorStop(1, '#020308');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }

  // Draw stars
  function drawStars(time) {
    for (const s of stars) {
      const twinkle = Math.sin(time * s.twinkleSpeed + s.twinkleOffset) * 0.3 + 0.7;
      const op = s.opacity * twinkle;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200,220,255,${op.toFixed(3)})`;
      ctx.fill();
    }
  }

  // Draw connections between close particles
  function drawConnections() {
    ctx.lineWidth = 0.6;
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < CONNECTION_DIST) {
          const alpha = (1 - dist / CONNECTION_DIST) * 0.18;
          const ci = particles[i].color;
          const cj = particles[j].color;
          const mr = Math.round((ci.r + cj.r) / 2);
          const mg = Math.round((ci.g + cj.g) / 2);
          const mb = Math.round((ci.b + cj.b) / 2);
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(${mr},${mg},${mb},${alpha.toFixed(3)})`;
          ctx.stroke();
        }
      }
    }
  }

  // Draw mouse glow
  function drawMouseGlow(time) {
    if (!mouse.active) return;
    const pulse = Math.sin(time * 0.003) * 0.15 + 0.85;
    const radius = 180 * pulse;
    const grad = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, radius);
    grad.addColorStop(0, `rgba(100,170,255,${(0.08 * pulse).toFixed(3)})`);
    grad.addColorStop(0.3, `rgba(80,140,220,${(0.04 * pulse).toFixed(3)})`);
    grad.addColorStop(0.6, `rgba(120,100,200,${(0.015 * pulse).toFixed(3)})`);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.arc(mouse.x, mouse.y, radius, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // Inner bright point
    const innerGrad = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 8);
    innerGrad.addColorStop(0, `rgba(180,210,255,${(0.15 * pulse).toFixed(3)})`);
    innerGrad.addColorStop(1, 'rgba(180,210,255,0)');
    ctx.beginPath();
    ctx.arc(mouse.x, mouse.y, 8, 0, Math.PI * 2);
    ctx.fillStyle = innerGrad;
    ctx.fill();
  }

  // Main animation loop
  let startTime = performance.now();
  function animate(timestamp) {
    const time = timestamp - startTime;

    drawBackground();
    drawStars(time);
    drawConnections();
    drawMouseGlow(time);

    for (const p of particles) {
      p.update(time);
      p.draw(time);
    }

    requestAnimationFrame(animate);
  }

  // Events
  window.addEventListener('resize', () => {
    resize();
  });

  window.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
    mouse.active = true;
  });

  window.addEventListener('mouseleave', () => {
    mouse.active = false;
  });

  window.addEventListener('touchmove', (e) => {
    if (e.touches.length > 0) {
      mouse.x = e.touches[0].clientX;
      mouse.y = e.touches[0].clientY;
      mouse.active = true;
    }
  }, { passive: true });

  window.addEventListener('touchend', () => {
    mouse.active = false;
  });

  // Initialize
  resize();
  initParticles();
  requestAnimationFrame(animate);
})();
</script>
</body>
</html>
