<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌿 Zoe's Midnight Garden</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a12; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="garden"></canvas>
<script>
const canvas = document.getElementById('garden');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Flower class
class Flower {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.petals = 5 + Math.floor(Math.random() * 4);
    this.size = 8 + Math.random() * 25;
    this.hue = Math.random() * 360;
    this.rotation = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 0.005;
    this.alpha = 0;
    this.targetAlpha = 0.3 + Math.random() * 0.7;
    this.pulse = Math.random() * Math.PI * 2;
    this.pulseSpeed = 0.01 + Math.random() * 0.03;
    this.layers = 1 + Math.floor(Math.random() * 3);
  }

  update() {
    this.rotation += this.rotSpeed;
    this.pulse += this.pulseSpeed;
    if (this.alpha < this.targetAlpha) this.alpha += 0.005;
  }

  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    ctx.globalAlpha = this.alpha;

    for (let layer = this.layers; layer >= 1; layer--) {
      const layerSize = this.size * (layer / this.layers) * (1 + 0.08 * Math.sin(this.pulse));
      const layerHue = (this.hue + layer * 25) % 360;
      const sat = 60 + layer * 10;
      const light = 50 + layer * 8;

      for (let i = 0; i < this.petals; i++) {
        const angle = (i / this.petals) * Math.PI * 2;
        const px = Math.cos(angle) * layerSize * 0.4;
        const py = Math.sin(angle) * layerSize * 0.4;

        ctx.beginPath();
        ctx.ellipse(px, py, layerSize * 0.45, layerSize * 0.22, angle, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${layerHue}, ${sat}%, ${light}%, 0.7)`;
        ctx.fill();
      }
    }

    // center
    ctx.beginPath();
    ctx.arc(0, 0, this.size * 0.12, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${(this.hue + 60) % 360}, 80%, 70%, 0.9)`;
    ctx.fill();

    ctx.restore();
  }
}

// Firefly class
class Firefly {
  constructor() {
    this.reset();
  }
  reset() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.vx = (Math.random() - 0.5) * 0.5;
    this.vy = (Math.random() - 0.5) * 0.5;
    this.size = 1 + Math.random() * 2;
    this.phase = Math.random() * Math.PI * 2;
    this.speed = 0.02 + Math.random() * 0.04;
    this.hue = 40 + Math.random() * 30; // warm yellow-green
  }
  update() {
    this.phase += this.speed;
    this.x += this.vx;
    this.y += this.vy;
    if (this.x < -20 || this.x > W + 20 || this.y < -20 || this.y > H + 20) this.reset();
  }
  draw() {
    const glow = 0.3 + 0.7 * Math.abs(Math.sin(this.phase));
    ctx.save();
    ctx.globalAlpha = glow;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${this.hue}, 90%, 70%, 1)`;
    ctx.shadowColor = `hsla(${this.hue}, 90%, 70%, 0.8)`;
    ctx.shadowBlur = 15;
    ctx.fill();
    ctx.restore();
  }
}

// Create garden
const flowers = [];
for (let i = 0; i < 35; i++) {
  flowers.push(new Flower(
    60 + Math.random() * (W - 120),
    60 + Math.random() * (H - 120)
  ));
}

const fireflies = [];
for (let i = 0; i < 60; i++) {
  fireflies.push(new Firefly());
}

// Draw trailing stems connecting some flowers
function drawStems() {
  ctx.save();
  ctx.globalAlpha = 0.15;
  ctx.strokeStyle = 'hsla(120, 40%, 30%, 1)';
  ctx.lineWidth = 1;

  for (let i = 0; i < flowers.length - 1; i++) {
    if (Math.random() > 0.4) continue;
    const a = flowers[i];
    const b = flowers[i + 1];
    const dist = Math.hypot(a.x - b.x, a.y - b.y);
    if (dist > 250) continue;

    ctx.beginPath();
    const mx = (a.x + b.x) / 2 + (Math.random() - 0.5) * 40;
    const my = (a.y + b.y) / 2 + (Math.random() - 0.5) * 40;
    ctx.moveTo(a.x, a.y);
    ctx.quadraticCurveTo(mx, my, b.x, b.y);
    ctx.stroke();
  }
  ctx.restore();
}

function animate() {
  // Slow fade instead of full clear — dreamy trail effect
  ctx.fillStyle = 'rgba(10, 10, 18, 0.15)';
  ctx.fillRect(0, 0, W, H);

  drawStems();

  for (const f of flowers) {
    f.update();
    f.draw();
  }
  for (const ff of fireflies) {
    ff.update();
    ff.draw();
  }

  requestAnimationFrame(animate);
}

// initial fill
ctx.fillStyle = '#0a0a12';
ctx.fillRect(0, 0, W, H);
animate();
</script>
</body>
</html>
