<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matin</title>
  <script>p5.disableFriendlyErrors = true;</script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #0a0a12; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// === Matin — a meditation on morning silence ===
// Soft particles drifting through layered fog fields

const CONFIG = {
  particleCount: 2800,
  fogLayers: 5,
  seed: 7,
  baseHue: 215,       // deep blue-grey
  accentHue: 25,      // warm dawn gold-rose
  driftSpeed: 0.0003,
  breathSpeed: 0.0008,
};

const PALETTE = {
  bgTop: null,      // set in setup
  bgBot: null,
  fogColors: [],
};

let particles = [];
let fogBuffers = [];
let globalTime = 0;

// Multi-octave noise
function fbm(x, y, octaves = 4) {
  let val = 0, amp = 1, freq = 1, sum = 0;
  for (let i = 0; i < octaves; i++) {
    val += noise(x * freq, y * freq) * amp;
    sum += amp;
    amp *= 0.5;
    freq *= 2.0;
  }
  return val / sum;
}

// Domain-warped noise for organic fog shapes
function warpedNoise(x, y, t) {
  let nx = fbm(x + t * 0.3, y, 3);
  let ny = fbm(x, y + t * 0.2, 3);
  return fbm(x + nx * 1.5, y + ny * 1.5, 4);
}

class FogParticle {
  constructor() {
    this.reset(true);
  }

  reset(initial = false) {
    this.x = Math.random() * (width || 1920);
    this.y = Math.random() * (height || 1080);
    this.size = Math.random() * 80 + 20;
    this.baseAlpha = Math.random() * 12 + 3;
    this.speedMult = Math.random() * 0.6 + 0.2;
    this.depth = Math.random(); // 0=far, 1=near
    this.hueOffset = (Math.random() - 0.5) * 20;
    this.phase = Math.random() * Math.PI * 2;
    this.life = 0;
    this.maxLife = Math.random() * 3000 + 1500;
    if (initial) {
      this.life = Math.random() * this.maxLife;
    }
  }

  update(t) {
    // Drift via noise field
    let nx = this.x * 0.002;
    let ny = this.y * 0.002;
    let angle = warpedNoise(nx, ny, t * CONFIG.driftSpeed) * Math.PI * 4;
    
    let speed = CONFIG.driftSpeed * this.speedMult * (200 + this.depth * 100);
    this.x += Math.cos(angle) * speed;
    this.y += Math.sin(angle) * speed * 0.4 - 0.02; // slight upward drift

    // Breathing alpha
    let breathFactor = 0.5 + 0.5 * Math.sin(t * CONFIG.breathSpeed + this.phase);
    this.currentAlpha = this.baseAlpha * breathFactor * (0.3 + this.depth * 0.7);

    this.life++;
    // Fade in/out
    let fadeIn = Math.min(1, this.life / 300);
    let fadeOut = Math.min(1, (this.maxLife - this.life) / 300);
    this.currentAlpha *= fadeIn * fadeOut;

    // Reset if out of bounds or expired
    if (this.life > this.maxLife || this.x < -100 || this.x > width + 100 || this.y < -100 || this.y > height + 100) {
      this.reset();
    }
  }

  display(pg) {
    // Color based on depth and position
    let yRatio = this.y / height;
    // Bottom = warmer (dawn glow), top = cooler (night sky)
    let warmth = Math.pow(yRatio, 1.5); 
    let h = CONFIG.baseHue + this.hueOffset + warmth * (CONFIG.accentHue - CONFIG.baseHue) * 0.4;
    let s = 25 + warmth * 35;
    let b = 40 + this.depth * 30 + warmth * 20;
    
    pg.noStroke();
    pg.fill(h % 360, s, b, this.currentAlpha);
    
    // Soft circle with layered transparency
    let sz = this.size * (0.5 + this.depth * 0.5);
    pg.ellipse(this.x, this.y, sz, sz * 0.7);
  }
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  pixelDensity(1);
  randomSeed(CONFIG.seed);
  noiseSeed(CONFIG.seed);
  colorMode(HSB, 360, 100, 100, 100);

  // Create fog layers
  for (let i = 0; i < CONFIG.fogLayers; i++) {
    fogBuffers.push(createGraphics(width, height));
    fogBuffers[i].colorMode(HSB, 360, 100, 100, 100);
    fogBuffers[i].noStroke();
  }

  // Create particles
  for (let i = 0; i < CONFIG.particleCount; i++) {
    particles.push(new FogParticle());
  }
}

function draw() {
  globalTime = millis();

  // Deep background gradient
  drawBackground();

  // Sort particles by depth for layering
  // (skip per-frame sort for performance — they're already mixed)

  // Render fog layers
  for (let i = 0; i < CONFIG.fogLayers; i++) {
    fogBuffers[i].clear();
  }

  // Distribute particles across fog layers by depth
  let layerSize = CONFIG.particleCount / CONFIG.fogLayers;
  for (let i = 0; i < particles.length; i++) {
    let layerIdx = Math.floor(particles[i].depth * CONFIG.fogLayers);
    layerIdx = Math.min(layerIdx, CONFIG.fogLayers - 1);
    particles[i].update(globalTime);
    particles[i].display(fogBuffers[layerIdx]);
  }

  // Composite fog layers with different opacities
  for (let i = 0; i < CONFIG.fogLayers; i++) {
    let layerAlpha = 0.6 + (i / CONFIG.fogLayers) * 0.4;
    tint(255, layerAlpha * 255);
    image(fogBuffers[i], 0, 0);
  }
  noTint();

  // Horizon glow — warm dawn light at bottom
  drawHorizonGlow();

  // Floating light motes (very few, very bright)
  drawLightMotes();
}

function drawBackground() {
  // Gradient from dark blue-grey top to slightly warmer bottom
  let c1 = color(215, 35, 8);   // top: deep night blue
  let c2 = color(225, 25, 12);  // mid: dark grey-blue
  let c3 = color(230, 20, 15);  // bottom: slightly lighter
  
  noStroke();
  for (let y = 0; y < height; y += 4) {
    let t = y / height;
    let c;
    if (t < 0.6) {
      c = lerpColor(c1, c2, t / 0.6);
    } else {
      c = lerpColor(c2, c3, (t - 0.6) / 0.4);
    }
    fill(c);
    rect(0, y, width, 4);
  }
}

function drawHorizonGlow() {
  // Warm glow at the bottom — like dawn approaching
  let t = globalTime * 0.0001;
  let breathe = 0.6 + 0.4 * Math.sin(t * 2);
  
  noStroke();
  // Main warm glow
  for (let i = 0; i < 5; i++) {
    let yBase = height * (0.7 + i * 0.06);
    let alpha = (3 - i * 0.5) * breathe;
    fill(25, 40 - i * 5, 50 + i * 10, Math.max(0, alpha));
    rect(0, yBase, width, height - yBase);
  }

  // Central warm spot
  let cx = width * 0.5 + Math.sin(t * 3) * width * 0.05;
  let cy = height * 0.85;
  let spotSize = width * 0.6;
  fill(30, 30, 60, 4 * breathe);
  ellipse(cx, cy, spotSize, spotSize * 0.3);
}

function drawLightMotes() {
  // A handful of bright, tiny particles — like dust in morning light
  let count = 15;
  for (let i = 0; i < count; i++) {
    let seed = i * 137.5 + 42;
    let px = (noise(seed, globalTime * 0.00005) * 1.4 - 0.2) * width;
    let py = (noise(seed + 100, globalTime * 0.00004) * 1.2 - 0.1) * height;
    let brightness = 60 + 30 * Math.sin(globalTime * 0.002 + seed);
    let sz = 2 + 3 * noise(seed + 200, globalTime * 0.0003);
    
    noStroke();
    // Glow
    fill(40, 20, brightness, 8);
    ellipse(px, py, sz * 8, sz * 8);
    // Core
    fill(45, 15, Math.min(100, brightness + 20), 25);
    ellipse(px, py, sz, sz);
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  // Recreate fog buffers at new size
  for (let i = 0; i < CONFIG.fogLayers; i++) {
    fogBuffers[i].resizeCanvas(width, height);
  }
}

function keyPressed() {
  if (key === 's' || key === 'S') saveCanvas('matin', 'png');
  if (key === 'r' || key === 'R') {
    CONFIG.seed = floor(random(99999));
    randomSeed(CONFIG.seed);
    noiseSeed(CONFIG.seed);
  }
  if (key === ' ') noLoop();
}
</script>
</body>
</html>
