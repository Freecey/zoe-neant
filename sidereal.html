<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sidereal — Zoe ✶</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; cursor: none; }
canvas { display: block; }
#cursor {
  position: fixed;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: rgba(180, 200, 255, 0.6);
  box-shadow: 0 0 15px rgba(180, 200, 255, 0.4), 0 0 30px rgba(100, 140, 255, 0.2);
  pointer-events: none;
  transform: translate(-50%, -50%);
  z-index: 100;
  transition: opacity 0.3s;
}
#hint {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(120, 140, 180, 0.4);
  font-family: 'Courier New', monospace;
  font-size: 13px;
  letter-spacing: 2px;
  pointer-events: none;
  transition: opacity 3s;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="cursor"></div>
<div id="hint">click to pulse · scroll to shift time</div>

<script>
// Perlin Noise (compact)
const Noise = (() => {
  const p = new Uint8Array(512);
  const perm = new Uint8Array(256);
  for (let i = 0; i < 256; i++) perm[i] = i;
  for (let i = 255; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [perm[i], perm[j]] = [perm[j], perm[i]];
  }
  for (let i = 0; i < 512; i++) p[i] = perm[i & 255];
  const fade = t => t * t * t * (t * (t * 6 - 15) + 10);
  const lerp = (a, b, t) => a + t * (b - a);
  const grad = (hash, x, y) => {
    const h = hash & 3;
    return ((h & 1) ? -x : x) + ((h & 2) ? -y : y);
  };
  return {
    noise2D(x, y) {
      const xi = Math.floor(x) & 255, yi = Math.floor(y) & 255;
      const xf = x - Math.floor(x), yf = y - Math.floor(y);
      const u = fade(xf), v = fade(yf);
      const aa = p[p[xi] + yi], ab = p[p[xi] + yi + 1];
      const ba = p[p[xi + 1] + yi], bb = p[p[xi + 1] + yi + 1];
      return lerp(
        lerp(grad(aa, xf, yf), grad(ba, xf - 1, yf), u),
        lerp(grad(ab, xf, yf - 1), grad(bb, xf - 1, yf - 1), u), v
      );
    }
  };
})();

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const cursorEl = document.getElementById('cursor');
const hintEl = document.getElementById('hint');

let W, H, cx, cy;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2;
  cy = H / 2;
}
resize();
window.addEventListener('resize', resize);

let mouseX = cx, mouseY = cy;
let mouseActive = false;

document.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top = e.clientY + 'px';
  if (!mouseActive) mouseActive = true;
});

document.addEventListener('touchmove', e => {
  mouseX = e.touches[0].clientX;
  mouseY = e.touches[0].clientY;
}, { passive: true });

// Fade hint after 5s
setTimeout(() => hintEl.style.opacity = '0', 5000);

// Stars
class Star {
  constructor() {
    this.reset();
  }
  reset() {
    // Distance from center — weighted toward outer
    this.dist = 30 + Math.random() * Math.max(W, H) * 0.65;
    this.angle = Math.random() * Math.PI * 2;
    this.speed = (0.00015 + Math.random() * 0.0004) * (Math.random() > 0.5 ? 1 : -1);
    // Closer stars orbit faster (parallax)
    this.speed *= (1 + (1 - this.dist / (Math.max(W, H) * 0.65)) * 0.8);
    this.baseRadius = 0.4 + Math.random() * 1.8;
    this.brightness = 0.3 + Math.random() * 0.7;
    this.twinkleSpeed = 1 + Math.random() * 3;
    this.twinklePhase = Math.random() * Math.PI * 2;
    // Color temperature
    const temp = Math.random();
    if (temp < 0.15) {
      this.color = [255, 200, 150]; // warm orange
    } else if (temp < 0.3) {
      this.color = [180, 200, 255]; // cool blue
    } else if (temp < 0.4) {
      this.color = [255, 255, 220]; // pale yellow
    } else if (temp < 0.45) {
      this.color = [255, 180, 180]; // red giant
    } else {
      this.color = [240, 245, 255]; // white
    }
  }
  update(time) {
    this.angle += this.speed;
    this.x = cx + Math.cos(this.angle) * this.dist;
    this.y = cy + Math.sin(this.angle) * this.dist;
    this.twinkle = 0.5 + 0.5 * Math.sin(time * this.twinkleSpeed + this.twinklePhase);
  }
  draw(ctx) {
    const alpha = this.brightness * this.twinkle;
    const r = this.baseRadius * (0.8 + this.twinkle * 0.4);
    const [cr, cg, cb] = this.color;
    
    // Glow
    if (r > 1.2) {
      const grd = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r * 4);
      grd.addColorStop(0, `rgba(${cr}, ${cg}, ${cb}, ${alpha * 0.3})`);
      grd.addColorStop(1, `rgba(${cr}, ${cg}, ${cb}, 0)`);
      ctx.fillStyle = grd;
      ctx.fillRect(this.x - r * 4, this.y - r * 4, r * 8, r * 8);
    }
    
    // Core
    ctx.beginPath();
    ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${cr}, ${cg}, ${cb}, ${alpha})`;
    ctx.fill();
  }
}

// Shooting stars
class ShootingStar {
  constructor() {
    this.reset();
  }
  reset() {
    this.active = false;
    this.timer = 200 + Math.random() * 800;
  }
  activate() {
    this.active = true;
    // Start from a random edge-ish position
    this.x = Math.random() * W;
    this.y = Math.random() * H * 0.4;
    const angle = Math.PI * 0.2 + Math.random() * Math.PI * 0.3;
    this.speed = 8 + Math.random() * 12;
    this.vx = Math.cos(angle) * this.speed;
    this.vy = Math.sin(angle) * this.speed;
    this.life = 1;
    this.decay = 0.012 + Math.random() * 0.015;
    this.trail = [];
    this.maxTrail = 30 + Math.floor(Math.random() * 20);
  }
  update() {
    if (!this.active) {
      this.timer--;
      if (this.timer <= 0) this.activate();
      return;
    }
    this.x += this.vx;
    this.y += this.vy;
    this.life -= this.decay;
    this.trail.push({ x: this.x, y: this.y, life: this.life });
    if (this.trail.length > this.maxTrail) this.trail.shift();
    if (this.life <= 0) this.reset();
  }
  draw(ctx) {
    if (!this.active) return;
    for (let i = 0; i < this.trail.length; i++) {
      const t = this.trail[i];
      const progress = i / this.trail.length;
      const alpha = progress * t.life * 0.8;
      const width = progress * 2;
      ctx.beginPath();
      ctx.arc(t.x, t.y, width, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(240, 250, 255, ${alpha})`;
      ctx.fill();
    }
    // Head glow
    const grd = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, 8);
    grd.addColorStop(0, `rgba(255, 255, 255, ${this.life * 0.8})`);
    grd.addColorStop(0.5, `rgba(200, 220, 255, ${this.life * 0.3})`);
    grd.addColorStop(1, `rgba(150, 180, 255, 0)`);
    ctx.fillStyle = grd;
    ctx.fillRect(this.x - 8, this.y - 8, 16, 16);
  }
}

// Pulse wave (on click)
class Pulse {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.radius = 0;
    this.maxRadius = Math.max(W, H) * 0.6;
    this.speed = 4;
    this.life = 1;
  }
  update() {
    this.radius += this.speed;
    this.life = 1 - (this.radius / this.maxRadius);
    return this.life > 0;
  }
  draw(ctx) {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(150, 180, 255, ${this.life * 0.15})`;
    ctx.lineWidth = 2 + this.life * 3;
    ctx.stroke();
    
    // Inner glow
    if (this.life > 0.5) {
      const grd = ctx.createRadialGradient(this.x, this.y, this.radius * 0.8, this.x, this.y, this.radius);
      grd.addColorStop(0, `rgba(150, 180, 255, 0)`);
      grd.addColorStop(1, `rgba(150, 180, 255, ${(this.life - 0.5) * 0.08})`);
      ctx.fillStyle = grd;
      ctx.fillRect(this.x - this.radius, this.y - this.radius, this.radius * 2, this.radius * 2);
    }
  }
}

// Nebula clouds (very subtle background)
class NebulaCloud {
  constructor() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.radius = 100 + Math.random() * 250;
    this.vx = (Math.random() - 0.5) * 0.05;
    this.vy = (Math.random() - 0.5) * 0.05;
    this.hue = 220 + Math.random() * 60; // blue-purple range
    this.alpha = 0.005 + Math.random() * 0.01;
    this.phase = Math.random() * Math.PI * 2;
  }
  update(time) {
    this.x += this.vx;
    this.y += this.vy;
    if (this.x < -this.radius) this.x = W + this.radius;
    if (this.x > W + this.radius) this.x = -this.radius;
    if (this.y < -this.radius) this.y = H + this.radius;
    if (this.y > H + this.radius) this.y = -this.radius;
  }
  draw(ctx, time) {
    const pulse = Math.sin(time * 0.3 + this.phase) * 0.3 + 0.7;
    const r = this.radius * pulse;
    const a = this.alpha * pulse;
    const grd = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r);
    grd.addColorStop(0, `hsla(${this.hue}, 60%, 40%, ${a})`);
    grd.addColorStop(0.5, `hsla(${this.hue + 20}, 50%, 30%, ${a * 0.5})`);
    grd.addColorStop(1, `hsla(${this.hue}, 60%, 20%, 0)`);
    ctx.fillStyle = grd;
    ctx.fillRect(this.x - r, this.y - r, r * 2, r * 2);
  }
}

// Init
const stars = [];
const shootingStars = [];
const nebulae = [];
let pulses = [];
let timeOffset = 0;
let time = 0;

for (let i = 0; i < 800; i++) stars.push(new Star());
for (let i = 0; i < 3; i++) shootingStars.push(new ShootingStar());
for (let i = 0; i < 12; i++) nebulae.push(new NebulaCloud());

// Click → pulse wave
canvas.addEventListener('click', e => {
  pulses.push(new Pulse(e.clientX, e.clientY));
});
canvas.addEventListener('touchstart', e => {
  pulses.push(new Pulse(e.touches[0].clientX, e.touches[0].clientY));
}, { passive: true });

// Scroll → shift time speed
let timeSpeed = 1;
window.addEventListener('wheel', e => {
  timeSpeed = Math.max(0.1, Math.min(5, timeSpeed + e.deltaY * 0.001));
}, { passive: true });

// Center glow (subtle gravitational pull visual)
function drawCenterGlow(ctx, time) {
  const pulse = Math.sin(time * 0.5) * 0.3 + 0.7;
  const r = 80 * pulse;
  const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
  grd.addColorStop(0, `rgba(100, 130, 200, ${0.04 * pulse})`);
  grd.addColorStop(0.5, `rgba(80, 100, 180, ${0.015 * pulse})`);
  grd.addColorStop(1, 'rgba(60, 80, 160, 0)');
  ctx.fillStyle = grd;
  ctx.fillRect(cx - r, cy - r, r * 2, r * 2);
}

// Render
function render() {
  time = performance.now() / 1000 + timeOffset;
  const adjustedTime = time * timeSpeed;
  
  // Fade — very slow for long trails
  ctx.fillStyle = 'rgba(0, 0, 2, 0.12)';
  ctx.fillRect(0, 0, W, H);
  
  // Nebulae (background atmosphere)
  ctx.globalCompositeOperation = 'screen';
  nebulae.forEach(n => {
    n.update(adjustedTime);
    n.draw(ctx, adjustedTime);
  });
  ctx.globalCompositeOperation = 'source-over';
  
  // Center glow
  drawCenterGlow(ctx, adjustedTime);
  
  // Stars
  ctx.globalCompositeOperation = 'lighter';
  stars.forEach(s => {
    s.update(adjustedTime);
    s.draw(ctx);
  });
  
  // Shooting stars
  shootingStars.forEach(s => {
    s.update();
    s.draw(ctx);
  });
  
  // Pulses
  ctx.globalCompositeOperation = 'screen';
  pulses = pulses.filter(p => {
    const alive = p.update();
    if (alive) p.draw(ctx);
    return alive;
  });
  
  ctx.globalCompositeOperation = 'source-over';
  
  requestAnimationFrame(render);
}

// Initial black fill
ctx.fillStyle = '#000002';
ctx.fillRect(0, 0, W, H);

render();
</script>
</body>
</html>
