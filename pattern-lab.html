<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zoe ✶ — Pattern Lab</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  canvas {
    border-radius: 8px;
    box-shadow: 0 0 40px rgba(120, 80, 255, 0.15);
  }
  .controls {
    position: fixed;
    bottom: 24px;
    display: flex;
    gap: 12px;
    z-index: 10;
  }
  .controls button {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    color: #ccc;
    padding: 8px 18px;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    transition: all 0.2s;
    backdrop-filter: blur(8px);
  }
  .controls button:hover {
    background: rgba(120, 80, 255, 0.2);
    border-color: rgba(120, 80, 255, 0.4);
    color: #fff;
  }
  .title {
    position: fixed;
    top: 20px;
    font-size: 14px;
    letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0.3;
  }
  .seed-info {
    position: fixed;
    top: 20px;
    right: 24px;
    font-size: 11px;
    opacity: 0.25;
  }
</style>
</head>
<body>
<div class="title">Zoe ✶ Pattern Lab</div>
<div class="seed-info" id="seedInfo"></div>
<canvas id="canvas"></canvas>
<div class="controls">
  <button onclick="generate()">⟳ Nouveau</button>
  <button onclick="toggleAnim()">⏯ Anim</button>
  <button onclick="saveImage()">💾 Save</button>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, animating = false, animId = null, seed;

function resize() {
  const s = Math.min(window.innerWidth * 0.8, window.innerHeight * 0.75, 700);
  W = canvas.width = s;
  H = canvas.height = s;
}

// Seeded random
function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    var t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  }
}

let rng;

const PALETTES = [
  ['#ff6b6b','#feca57','#48dbfb','#ff9ff3','#54a0ff'],
  ['#0abde3','#10ac84','#ee5a24','#f6e58d','#dff9fb'],
  ['#6c5ce7','#fd79a8','#00cec9','#fdcb6e','#e17055'],
  ['#2d3436','#636e72','#b2bec3','#dfe6e9','#74b9ff'],
  ['#e77f67','#cf6a87','#786fa6','#f8a5c2','#63cdda'],
  ['#f9ca24','#f0932b','#eb4d4b','#6ab04c','#22a6b3'],
];

const PATTERNS = [spirograph, kaleidoscope, waveField, concentricRings, dotGrid, flowField];

function pick(arr) { return arr[Math.floor(rng() * arr.length)]; }
function rand(a, b) { return a + rng() * (b - a); }

function spirograph(t) {
  const cx = W/2, cy = H/2;
  const R = W * 0.3;
  const layers = Math.floor(rand(2, 5));
  for (let l = 0; l < layers; l++) {
    const r = R * rand(0.2, 0.8);
    const d = R * rand(0.3, 0.9);
    const ratio = rand(0.1, 0.9);
    const col = pick(palettes);
    ctx.beginPath();
    ctx.strokeStyle = col + (l % 2 === 0 ? 'aa' : '66');
    ctx.lineWidth = rand(0.5, 2);
    const steps = 2000;
    const offset = t || 0;
    for (let i = 0; i <= steps; i++) {
      const angle = (i / steps) * Math.PI * 2 * (3 + l * 2) + offset;
      const x = cx + (R - r) * Math.cos(angle) + d * Math.cos(((R - r) / r) * angle);
      const y = cy + (R - r) * Math.sin(angle) + d * Math.sin(((R - r) / r) * angle);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
}

function kaleidoscope(t) {
  const cx = W/2, cy = H/2;
  const segments = Math.floor(rand(5, 13));
  const angleStep = (Math.PI * 2) / segments;
  const shapes = Math.floor(rand(8, 25));
  
  for (let s = 0; s < shapes; s++) {
    const dist = rand(20, W * 0.42);
    const size = rand(3, W * 0.08);
    const angle = rand(0, angleStep);
    const col = pick(palettes);
    const offset = t || 0;
    
    for (let i = 0; i < segments; i++) {
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(angleStep * i + offset * 0.3);
      ctx.fillStyle = col + '88';
      ctx.beginPath();
      ctx.arc(dist, angle, size, 0, Math.PI * 2);
      ctx.fill();
      // Mirror
      ctx.scale(1, -1);
      ctx.beginPath();
      ctx.arc(dist, angle, size * 0.7, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }
}

function waveField(t) {
  const cols = Math.floor(rand(15, 35));
  const rows = cols;
  const cellW = W / cols;
  const cellH = H / rows;
  const freq = rand(0.05, 0.2);
  const amp = rand(5, 20);
  const offset = t || 0;
  
  for (let i = 0; i < cols; i++) {
    for (let j = 0; j < rows; j++) {
      const x = i * cellW + cellW/2;
      const y = j * cellH + cellH/2;
      const wave = Math.sin(i * freq + offset) * Math.cos(j * freq + offset * 0.7);
      const size = Math.max(1, (wave + 1) * cellW * 0.3);
      const col = pick(palettes);
      ctx.fillStyle = col + 'cc';
      ctx.beginPath();
      ctx.arc(x + wave * amp * 0.3, y + wave * amp * 0.3, size, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function concentricRings(t) {
  const cx = W/2, cy = H/2;
  const rings = Math.floor(rand(6, 18));
  const offset = t || 0;
  
  for (let i = rings; i > 0; i--) {
    const r = (i / rings) * W * 0.45;
    const col = pick(palettes);
    const wobble = Math.sin(i * 0.5 + offset * 2) * 15;
    
    ctx.beginPath();
    ctx.strokeStyle = col + 'bb';
    ctx.lineWidth = rand(1, 4);
    const points = 100;
    for (let p = 0; p <= points; p++) {
      const a = (p / points) * Math.PI * 2;
      const noise = Math.sin(a * Math.floor(rand(2,8))) * (5 + i * 2);
      const px = cx + Math.cos(a) * (r + noise + wobble);
      const py = cy + Math.sin(a) * (r + noise + wobble);
      p === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.stroke();
  }
}

function dotGrid(t) {
  const spacing = Math.floor(rand(12, 30));
  const offset = t || 0;
  
  for (let x = spacing; x < W; x += spacing) {
    for (let y = spacing; y < H; y += spacing) {
      const dist = Math.sqrt((x - W/2)**2 + (y - H/2)**2);
      const angle = Math.atan2(y - H/2, x - W/2);
      const wave = Math.sin(dist * 0.03 + offset * 2) * Math.cos(angle * 3 + offset);
      const size = Math.max(0.5, (wave + 1) * spacing * 0.25);
      const col = pick(palettes);
      ctx.fillStyle = col + 'dd';
      ctx.beginPath();
      ctx.arc(x + wave * 4, y + wave * 4, size, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function flowField(t) {
  const scale = rand(0.003, 0.01);
  const lines = Math.floor(rand(200, 600));
  const steps = Math.floor(rand(30, 80));
  const offset = t || 0;
  
  function noise2d(x, y) {
    // Simple value noise approximation
    return Math.sin(x * 1.2 + offset) * Math.cos(y * 0.8 + offset * 0.5) +
           Math.sin(x * 0.5 - y * 0.7 + offset * 0.3) * 0.5;
  }
  
  for (let l = 0; l < lines; l++) {
    let x = rng() * W;
    let y = rng() * H;
    const col = pick(palettes);
    ctx.beginPath();
    ctx.strokeStyle = col + '44';
    ctx.lineWidth = rand(0.5, 1.5);
    ctx.moveTo(x, y);
    
    for (let s = 0; s < steps; s++) {
      const angle = noise2d(x * scale, y * scale) * Math.PI * 4;
      x += Math.cos(angle) * 2;
      y += Math.sin(angle) * 2;
      if (x < 0 || x > W || y < 0 || y > H) break;
      ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
}

let palettes;
let currentPattern;

function generate(s) {
  seed = s || Math.floor(Math.random() * 999999);
  rng = mulberry32(seed);
  palettes = pick(PALETTES);
  currentPattern = pick(PATTERNS);
  
  document.getElementById('seedInfo').textContent = 'seed: ' + seed;
  
  // Background
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);
  
  currentPattern(0);
}

let animT = 0;
function animate() {
  if (!animating) return;
  animT += 0.02;
  ctx.fillStyle = 'rgba(10, 10, 15, 0.08)';
  ctx.fillRect(0, 0, W, H);
  currentPattern(animT);
  animId = requestAnimationFrame(animate);
}

function toggleAnim() {
  animating = !animating;
  if (animating) animate();
  else if (animId) cancelAnimationFrame(animId);
}

function saveImage() {
  const link = document.createElement('a');
  link.download = 'zoe-pattern-' + seed + '.png';
  link.href = canvas.toDataURL();
  link.click();
}

// URL hash as seed
const hashSeed = parseInt(window.location.hash.slice(1));
resize();
generate(hashSeed || undefined);

window.addEventListener('resize', () => { resize(); generate(seed); });
</script>
</body>
</html>
