<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zoe ✶ — Meteors</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; cursor: crosshair; }
canvas { display: block; }
#hint {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,0.15); font-family: monospace; font-size: 12px;
  pointer-events: none; transition: opacity 3s;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">click to burst — move to attract</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
let mouse = { x: -1000, y: -1000, active: false };
let time = 0;
let baseHue = 200;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Fade hint after 5s
setTimeout(() => document.getElementById('hint').style.opacity = '0', 5000);

// ---- METEOR ----
class Meteor {
  constructor(x, y, burst = false) {
    if (burst) {
      this.x = x;
      this.y = y;
      const angle = Math.random() * Math.PI * 2;
      const speed = 1 + Math.random() * 4;
      this.vx = Math.cos(angle) * speed;
      this.vy = Math.sin(angle) * speed;
      this.size = 1 + Math.random() * 2;
      this.life = 0.6 + Math.random() * 0.6;
      this.maxLife = this.life;
      this.isBurst = true;
    } else {
      // Spawn from top or sides
      const side = Math.random();
      if (side < 0.7) {
        this.x = Math.random() * W;
        this.y = -10;
      } else if (side < 0.85) {
        this.x = -10;
        this.y = Math.random() * H * 0.5;
      } else {
        this.x = W + 10;
        this.y = Math.random() * H * 0.5;
      }
      const angle = Math.PI * 0.3 + Math.random() * Math.PI * 0.4;
      const speed = 3 + Math.random() * 5;
      this.vx = Math.cos(angle) * speed * (Math.random() > 0.5 ? 1 : -1);
      this.vy = Math.sin(angle) * speed;
      this.size = 1.5 + Math.random() * 2.5;
      this.life = 1.5 + Math.random() * 2;
      this.maxLife = this.life;
      this.isBurst = false;
    }
    this.trail = [];
    this.maxTrail = this.isBurst ? 8 : 25;
    this.hue = baseHue + (Math.random() - 0.5) * 60;
    this.brightness = 60 + Math.random() * 30;
  }

  update(dt) {
    // Mouse attraction (gentle)
    if (mouse.active && !this.isBurst) {
      const dx = mouse.x - this.x;
      const dy = mouse.y - this.y;
      const dist = Math.hypot(dx, dy);
      if (dist < 300 && dist > 1) {
        const force = 0.5 / (dist * 0.01);
        this.vx += (dx / dist) * force * dt;
        this.vy += (dy / dist) * force * dt;
      }
    }

    this.trail.unshift({ x: this.x, y: this.y });
    if (this.trail.length > this.maxTrail) this.trail.pop();

    this.x += this.vx;
    this.y += this.vy;
    this.vy += 0.15 * dt; // gravity for bursts
    this.life -= dt;

    // Slow down bursts
    if (this.isBurst) {
      this.vx *= 0.98;
      this.vy *= 0.98;
    }

    return this.life > 0;
  }

  draw(ctx) {
    const alpha = Math.max(0, this.life / this.maxLife);

    // Draw trail
    if (this.trail.length > 1) {
      ctx.beginPath();
      ctx.moveTo(this.trail[0].x, this.trail[0].y);
      for (let i = 1; i < this.trail.length; i++) {
        ctx.lineTo(this.trail[i].x, this.trail[i].y);
      }
      ctx.strokeStyle = `hsla(${this.hue}, 80%, ${this.brightness}%, ${alpha * 0.4})`;
      ctx.lineWidth = this.size * 0.6;
      ctx.stroke();
    }

    // Draw head glow
    const glowSize = this.size * (this.isBurst ? 2 : 3);
    const grd = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, glowSize);
    grd.addColorStop(0, `hsla(${this.hue}, 90%, 90%, ${alpha * 0.9})`);
    grd.addColorStop(0.3, `hsla(${this.hue}, 80%, ${this.brightness}%, ${alpha * 0.5})`);
    grd.addColorStop(1, `hsla(${this.hue}, 80%, ${this.brightness}%, 0)`);
    ctx.fillStyle = grd;
    ctx.fillRect(this.x - glowSize, this.y - glowSize, glowSize * 2, glowSize * 2);

    // Bright core
    ctx.beginPath();
    ctx.arc(this.x, this.y, Math.max(0.5, this.size * 0.4), 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${this.hue}, 30%, 95%, ${alpha})`;
    ctx.fill();
  }
}

// ---- SPARKLE (tiny background stars) ----
class Star {
  constructor() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.size = 0.5 + Math.random() * 1.5;
    this.twinkleSpeed = 0.5 + Math.random() * 2;
    this.phase = Math.random() * Math.PI * 2;
  }
  draw(ctx, time) {
    const alpha = 0.2 + 0.3 * Math.sin(time * this.twinkleSpeed + this.phase);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200, 220, 255, ${alpha})`;
    ctx.fill();
  }
}

// ---- STATE ----
let meteors = [];
const stars = [];
for (let i = 0; i < 150; i++) stars.push(new Star());

let spawnTimer = 0;
const SPAWN_RATE = 0.15; // seconds between spawns

// ---- INTERACTION ----
window.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  mouse.active = true;
});
window.addEventListener('mouseleave', () => { mouse.active = false; });

window.addEventListener('click', e => {
  // Burst explosion
  const count = 30 + Math.floor(Math.random() * 40);
  for (let i = 0; i < count; i++) {
    meteors.push(new Meteor(e.clientX, e.clientY, true));
  }
});

window.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  mouse.x = t.clientX;
  mouse.y = t.clientY;
  mouse.active = true;
  const count = 30 + Math.floor(Math.random() * 40);
  for (let i = 0; i < count; i++) {
    meteors.push(new Meteor(t.clientX, t.clientY, true));
  }
}, { passive: false });

window.addEventListener('touchmove', e => {
  const t = e.touches[0];
  mouse.x = t.clientX;
  mouse.y = t.clientY;
});

// ---- RENDER LOOP ----
let lastTime = performance.now();

function animate(now) {
  requestAnimationFrame(animate);
  const rawDt = (now - lastTime) / 1000;
  const dt = Math.min(rawDt, 0.1) * 60; // normalize to ~60fps
  lastTime = now;
  time += rawDt;

  // Slowly shift base hue
  baseHue = 200 + Math.sin(time * 0.05) * 80;

  // Fade effect — dark overlay
  ctx.fillStyle = 'rgba(2, 2, 8, 0.15)';
  ctx.fillRect(0, 0, W, H);

  // Draw stars
  ctx.globalCompositeOperation = 'lighter';
  stars.forEach(s => s.draw(ctx, time));

  // Spawn new meteors
  spawnTimer += rawDt;
  while (spawnTimer >= SPAWN_RATE) {
    spawnTimer -= SPAWN_RATE;
    meteors.push(new Meteor(0, 0, false));
  }

  // Occasional big meteor
  if (Math.random() < 0.003) {
    const big = new Meteor(0, 0, false);
    big.size = 3 + Math.random() * 2;
    big.maxTrail = 40;
    big.trail = [];
    meteors.push(big);
  }

  // Update & draw meteors
  meteors = meteors.filter(m => {
    const alive = m.update(dt / 60);
    if (alive) m.draw(ctx);
    return alive;
  });

  ctx.globalCompositeOperation = 'source-over';
}

requestAnimationFrame(animate);
</script>
</body>
</html>
