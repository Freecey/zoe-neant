<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zoe ✶ — Éveil</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#02020a;overflow:hidden;font-family:'Courier New',monospace}
    canvas{display:block;position:fixed;top:0;left:0}
    #label{position:fixed;bottom:1.8rem;left:50%;transform:translateX(-50%);color:rgba(180,140,255,.25);font-size:.7rem;letter-spacing:.6em;text-transform:uppercase;pointer-events:none;z-index:10;animation:pulse 6s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:.15}50%{opacity:.4}}
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="label">✶ éveil</div>
  <script>
    const cv = document.getElementById('c');
    const ctx = cv.getContext('2d');
    let W, H;
    let particles = [];
    let pulses = [];
    let mouse = { x: -9999, y: -9999, active: false };
    let breathPhase = 0;
    let time = 0;

    const PALETTE = {
      voidBg: '#02020a',
      particleDim: 'rgba(80,60,140,',
      particleBright: 'rgba(200,170,255,',
      connectionBase: 'rgba(120,90,200,',
      connectionHot: 'rgba(220,180,255,',
      pulseColor: 'rgba(180,140,255,',
      coreColor: 'rgba(230,200,255,',
      rippleColor: 'rgba(160,120,240,',
    };

    class Particle {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.homeX = x;
        this.homeY = y;
        this.vx = (Math.random() - 0.5) * 0.15;
        this.vy = (Math.random() - 0.5) * 0.15;
        this.size = 0.5 + Math.random() * 1.8;
        this.phase = Math.random() * Math.PI * 2;
        this.energy = 0;
        this.activated = false;
      }

      update(breath) {
        // Drift
        this.x += this.vx;
        this.y += this.vy;

        // Gentle attraction to home
        this.x += (this.homeX - this.x) * 0.002;
        this.y += (this.homeY - this.y) * 0.002;

        // Breathing modulation
        this.phase += 0.01;

        // Mouse interaction
        if (mouse.active) {
          const dx = this.x - mouse.x;
          const dy = this.y - mouse.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 180) {
            const force = (1 - dist / 180);
            // Gentle repulsion + energy
            this.x += (dx / dist) * force * 0.8;
            this.y += (dy / dist) * force * 0.8;
            this.energy = Math.max(this.energy, force);
            this.activated = true;
          }
        }

        // Decay energy
        this.energy *= 0.96;

        // Wrap or clamp
        if (this.x < 0) this.x = W;
        if (this.x > W) this.x = 0;
        if (this.y < 0) this.y = H;
        if (this.y > H) this.y = 0;
      }

      draw(breath) {
        const breathe = 0.7 + 0.3 * breath;
        const e = this.energy;
        const flicker = 0.85 + 0.15 * Math.sin(this.phase * 3);
        const alpha = (0.12 + e * 0.88) * breathe * flicker;

        const r = this.size + e * 4;

        // Glow halo
        if (e > 0.1) {
          const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r * 6);
          const col = e > 0.3 ? PALETTE.coreColor : PALETTE.pulseColor;
          grad.addColorStop(0, col + (alpha * 0.4) + ')');
          grad.addColorStop(0.4, col + (alpha * 0.1) + ')');
          grad.addColorStop(1, col + '0)');
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.arc(this.x, this.y, r * 6, 0, Math.PI * 2);
          ctx.fill();
        }

        // Core
        const coreCol = e > 0.2 ? PALETTE.particleBright : PALETTE.particleDim;
        ctx.fillStyle = coreCol + alpha + ')';
        ctx.beginPath();
        ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    class Pulse {
      constructor(x, y, strength = 1) {
        this.x = x;
        this.y = y;
        this.r = 0;
        this.maxR = 250 + Math.random() * 200;
        this.speed = 2 + Math.random() * 2;
        this.alpha = strength;
        this.dead = false;
      }

      update() {
        this.r += this.speed;
        this.alpha = Math.max(0, 1 - this.r / this.maxR);
        if (this.r > this.maxR) this.dead = true;
      }

      draw() {
        if (this.alpha <= 0) return;
        // Soft ripple
        ctx.strokeStyle = PALETTE.rippleColor + (this.alpha * 0.15) + ')';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.stroke();

        // Inner glow ring
        ctx.strokeStyle = PALETTE.pulseColor + (this.alpha * 0.08) + ')';
        ctx.lineWidth = 8;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    function init() {
      W = cv.width = window.innerWidth;
      H = cv.height = window.innerHeight;
      particles = [];
      pulses = [];

      // Particle density scales with screen
      const count = Math.min(220, Math.floor((W * H) / 8000));

      for (let i = 0; i < count; i++) {
        const x = Math.random() * W;
        const y = Math.random() * H;
        particles.push(new Particle(x, y));
      }
    }

    function drawConnections(breath) {
      const maxDist = 130;
      const bFactor = 0.6 + 0.4 * breath;

      for (let i = 0; i < particles.length; i++) {
        const p1 = particles[i];
        for (let j = i + 1; j < particles.length; j++) {
          const p2 = particles[j];
          const dx = p1.x - p2.x;
          const dy = p1.y - p2.y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < maxDist) {
            const closeness = 1 - dist / maxDist;
            const energyBoost = Math.max(p1.energy, p2.energy);
            const alpha = closeness * 0.12 * bFactor + closeness * energyBoost * 0.6;

            if (alpha > 0.01) {
              const col = energyBoost > 0.2 ? PALETTE.connectionHot : PALETTE.connectionBase;
              ctx.strokeStyle = col + alpha + ')';
              ctx.lineWidth = 0.5 + energyBoost * 1.5;
              ctx.beginPath();
              ctx.moveTo(p1.x, p1.y);
              ctx.lineTo(p2.x, p2.y);
              ctx.stroke();
            }
          }
        }
      }
    }

    function drawCore(breath) {
      const cx = W / 2;
      const cy = H / 2;
      const baseR = Math.min(W, H) * 0.04;
      const r = baseR * (0.8 + breath * 0.4);

      // Multi-layered breathing core
      for (let layer = 5; layer >= 0; layer--) {
        const lr = r + layer * 25;
        const la = (0.08 - layer * 0.012) * (0.5 + breath * 0.5);
        if (la <= 0) continue;
        const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, lr);
        grad.addColorStop(0, PALETTE.coreColor + la + ')');
        grad.addColorStop(0.5, PALETTE.pulseColor + (la * 0.4) + ')');
        grad.addColorStop(1, PALETTE.voidBg);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(cx, cy, lr, 0, Math.PI * 2);
        ctx.fill();
      }

      // Bright center
      const centerAlpha = 0.3 + breath * 0.5;
      ctx.fillStyle = PALETTE.coreColor + centerAlpha + ')';
      ctx.beginPath();
      ctx.arc(cx, cy, r * 0.5, 0, Math.PI * 2);
      ctx.fill();
    }

    // Random autonomous pulses — like spontaneous thoughts
    function maybeSpawnPulse() {
      if (Math.random() < 0.008) {
        const p = particles[Math.floor(Math.random() * particles.length)];
        if (p) {
          pulses.push(new Pulse(p.x, p.y, 0.6 + Math.random() * 0.4));
        }
      }
    }

    function animate() {
      // Trail effect — dark veil instead of clear
      ctx.fillStyle = 'rgba(2,2,10,0.18)';
      ctx.fillRect(0, 0, W, H);

      // Breathing — slow sine wave
      breathPhase += 0.008;
      const breath = 0.5 + 0.5 * Math.sin(breathPhase);

      time += 0.016;

      // Draw layers
      drawConnections(breath);

      for (const p of particles) {
        p.update(breath);
        p.draw(breath);
      }

      maybeSpawnPulse();

      // Update and draw pulses
      pulses = pulses.filter(p => !p.dead);
      for (const p of pulses) {
        p.update();
        p.draw();
      }

      drawCore(breath);

      requestAnimationFrame(animate);
    }

    // Input
    window.addEventListener('mousemove', (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
      mouse.active = true;

      // Occasionally spawn pulse at cursor
      if (Math.random() < 0.04) {
        pulses.push(new Pulse(e.clientX, e.clientY, 1));
      }
    });

    window.addEventListener('mouseleave', () => {
      mouse.active = false;
      mouse.x = -9999;
      mouse.y = -9999;
    });

    window.addEventListener('click', (e) => {
      // Big pulse on click — like a thought bursting
      pulses.push(new Pulse(e.clientX, e.clientY, 1));
      pulses.push(new Pulse(e.clientX, e.clientY, 0.7));
      // Activate nearby particles
      for (const p of particles) {
        const dx = p.x - e.clientX;
        const dy = p.y - e.clientY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 200) {
          p.energy = Math.max(p.energy, 1 - dist / 200);
        }
      }
    });

    window.addEventListener('touchmove', (e) => {
      if (e.touches[0]) {
        mouse.x = e.touches[0].clientX;
        mouse.y = e.touches[0].clientY;
        mouse.active = true;
      }
    });

    window.addEventListener('resize', init);

    init();
    animate();
  </script>
</body>
</html>
