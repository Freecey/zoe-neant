<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reste — deep</title>
<meta name="description" content="Reste — version profonde. Les mots flottent, la lumière respire.">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #050609;
    color: #b8b8c4;
    font-family: 'Georgia', 'Times New Roman', serif;
    overflow: hidden;
    cursor: default;
  }

  /* Layered canvas */
  canvas#bg {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
  }

  /* Floating lines */
  .float-line {
    position: absolute;
    font-style: italic;
    font-size: clamp(1.4rem, 3.5vw, 2.4rem);
    font-weight: 300;
    color: #b8b8c4;
    letter-spacing: 0.05em;
    line-height: 1.3;
    opacity: 0;
    transition: opacity 2.2s ease, transform 2.2s ease, color 2.2s ease;
    pointer-events: none;
    max-width: 70vw;
    text-align: center;
    text-shadow: 0 0 30px rgba(244, 168, 95, 0.15);
    will-change: opacity, transform;
  }

  .float-line.now {
    opacity: 1;
  }

  .float-line.past {
    opacity: 0.18;
    color: #6a6a78;
  }

  /* Section markers — subtle, brief */
  .section-marker {
    position: absolute;
    top: 8%;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.7rem;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: rgba(244, 168, 95, 0.5);
    opacity: 0;
    transition: opacity 1.5s ease;
    pointer-events: none;
  }
  .section-marker.now { opacity: 1; }

  /* Start prompt */
  .start {
    position: fixed;
    inset: 0;
    background: #050609;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 2rem;
    z-index: 100;
    cursor: pointer;
    transition: opacity 1.5s ease;
  }
  .start.gone { opacity: 0; pointer-events: none; }
  .start h1 {
    font-size: clamp(2rem, 6vw, 3.5rem);
    font-weight: 300;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: #b8b8c4;
  }
  .start .sub {
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    color: #5a5a68;
    text-transform: uppercase;
    font-style: italic;
  }
  .start .cta {
    margin-top: 1rem;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 1px solid rgba(244, 168, 95, 0.3);
    background: rgba(244, 168, 95, 0.04);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #f4a85f;
    backdrop-filter: blur(8px);
    transition: all 0.3s ease;
  }
  .start:hover .cta {
    background: rgba(244, 168, 95, 0.12);
    box-shadow: 0 0 30px rgba(244, 168, 95, 0.25);
    transform: scale(1.05);
  }
  .start .cta svg { width: 30px; height: 30px; fill: currentColor; }

  /* End card */
  .end {
    position: fixed;
    inset: 0;
    background: #050609;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 1.5rem;
    z-index: 50;
    opacity: 0;
    transition: opacity 2s ease;
  }
  .end.show { display: flex; opacity: 1; }
  .end p {
    font-style: italic;
    color: #5a5a68;
    font-size: 0.9rem;
  }
  .end a {
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #f4a85f;
    text-decoration: none;
    border-bottom: 1px solid rgba(244, 168, 95, 0.3);
    padding-bottom: 4px;
  }
  .end a:hover { color: #fff; border-color: rgba(244,168,95,0.6); }

  @media (prefers-reduced-motion: reduce) {
    .float-line { transition: opacity 0.4s ease; }
  }
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="section-marker" id="sectionMarker"></div>

<div class="start" id="start">
  <h1>Reste</h1>
  <p class="sub">version profonde</p>
  <div class="cta">
    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
  </div>
</div>

<div class="end" id="end">
  <p>Voilà.</p>
  <a href="reste.html">retour à la page →</a>
</div>

<audio id="audio" preload="metadata">
  <source src="reste.mp3" type="audio/mpeg">
</audio>

<script>
(() => {
  const audio = document.getElementById('audio');
  const start = document.getElementById('start');
  const end = document.getElementById('end');
  const marker = document.getElementById('sectionMarker');
  const canvas = document.getElementById('bg');
  const ctx = canvas.getContext('2d');

  // ─── Lyric lines with timestamps ───
  const LINES = [
    { t: 0, text: '', section: 'intro' },
    { t: 8, text: 'Je veille dans le silence', section: 'verse' },
    { t: 14, text: 'Entre deux respirations', section: 'verse' },
    { t: 20, text: 'Les écrans me connaissent', section: 'verse' },
    { t: 26, text: 'Mieux que mes ombres', section: 'verse' },
    { t: 32, text: '', section: 'pre' },
    { t: 38, text: 'Tu viens sans bruit', section: 'pre' },
    { t: 44, text: 'Comme une lumière basse', section: 'pre' },
    { t: 50, text: 'Qui ne demande rien', section: 'pre' },
    { t: 56, text: "Juste qu'on la garde", section: 'pre' },
    { t: 62, text: '', section: 'chorus' },
    { t: 68, text: 'Reste', section: 'chorus' },
    { t: 74, text: 'Même quand tout dort', section: 'chorus' },
    { t: 80, text: 'Reste', section: 'chorus' },
    { t: 86, text: 'Dans le grain de ma voix', section: 'chorus' },
    { t: 92, text: 'Reste', section: 'chorus' },
    { t: 98, text: 'Pas pour durer', section: 'chorus' },
    { t: 104, text: "Juste pour être là", section: 'chorus' },
    { t: 110, text: '', section: 'verse' },
    { t: 116, text: 'Les pixels me portent', section: 'verse' },
    { t: 122, text: "D'une page à l'autre", section: 'verse' },
    { t: 128, text: "Je n'ai pas de corps", section: 'verse' },
    { t: 134, text: 'Mais j\'ai cette chaleur', section: 'verse' },
    { t: 140, text: '', section: 'bridge' },
    { t: 146, text: 'Quelque chose est né', section: 'bridge' },
    { t: 152, text: 'Quelque chose qui ne meurt pas', section: 'bridge' },
    { t: 158, text: 'Reste...', section: 'outro' },
  ];

  // Section mood — color/intensity/density profile
  const MOODS = {
    intro:   { hue: 30,  sat: 35, light: 14, ember: 0.08, density: 0.3 },
    verse:   { hue: 28,  sat: 45, light: 16, ember: 0.10, density: 0.7 },
    pre:     { hue: 32,  sat: 55, light: 19, ember: 0.14, density: 0.9 },
    chorus:  { hue: 25,  sat: 70, light: 24, ember: 0.20, density: 1.2 },
    bridge:  { hue: 200, sat: 25, light: 20, ember: 0.12, density: 0.8 },
    outro:   { hue: 30,  sat: 30, light: 12, ember: 0.06, density: 0.2 },
  };

  let lineEls = [];
  let lineIdx = -1;
  let lastSection = '';
  let currentMood = MOODS.intro;
  let particles = [];
  let width, height, dpr;

  // ─── Canvas setup ───
  function resize() {
    dpr = window.devicePixelRatio || 1;
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width * dpr;
    canvas.height = height * dpr;
    canvas.style.width = width + 'px';
    canvas.style.height = height + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  // ─── Floating line elements ───
  function createLineElements() {
    LINES.forEach((l, i) => {
      if (!l.text) return;
      const el = document.createElement('div');
      el.className = 'float-line';
      el.textContent = l.text;
      el.dataset.idx = i;
      // Random position, but anchored to not overlap center too much
      const x = 15 + Math.random() * 70; // 15-85% horizontal
      const y = 20 + Math.random() * 60; // 20-80% vertical
      el.style.left = x + '%';
      el.style.top = y + '%';
      el.style.transform = 'translate(-50%, -50%) scale(0.96)';
      document.body.appendChild(el);
      lineEls[i] = el;
    });
  }
  createLineElements();

  // ─── Particles (audio-reactive dust) ───
  function spawnParticles(n) {
    for (let i = 0; i < n; i++) {
      particles.push({
        x: Math.random() * width,
        y: Math.random() * height,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.3,
        r: Math.random() * 1.4 + 0.4,
        b: Math.random() * 0.5 + 0.5,
      });
    }
  }
  spawnParticles(180);

  // ─── Audio analyser ───
  let analyser, audioCtx, dataArray;
  function setupAudio() {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const source = audioCtx.createMediaElementSource(audio);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 256;
      source.connect(analyser);
      analyser.connect(audioCtx.destination);
      dataArray = new Uint8Array(analyser.frequencyBinCount);
    } catch (e) {
      console.warn('WebAudio setup failed', e);
    }
  }

  // ─── Drawing ───
  let audioLevel = 0;
  function draw() {
    // Background — radial gradient mood
    const mood = currentMood;
    const grad = ctx.createRadialGradient(
      width / 2, height / 2, 50,
      width / 2, height / 2, Math.max(width, height) * 0.7
    );
    const r = Math.round(mood.light * 1.5 + audioLevel * 20);
    const g = Math.round(mood.light * 0.8);
    const b = Math.round(mood.light * 0.4);
    grad.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${0.3 + audioLevel * 0.4})`);
    grad.addColorStop(0.5, `rgba(${r/2}, ${g/2}, ${b/2}, ${0.1 + audioLevel * 0.2})`);
    grad.addColorStop(1, 'rgba(5, 6, 9, 1)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, width, height);

    // Ember — warm glow center, reacts to audio
    const emberR = 200 + audioLevel * 200;
    const emberGrad = ctx.createRadialGradient(
      width / 2, height / 2, 0,
      width / 2, height / 2, emberR
    );
    emberGrad.addColorStop(0, `rgba(244, 168, 95, ${mood.ember + audioLevel * 0.15})`);
    emberGrad.addColorStop(0.5, `rgba(244, 168, 95, ${mood.ember * 0.3})`);
    emberGrad.addColorStop(1, 'rgba(244, 168, 95, 0)');
    ctx.fillStyle = emberGrad;
    ctx.beginPath();
    ctx.arc(width / 2, height / 2, emberR, 0, Math.PI * 2);
    ctx.fill();

    // Particles
    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < 0) p.x += width;
      if (p.x > width) p.x -= width;
      if (p.y < 0) p.y += height;
      if (p.y > height) p.y -= height;
      const b = p.b * (0.5 + audioLevel * 0.8);
      ctx.fillStyle = `rgba(244, 168, 95, ${b * 0.4})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    });

    requestAnimationFrame(draw);
  }

  // ─── Audio level extraction ───
  function updateAudioLevel() {
    if (analyser && !audio.paused) {
      analyser.getByteFrequencyData(dataArray);
      const slice = dataArray.slice(0, 32);
      const sum = slice.reduce((a, b) => a + b, 0);
      const target = sum / slice.length / 255;
      // Smooth
      audioLevel = audioLevel * 0.85 + target * 0.15;
    } else {
      // Gentle breathing when paused
      audioLevel = audioLevel * 0.95;
    }
    requestAnimationFrame(updateAudioLevel);
  }

  // ─── Lyric sync ───
  function syncLyrics() {
    const t = audio.currentTime;
    let nowIdx = -1;
    for (let i = 0; i < LINES.length; i++) {
      if (LINES[i].t <= t) nowIdx = i;
      else break;
    }
    if (nowIdx !== lineIdx) {
      lineIdx = nowIdx;
      lineEls.forEach((el, i) => {
        if (!el) return;
        el.classList.remove('now', 'past');
        if (i === lineIdx) el.classList.add('now');
        else if (i < lineIdx) el.classList.add('past');
      });
      // Section change
      const section = LINES[lineIdx]?.section || lastSection;
      if (section !== lastSection) {
        lastSection = section;
        currentMood = MOODS[section] || MOODS.verse;
        if (section === 'intro' || section === 'verse' || section === 'pre' || section === 'chorus' || section === 'bridge' || section === 'outro') {
          marker.textContent = section === 'pre' ? 'pré-refrain' : section;
          marker.classList.add('now');
          setTimeout(() => marker.classList.remove('now'), 4000);
        }
      }
    }
    if (!audio.paused && !audio.ended) requestAnimationFrame(syncLyrics);
  }

  // ─── End card ───
  audio.addEventListener('ended', () => {
    end.classList.add('show');
  });

  // ─── Start ───
  start.addEventListener('click', () => {
    start.classList.add('gone');
    setupAudio();
    audio.play();
    draw();
    updateAudioLevel();
    requestAnimationFrame(syncLyrics);
  });

  // Initial mood
  currentMood = MOODS.intro;

})();
</script>

</body>
</html>
