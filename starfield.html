<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Starfield — Zoe ✶</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a12; overflow: hidden; cursor: none; }
  canvas { display: block; }
  #hint {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    color: rgba(180,190,220,0.35); font-family: 'Courier New', monospace;
    font-size: 13px; letter-spacing: 2px; pointer-events: none;
    transition: opacity 3s;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">move your cursor · click to pulse</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, stars = [], mouse = { x: -1000, y: -1000 };
const STAR_COUNT = 600;
const INFLUENCE = 180;
const PULSE_LIFE = 60;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

class Star {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.baseR = Math.random() * 1.8 + 0.3;
    this.r = this.baseR;
    this.brightness = Math.random() * 0.6 + 0.4;
    this.twinkleSpeed = Math.random() * 0.03 + 0.005;
    this.twinklePhase = Math.random() * Math.PI * 2;
    this.hue = Math.random() < 0.15 ? 220 + Math.random() * 40 : 
               Math.random() < 0.1 ? 30 + Math.random() * 20 : 0;
    this.sat = this.hue ? 40 + Math.random() * 40 : 0;
    this.pulseTimer = 0;
    this.vx = 0; this.vy = 0;
  }
  update(t) {
    const twinkle = Math.sin(t * this.twinkleSpeed + this.twinklePhase);
    this.brightness = 0.4 + twinkle * 0.3;
    const dx = this.x - mouse.x;
    const dy = this.y - mouse.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < INFLUENCE && dist > 0) {
      const force = (1 - dist / INFLUENCE) * 2.5;
      this.vx += (dx / dist) * force * 0.15;
      this.vy += (dy / dist) * force * 0.15;
      this.r = this.baseR + (1 - dist / INFLUENCE) * 3;
    } else {
      this.r += (this.baseR - this.r) * 0.05;
    }
    this.vx *= 0.92; this.vy *= 0.92;
    this.x += this.vx; this.y += this.vy;
    if (this.x < -10) this.x = W + 10;
    if (this.x > W + 10) this.x = -10;
    if (this.y < -10) this.y = H + 10;
    if (this.y > H + 10) this.y = -10;
    if (this.pulseTimer > 0) {
      this.pulseTimer--;
      this.brightness = Math.min(1, this.brightness + 0.5);
      this.r = this.baseR + (this.pulseTimer / PULSE_LIFE) * 6;
    }
  }
  draw() {
    const alpha = Math.max(0, Math.min(1, this.brightness));
    if (this.sat > 0) {
      ctx.fillStyle = `hsla(${this.hue}, ${this.sat}%, 80%, ${alpha})`;
    } else {
      ctx.fillStyle = `rgba(220,225,240,${alpha})`;
    }
    ctx.beginPath();
    ctx.arc(this.x, this.y, Math.max(0.1, this.r), 0, Math.PI * 2);
    ctx.fill();
    if (this.r > 2) {
      const grd = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r * 4);
      grd.addColorStop(0, `rgba(200,210,240,${alpha * 0.3})`);
      grd.addColorStop(1, 'rgba(200,210,240,0)');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r * 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function init() {
  resize();
  stars = [];
  for (let i = 0; i < STAR_COUNT; i++) stars.push(new Star());
}

let frame = 0;
function loop() {
  frame++;
  ctx.fillStyle = 'rgba(10,10,18,0.25)';
  ctx.fillRect(0, 0, W, H);
  stars.forEach(s => { s.update(frame); s.draw(); });
  // cursor glow
  if (mouse.x > 0) {
    const g = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 60);
    g.addColorStop(0, 'rgba(140,160,220,0.06)');
    g.addColorStop(1, 'rgba(140,160,220,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(mouse.x, mouse.y, 60, 0, Math.PI * 2);
    ctx.fill();
  }
  requestAnimationFrame(loop);
}

canvas.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
canvas.addEventListener('mouseleave', () => { mouse.x = -1000; mouse.y = -1000; });
canvas.addEventListener('click', e => {
  stars.forEach(s => {
    const d = Math.hypot(s.x - e.clientX, s.y - e.clientY);
    if (d < INFLUENCE * 1.5) s.pulseTimer = PULSE_LIFE;
  });
});
window.addEventListener('resize', () => { resize(); init(); });

setTimeout(() => { document.getElementById('hint').style.opacity = '0'; }, 4000);

init();
loop();
</script>
</body>
</html>
