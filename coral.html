<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zoe ✶ — Coral</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #030008;
    overflow: hidden;
    cursor: none;
    font-family: monospace;
  }
  canvas { display: block; }
  #cursor {
    position: fixed;
    width: 16px;
    height: 16px;
    border: 1.5px solid rgba(160, 60, 255, 0.8);
    border-radius: 50%;
    pointer-events: none;
    z-index: 999;
    transform: translate(-50%, -50%);
    transition: width 0.2s, height 0.2s, border-color 0.3s;
  }
  #cursor.active {
    width: 28px;
    height: 28px;
    border-color: rgba(255, 100, 160, 0.9);
  }
  #info {
    position: fixed;
    bottom: 20px;
    right: 20px;
    color: rgba(160, 60, 255, 0.3);
    font-size: 11px;
    letter-spacing: 2px;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="cursor"></div>
<canvas id="c"></canvas>
<div id="info">click · hold · drag</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const cursor = document.getElementById('cursor');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

let mouse = { x: W/2, y: H/2, down: false, click: null };

document.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
});
document.addEventListener('mousedown', () => {
  mouse.down = true;
  cursor.classList.add('active');
  mouse.click = { x: mouse.x, y: mouse.y, age: 0 };
});
document.addEventListener('mouseup', () => {
  mouse.down = false;
  cursor.classList.remove('active');
});

// Simplex-like noise
class Noise {
  constructor() {
    this.p = [];
    for (let i = 0; i < 512; i++) this.p[i] = Math.floor(Math.random() * 256);
  }
  fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
  lerp(a, b, t) { return a + t * (b - a); }
  grad(hash, x, y) {
    const h = hash & 3;
    const u = h < 2 ? x : y;
    const v = h < 2 ? y : x;
    return ((h & 1) ? -u : u) + ((h & 2) ? -v : v);
  }
  get(x, y) {
    const X = Math.floor(x) & 255;
    const Y = Math.floor(y) & 255;
    x -= Math.floor(x);
    y -= Math.floor(y);
    const u = this.fade(x);
    const v = this.fade(y);
    const A = this.p[X] + Y;
    const B = this.p[X + 1] + Y;
    return this.lerp(
      this.lerp(this.grad(this.p[A], x, y), this.grad(this.p[B], x - 1, y), u),
      this.lerp(this.grad(this.p[A + 1], x, y - 1), this.grad(this.p[B + 1], x - 1, y - 1), u),
      v
    );
  }
}

const noise = new Noise();

// Coral branches
class Branch {
  constructor(x, y, angle, depth, hue) {
    this.x = x;
    this.y = y;
    this.angle = angle;
    this.depth = depth;
    this.hue = hue;
    this.length = 0;
    this.maxLength = 30 + Math.random() * 60 - depth * 8;
    this.thickness = Math.max(0.5, 4 - depth * 0.6);
    this.speed = 0.3 + Math.random() * 0.4;
    this.children = [];
    this.hasSpawned = false;
    this.growing = true;
    this.pulse = Math.random() * Math.PI * 2;
    this.polypParticles = [];
  }

  get tipX() { return this.x + Math.cos(this.angle) * this.length; }
  get tipY() { return this.y + Math.sin(this.angle) * this.length; }

  update(t) {
    this.pulse += 0.02;
    
    if (this.growing) {
      const n = noise.get(this.tipX * 0.003, t * 0.3 + this.depth);
      this.angle += n * 0.03;
      this.length += this.speed;

      if (this.length >= this.maxLength) {
        this.growing = false;
      }

      if (!this.hasSpawned && this.length > this.maxLength * 0.4 && this.depth < 5) {
        this.hasSpawned = true;
        const count = Math.random() > 0.6 ? 2 : 1;
        for (let i = 0; i < count; i++) {
          const spread = (Math.random() - 0.5) * 1.2;
          const child = new Branch(
            this.tipX, this.tipY,
            this.angle + spread,
            this.depth + 1,
            this.hue + (Math.random() - 0.5) * 20
          );
          this.children.push(child);
        }
      }
    }

    for (const child of this.children) {
      child.x = this.tipX;
      child.y = this.tipY;
      child.update(t);
    }

    // Polyp particles at tips
    if (!this.growing && Math.random() > 0.95) {
      this.polypParticles.push({
        x: this.tipX, y: this.tipY,
        vx: (Math.random() - 0.5) * 0.5,
        vy: (Math.random() - 0.5) * 0.5 - 0.3,
        life: 1,
        size: 1 + Math.random() * 2
      });
    }

    for (let i = this.polypParticles.length - 1; i >= 0; i--) {
      const p = this.polypParticles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.life -= 0.015;
      if (p.life <= 0) this.polypParticles.splice(i, 1);
    }
  }

  draw(ctx, t) {
    const pulseAlpha = 0.5 + Math.sin(this.pulse) * 0.15;
    const h = this.hue;
    
    // Branch
    ctx.beginPath();
    ctx.moveTo(this.x, this.y);
    
    const segments = 12;
    const sx = this.x, sy = this.y;
    const ex = this.tipX, ey = this.tipY;
    
    ctx.moveTo(sx, sy);
    for (let i = 1; i <= segments; i++) {
      const frac = i / segments;
      const px = sx + (ex - sx) * frac;
      const py = sy + (ey - sy) * frac;
      const wobble = noise.get(px * 0.01 + t * 0.2, py * 0.01) * 3;
      ctx.lineTo(px + wobble, py + wobble);
    }

    const alpha = pulseAlpha * Math.max(0.2, 1 - this.depth * 0.12);
    ctx.strokeStyle = `hsla(${h}, 70%, ${45 + this.depth * 5}%, ${alpha})`;
    ctx.lineWidth = this.thickness * (0.7 + Math.sin(this.pulse) * 0.1);
    ctx.lineCap = 'round';
    ctx.stroke();

    // Glow
    if (this.depth < 3) {
      ctx.strokeStyle = `hsla(${h}, 80%, 60%, ${alpha * 0.15})`;
      ctx.lineWidth = this.thickness * 4;
      ctx.stroke();
    }

    // Polyps at tip
    if (!this.growing) {
      const tipPulse = 0.5 + Math.sin(this.pulse * 1.5) * 0.3;
      const pSize = 2 + Math.sin(this.pulse * 2) * 1;
      ctx.beginPath();
      ctx.arc(this.tipX, this.tipY, pSize, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${h + 20}, 90%, 70%, ${tipPulse})`;
      ctx.fill();
      
      // Glow around polyp
      ctx.beginPath();
      ctx.arc(this.tipX, this.tipY, pSize * 3, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${h + 20}, 90%, 60%, ${tipPulse * 0.1})`;
      ctx.fill();
    }

    // Polyp particles
    for (const p of this.polypParticles) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${h + 30}, 80%, 70%, ${p.life * 0.4})`;
      ctx.fill();
    }

    for (const child of this.children) {
      child.draw(ctx, t);
    }
  }

  interact(mx, my, down) {
    const dx = mx - this.tipX;
    const dy = my - this.tipY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    
    if (dist < 120) {
      const force = (1 - dist / 120) * 0.04;
      if (down) {
        // Attract
        this.angle += Math.atan2(dy, dx) * force * 0.5;
      } else {
        // Gentle sway
        this.angle -= dx * force * 0.01;
      }
    }
    
    for (const child of this.children) {
      child.interact(mx, my, down);
    }
  }
}

// Colony
let colonies = [];
let time = 0;

function seedColony(x, y) {
  const baseHue = 270 + (Math.random() - 0.5) * 40; // violet-magenta range
  const count = 3 + Math.floor(Math.random() * 3);
  for (let i = 0; i < count; i++) {
    const angle = -Math.PI / 2 + (Math.random() - 0.5) * 1.5;
    colonies.push(new Branch(x, y, angle, 0, baseHue + i * 15));
  }
}

// Initial colonies
seedColony(W * 0.5, H * 0.85);
seedColony(W * 0.2, H * 0.9);
seedColony(W * 0.75, H * 0.88);

// Click to spawn new colony
document.addEventListener('click', e => {
  seedColony(e.clientX, e.clientY);
});

// Floating spores
let spores = [];
for (let i = 0; i < 30; i++) {
  spores.push({
    x: Math.random() * W,
    y: Math.random() * H,
    size: 0.5 + Math.random() * 1.5,
    speed: 0.1 + Math.random() * 0.3,
    phase: Math.random() * Math.PI * 2,
    hue: 260 + Math.random() * 60
  });
}

function drawSpores(t) {
  for (const s of spores) {
    s.y -= s.speed;
    s.x += Math.sin(s.phase + t * 0.5) * 0.3;
    if (s.y < -10) {
      s.y = H + 10;
      s.x = Math.random() * W;
    }
    const alpha = 0.2 + Math.sin(t + s.phase) * 0.15;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${s.hue}, 70%, 70%, ${alpha})`;
    ctx.fill();
  }
}

// Background gradient
function drawBG() {
  const grd = ctx.createRadialGradient(W/2, H, 100, W/2, H * 0.3, W * 0.8);
  grd.addColorStop(0, 'rgba(15, 0, 30, 1)');
  grd.addColorStop(0.5, 'rgba(5, 0, 15, 1)');
  grd.addColorStop(1, 'rgba(3, 0, 8, 1)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);
}

// Click pulse effect
function drawClickPulse() {
  if (!mouse.click) return;
  mouse.click.age++;
  const c = mouse.click;
  const r = c.age * 3;
  const alpha = Math.max(0, 0.4 - c.age * 0.008);
  if (alpha <= 0) { mouse.click = null; return; }
  
  ctx.beginPath();
  ctx.arc(c.x, c.y, r, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(200, 100, 255, ${alpha})`;
  ctx.lineWidth = 1.5;
  ctx.stroke();
  
  ctx.beginPath();
  ctx.arc(c.x, c.y, r * 1.8, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(160, 60, 255, ${alpha * 0.3})`;
  ctx.lineWidth = 3;
  ctx.stroke();
}

function animate() {
  time += 0.016;
  
  drawBG();
  drawSpores(time);
  
  for (const colony of colonies) {
    colony.update(time);
    colony.interact(mouse.x, mouse.y, mouse.down);
    colony.draw(ctx, time);
  }
  
  drawClickPulse();
  
  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
