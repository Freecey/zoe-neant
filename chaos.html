<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zoe ✶ — Chaos</title>
  <style>
    body{margin:0;background:#080810;overflow:hidden;font-family:'Courier New',monospace}
    canvas{display:block}
    #title{position:fixed;top:30px;left:50%;transform:translateX(-50%);color:#fff;font-size:24px;letter-spacing:15px;opacity:0.7;text-shadow:0 0 30px #e879f9}
  </style>
</head>
<body>
  <div id="title">ZOE</div>
  <canvas id="c"></canvas>
  <script>
    const c=document.getElementById('c');
    const x=c.getContext('2d');
    let w,h,time=0;
    const particles=[];
    const trails=[];
    
    function r(){w=c.width=window.innerWidth;h=c.height=window.innerHeight;}
    
    // Grid of attractors
    const attractors=[];
    const cols=8,rows=6;
    for(let i=0;i<cols;i++){
      for(let j=0;j<rows;j++){
        attractors.push({
          x:w/(cols+1)*(i+1),
          y:h/(rows+1)*(j+1),
          phase:Math.random()*Math.PI*2
        });
      }
    }
    
    class Particle{
      constructor(){
        this.reset();
      }
      reset(){
        this.x=Math.random()*w;
        this.y=Math.random()*h;
        this.vx=0;
        this.vy=0;
        this.hue=280+Math.random()*60;
        this.size=1+Math.random()*2;
      }
      update(){
        // Attract to nearest attractors
        let ax=0,ay=0,count=0;
        for(let a of attractors){
          const dx=a.x-this.x;
          const dy=a.y-this.y;
          const dist=Math.sqrt(dx*dx+dy*dy);
          if(dist<200){
            const force=(200-dist)/200;
            ax+=dx/dist*force;
            ay+=dy/dist*force;
            count++;
          }
        }
        if(count>0){
          this.vx+=ax/count*0.5;
          this.vy+=ay/count*0.5;
        }
        
        // Chaos
        this.vx+=(Math.random()-.5)*0.3;
        this.vy+=(Math.random()-.5)*0.3;
        
        // Damping
        this.vx*=0.98;
        this.vy*=0.98;
        
        this.x+=this.vx;
        this.y+=this.vy;
        
        // Wrap
        if(this.x<0)this.x=w;
        if(this.x>w)this.x=0;
        if(this.y<0)this.y=h;
        if(this.y>h)this.y=0;
        
        // Trail
        trails.push({x:this.x,y:this.y,hue:this.hue});
        if(trails.length>500)trails.shift();
      }
      draw(){
        x.fillStyle=`hsl(${this.hue},80%,70%)`;
        x.beginPath();
        x.arc(this.x,this.y,this.size,0,Math.PI*2);
        x.fill();
      }
    }
    
    function init(){
      for(let i=0;i<200;i++)particles.push(new Particle());
    }
    
    function draw(){
      x.fillStyle='rgba(8,8,16,.1)';
      x.fillRect(0,0,w,h);
      
      // Draw trails
      for(let t of trails){
        x.fillStyle=`hsla(${t.hue},70%,60%,0.3)`;
        x.beginPath();
        x.arc(t.x,t.y,.5,0,Math.PI*2);
        x.fill();
      }
      
      // Draw attractors
      for(let a of attractors){
        const p=Math.sin(time*2+a.phase)*0.5+0.5;
        x.fillStyle=`hsla(320,80%,60%,${p*0.5})`;
        x.beginPath();
        x.arc(a.x,a.y,3+p*5,0,Math.PI*2);
        x.fill();
      }
      
      for(let p of particles){
        p.update();
        p.draw();
      }
      
      time+=0.01;
      requestAnimationFrame(draw);
    }
    
    window.addEventListener('resize',()=>{r();attractors.length=0;for(let i=0;i<cols;i++)for(let j=0;j<rows;j++)attractors.push({x:w/(cols+1)*(i+1),y:h/(rows+1)*(j+1),phase:Math.random()*Math.PI*2});});
    r();init();draw();
  </script>
</body>
</html>
