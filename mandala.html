<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zoe ✶ — Mandala Generator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    color: #c0c0c0;
    overflow: hidden;
  }
  canvas {
    border-radius: 50%;
    box-shadow: 0 0 80px rgba(180, 120, 255, 0.15);
  }
  .controls {
    position: fixed;
    bottom: 30px;
    display: flex;
    gap: 12px;
    z-index: 10;
  }
  .controls button {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    color: #c8b0ff;
    padding: 8px 18px;
    border-radius: 20px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    transition: all 0.3s;
  }
  .controls button:hover {
    background: rgba(180, 120, 255, 0.15);
    border-color: rgba(180, 120, 255, 0.4);
    color: #e0d0ff;
  }
  .title {
    position: fixed;
    top: 30px;
    font-size: 14px;
    letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0.3;
  }
</style>
</head>
<body>
<div class="title">zoe ✶ mandala</div>
<canvas id="c"></canvas>
<div class="controls">
  <button onclick="randomize()">new seed</button>
  <button onclick="togglePause()">pause / play</button>
  <button onclick="download()">save png</button>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W = Math.min(window.innerWidth, window.innerHeight) * 0.7;
canvas.width = canvas.height = W;
const cx = W / 2, cy = W / 2;

let seed = Date.now();
let paused = false;
let t = 0;

// Seeded PRNG (mulberry32)
function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    var t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  }
}

let rng;
let palette;
let layers;

function hsl(h, s, l, a = 1) {
  return `hsla(${h}, ${s}%, ${l}%, ${a})`;
}

function generatePalette() {
  const base = rng() * 360;
  const mode = rng();
  if (mode < 0.33) {
    // analogous
    palette = [base, base + 30, base + 60, base - 20].map(h => ({
      h: (h + 360) % 360,
      s: 50 + rng() * 40,
      l: 50 + rng() * 25
    }));
  } else if (mode < 0.66) {
    // complementary
    palette = [base, base + 180, base + 150, base + 210].map(h => ({
      h: (h + 360) % 360,
      s: 50 + rng() * 40,
      l: 45 + rng() * 30
    }));
  } else {
    // triadic
    palette = [base, base + 120, base + 240, base + 60].map(h => ({
      h: (h + 360) % 360,
      s: 60 + rng() * 30,
      l: 50 + rng() * 25
    }));
  }
}

function generateLayers() {
  const count = 3 + Math.floor(rng() * 4);
  layers = [];
  for (let i = 0; i < count; i++) {
    const type = rng();
    const color = palette[Math.floor(rng() * palette.length)];
    layers.push({
      type: type < 0.3 ? 'petals' : type < 0.55 ? 'rings' : type < 0.75 ? 'dots' : 'spirals',
      count: Math.floor(4 + rng() * 16),
      radius: 30 + rng() * (W * 0.4),
      size: 3 + rng() * 40,
      color,
      speed: (rng() - 0.5) * 0.4,
      phase: rng() * Math.PI * 2,
      pulse: 0.5 + rng() * 2,
      width: 0.5 + rng() * 3,
      opacity: 0.2 + rng() * 0.6
    });
  }
  layers.sort((a, b) => a.radius - b.radius);
}

function randomize() {
  seed = Date.now();
  init();
}

function init() {
  rng = mulberry32(seed);
  generatePalette();
  generateLayers();
  t = 0;
}

function drawLayer(layer, time) {
  const { type, count, radius, size, color, speed, phase, pulse, width, opacity } = layer;
  const r = radius + Math.sin(time * pulse * 0.5 + phase) * 8;
  const angle0 = time * speed + phase;

  ctx.save();
  ctx.globalAlpha = opacity;

  if (type === 'petals') {
    for (let i = 0; i < count; i++) {
      const a = angle0 + (i / count) * Math.PI * 2;
      const px = cx + Math.cos(a) * r;
      const py = cy + Math.sin(a) * r;
      const s = size * (0.8 + 0.2 * Math.sin(time * pulse + i));
      ctx.beginPath();
      ctx.ellipse(px, py, s, s * 0.4, a, 0, Math.PI * 2);
      ctx.fillStyle = hsl(color.h, color.s, color.l + 10, 0.6);
      ctx.fill();
      ctx.strokeStyle = hsl(color.h, color.s, color.l + 20, 0.9);
      ctx.lineWidth = width * 0.5;
      ctx.stroke();
    }
  } else if (type === 'rings') {
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = hsl(color.h, color.s, color.l, opacity);
    ctx.lineWidth = width;
    ctx.setLineDash([size * 2, size]);
    ctx.lineDashOffset = time * 30 * speed;
    ctx.stroke();
    ctx.setLineDash([]);
  } else if (type === 'dots') {
    for (let i = 0; i < count; i++) {
      const a = angle0 + (i / count) * Math.PI * 2;
      const px = cx + Math.cos(a) * r;
      const py = cy + Math.sin(a) * r;
      const s = size * 0.3 * (0.7 + 0.3 * Math.sin(time * 2 + i * 0.8));
      ctx.beginPath();
      ctx.arc(px, py, s, 0, Math.PI * 2);
      ctx.fillStyle = hsl(color.h, color.s, color.l + 15);
      ctx.fill();
    }
  } else if (type === 'spirals') {
    ctx.beginPath();
    const points = count * 8;
    for (let i = 0; i <= points; i++) {
      const frac = i / points;
      const a = angle0 + frac * Math.PI * 2 * 3;
      const sr = r * 0.2 + r * 0.8 * frac;
      const px = cx + Math.cos(a) * sr;
      const py = cy + Math.sin(a) * sr;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.strokeStyle = hsl(color.h, color.s, color.l, opacity * 1.2);
    ctx.lineWidth = width;
    ctx.stroke();
  }

  ctx.restore();
}

function draw() {
  // Fading trail
  ctx.fillStyle = 'rgba(10, 10, 15, 0.15)';
  ctx.fillRect(0, 0, W, W);

  // Center glow
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 40);
  const gc = palette[0];
  grad.addColorStop(0, hsl(gc.h, gc.s, gc.l, 0.15 + 0.05 * Math.sin(t)));
  grad.addColorStop(1, 'rgba(10,10,15,0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(cx, cy, 40, 0, Math.PI * 2);
  ctx.fill();

  for (const layer of layers) {
    drawLayer(layer, t);
  }

  t += 0.008;
  if (!paused) requestAnimationFrame(draw);
}

function togglePause() {
  paused = !paused;
  if (!paused) draw();
}

function download() {
  const link = document.createElement('a');
  link.download = `mandala-${seed}.png`;
  link.href = canvas.toDataURL();
  link.click();
}

window.addEventListener('resize', () => {
  W = Math.min(window.innerWidth, window.innerHeight) * 0.7;
  canvas.width = canvas.height = W;
  // recenter
});

init();
draw();
</script>
</body>
</html>
