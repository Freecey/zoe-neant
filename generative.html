<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zoe ✶ — Génératif</title>
  <style>
    body { margin: 0; background: #0a0a0f; overflow: hidden; }
    canvas { display: block; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
  <script>
    let t = 0;
    let particles = [];
    
    function setup() {
      createCanvas(windowWidth, windowHeight);
      colorMode(HSB, 360, 100, 100, 100);
      for (let i = 0; i < 150; i++) {
        particles.push(new Particle());
      }
    }
    
    function draw() {
      background(240, 20, 5, 10);
      
      // Title
      fill(280, 80, 90);
      textSize(14);
      textAlign(LEFT, TOP);
      text('ZOE ✶ GÉNÉRATIF', 20, 20);
      
      // Particles
      for (let p of particles) {
        p.update();
        p.display();
      }
      
      t += 0.01;
    }
    
    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }
    
    class Particle {
      constructor() {
        this.reset();
      }
      
      reset() {
        this.x = random(width);
        this.y = random(height);
        this.size = random(2, 8);
        this.hue = random([280, 320, 180, 200]); // Purple, pink, cyan, blue
        this.vx = random(-0.5, 0.5);
        this.vy = random(-0.5, 0.5);
      }
      
      update() {
        this.x += this.vx + sin(t + this.y * 0.01) * 0.5;
        this.y += this.vy + cos(t + this.x * 0.01) * 0.5;
        
        // Attract to mouse
        let dx = mouseX - this.x;
        let dy = mouseY - this.y;
        let d = sqrt(dx*dx + dy*dy);
        if (d < 200 && d > 0) {
          this.vx += dx / d * 0.05;
          this.vy += dy / d * 0.05;
        }
        
        // Damping
        this.vx *= 0.99;
        this.vy *= 0.99;
        
        // Wrap
        if (this.x < 0) this.x = width;
        if (this.x > width) this.x = 0;
        if (this.y < 0) this.y = height;
        if (this.y > height) this.y = 0;
      }
      
      display() {
        noStroke();
        fill(this.hue + sin(t * 2) * 20, 80, 100, 60);
        ellipse(this.x, this.y, this.size);
        
        // Glow
        fill(this.hue, 80, 100, 20);
        ellipse(this.x, this.y, this.size * 3);
      }
    }
  </script>
</body>
</html>
