<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucioles — Zoe ✶</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
canvas { display: block; cursor: none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ——— Perlin Noise (self-contained) ———
const Noise = (() => {
  const p = new Uint8Array(512);
  const perm = new Uint8Array(256);
  for (let i = 0; i < 256; i++) perm[i] = i;
  for (let i = 255; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [perm[i], perm[j]] = [perm[j], perm[i]];
  }
  for (let i = 0; i < 512; i++) p[i] = perm[i & 255];
  const fade = t => t * t * t * (t * (t * 6 - 15) + 10);
  const lerp = (a, b, t) => a + t * (b - a);
  const grad = (hash, x, y) => {
    const h = hash & 3;
    const u = h < 2 ? x : y;
    const v = h < 2 ? y : x;
    return ((h & 1) ? -u : u) + ((h & 2) ? -v : v);
  };
  return {
    noise2D(x, y) {
      const X = Math.floor(x) & 255, Y = Math.floor(y) & 255;
      const xf = x - Math.floor(x), yf = y - Math.floor(y);
      const u = fade(xf), v = fade(yf);
      const a = p[X] + Y, b = p[X + 1] + Y;
      return lerp(
        lerp(grad(p[a], xf, yf), grad(p[b], xf - 1, yf), u),
        lerp(grad(p[a + 1], xf, yf - 1), grad(p[b + 1], xf - 1, yf - 1), u), v
      );
    }
  };
})();

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, waterY, time = 0;
let mouse = { x: -1000, y: -1000 };

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  waterY = H * 0.62;
}
resize();
window.addEventListener('resize', resize);

canvas.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});
canvas.addEventListener('mouseleave', () => {
  mouse.x = -1000;
  mouse.y = -1000;
});

// ——— Stars ———
class Star {
  constructor() {
    this.x = Math.random() * W;
    this.y = Math.random() * waterY;
    this.r = 0.3 + Math.random() * 1.2;
    this.twinkleSpeed = 0.01 + Math.random() * 0.03;
    this.phase = Math.random() * Math.PI * 2;
  }
  draw(ctx, t) {
    const alpha = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(t * this.twinkleSpeed * 60 + this.phase));
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200, 210, 240, ${alpha})`;
    ctx.fill();
  }
}

// ——— Grass blades ———
class Grass {
  constructor(x) {
    this.x = x;
    this.baseY = waterY + Math.random() * 4;
    this.height = 25 + Math.random() * 55;
    this.width = 1 + Math.random() * 2;
    this.sway = 0.3 + Math.random() * 0.6;
    this.phase = Math.random() * Math.PI * 2;
    this.hue = 100 + Math.random() * 40;
  }
  draw(ctx, t) {
    const sway = Math.sin(t * 0.8 + this.phase) * this.sway * 6;
    const tipX = this.x + sway;
    const tipY = this.baseY - this.height;
    const cpX = this.x + sway * 0.5;
    const cpY = this.baseY - this.height * 0.6;

    ctx.beginPath();
    ctx.moveTo(this.x - this.width / 2, this.baseY);
    ctx.quadraticCurveTo(cpX - this.width * 0.3, cpY, tipX, tipY);
    ctx.quadraticCurveTo(cpX + this.width * 0.3, cpY, this.x + this.width / 2, this.baseY);
    ctx.fillStyle = `hsla(${this.hue}, 30%, 8%, 0.9)`;
    ctx.fill();
  }
}

// ——— Firefly ———
class Firefly {
  constructor() {
    this.reset();
  }
  reset() {
    this.x = Math.random() * W;
    this.y = 40 + Math.random() * (waterY - 100);
    this.vx = (Math.random() - 0.5) * 0.8;
    this.vy = (Math.random() - 0.5) * 0.6;
    this.phase = Math.random() * Math.PI * 2;
    this.pulseSpeed = 0.02 + Math.random() * 0.04;
    this.maxGlow = 0.5 + Math.random() * 0.5;
    this.size = 2 + Math.random() * 2;
    this.hue = 55 + Math.random() * 25; // warm yellow-green
    this.wanderStrength = 0.15 + Math.random() * 0.2;
  }
  update(t) {
    // Noise-driven wandering
    const nx = Noise.noise2D(this.x * 0.003, t * 0.3 + this.phase) * this.wanderStrength;
    const ny = Noise.noise2D(this.y * 0.003 + 100, t * 0.3 + this.phase) * this.wanderStrength;
    this.vx += nx * 0.05;
    this.vy += ny * 0.05;

    // Mouse gentle repulsion
    const dx = this.x - mouse.x;
    const dy = this.y - mouse.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 150 && dist > 0) {
      const force = (150 - dist) / 150 * 0.3;
      this.vx += (dx / dist) * force;
      this.vy += (dy / dist) * force;
    }

    // Damping
    this.vx *= 0.96;
    this.vy *= 0.96;

    this.x += this.vx;
    this.y += this.vy;

    // Soft bounds
    if (this.x < -20) this.x = W + 20;
    if (this.x > W + 20) this.x = -20;
    if (this.y < 20) this.vy += 0.1;
    if (this.y > waterY - 30) this.vy -= 0.1;
  }
  getBrightness(t) {
    return this.maxGlow * (0.5 + 0.5 * Math.sin(t * this.pulseSpeed * 60 + this.phase));
  }
  draw(ctx, t) {
    const bright = this.getBrightness(t);
    if (bright < 0.05) return;

    const alpha = bright;
    const glowR = this.size * (4 + bright * 12);

    // Outer glow
    const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, glowR);
    g.addColorStop(0, `hsla(${this.hue}, 90%, 70%, ${alpha * 0.6})`);
    g.addColorStop(0.3, `hsla(${this.hue}, 80%, 55%, ${alpha * 0.25})`);
    g.addColorStop(1, `hsla(${this.hue}, 80%, 50%, 0)`);
    ctx.fillStyle = g;
    ctx.fillRect(this.x - glowR, this.y - glowR, glowR * 2, glowR * 2);

    // Core
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * (0.5 + bright * 0.5), 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${this.hue}, 60%, 90%, ${alpha})`;
    ctx.fill();
  }
  drawReflection(ctx, t) {
    const bright = this.getBrightness(t);
    if (bright < 0.1) return;

    const reflY = waterY + (waterY - this.y) * 0.35;
    const alpha = bright * 0.35;
    const glowR = this.size * (3 + bright * 8);

    const g = ctx.createRadialGradient(this.x, reflY, 0, this.x, reflY, glowR);
    g.addColorStop(0, `hsla(${this.hue}, 70%, 60%, ${alpha})`);
    g.addColorStop(1, `hsla(${this.hue}, 70%, 50%, 0)`);
    ctx.fillStyle = g;
    ctx.fillRect(this.x - glowR, reflY - glowR, glowR * 2, glowR * 2);
  }
}

// ——— Init ———
const stars = Array.from({ length: 120 }, () => new Star());
const grasses = [];
for (let i = 0; i < W * 0.15; i++) {
  const side = Math.random() > 0.5;
  grasses.push(new Grass(side ? Math.random() * W * 0.15 : W - Math.random() * W * 0.15));
  if (Math.random() < 0.3) grasses.push(new Grass(Math.random() * W));
}
const fireflies = Array.from({ length: 80 }, () => new Firefly());

// Click spawns burst of ephemeral fireflies
canvas.addEventListener('click', e => {
  for (let i = 0; i < 15; i++) {
    const f = new Firefly();
    f.x = e.clientX + (Math.random() - 0.5) * 30;
    f.y = e.clientY + (Math.random() - 0.5) * 30;
    f.vx = (Math.random() - 0.5) * 4;
    f.vy = (Math.random() - 0.5) * 4;
    f.maxGlow = 0.8 + Math.random() * 0.2;
    fireflies.push(f);
  }
});

// ——— Custom cursor ———
function drawCursor(ctx) {
  if (mouse.x < 0) return;
  const g = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 20);
  g.addColorStop(0, 'rgba(200, 230, 100, 0.3)');
  g.addColorStop(1, 'rgba(200, 230, 100, 0)');
  ctx.fillStyle = g;
  ctx.fillRect(mouse.x - 20, mouse.y - 20, 40, 40);
  ctx.beginPath();
  ctx.arc(mouse.x, mouse.y, 3, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(220, 240, 120, 0.8)';
  ctx.fill();
}

// ——— Water surface ———
function drawWater(ctx, t) {
  // Base water
  const waterGrad = ctx.createLinearGradient(0, waterY, 0, H);
  waterGrad.addColorStop(0, 'rgba(5, 10, 20, 0.85)');
  waterGrad.addColorStop(0.3, 'rgba(3, 8, 18, 0.92)');
  waterGrad.addColorStop(1, 'rgba(2, 5, 12, 1)');
  ctx.fillStyle = waterGrad;
  ctx.fillRect(0, waterY, W, H - waterY);

  // Surface shimmer line
  ctx.beginPath();
  ctx.moveTo(0, waterY);
  for (let x = 0; x <= W; x += 3) {
    const wave = Noise.noise2D(x * 0.01, t * 0.5) * 2;
    ctx.lineTo(x, waterY + wave);
  }
  ctx.strokeStyle = 'rgba(80, 120, 160, 0.15)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Ripple highlights
  for (let i = 0; i < 6; i++) {
    const rx = W * (0.1 + (i / 6) * 0.8);
    const ry = waterY + 8 + Math.sin(t * 0.7 + i * 2) * 3;
    const rw = 30 + Math.sin(t * 0.5 + i) * 10;
    ctx.beginPath();
    ctx.ellipse(rx, ry, rw, 2, 0, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(80, 130, 180, ${0.05 + 0.03 * Math.sin(t + i)})`;
    ctx.fill();
  }
}

// ——— Sky gradient ———
function drawSky(ctx) {
  const g = ctx.createLinearGradient(0, 0, 0, waterY);
  g.addColorStop(0, '#020510');
  g.addColorStop(0.5, '#050a18');
  g.addColorStop(0.85, '#0a1525');
  g.addColorStop(1, '#0c1a2a');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, waterY);
}

// ——— Moon ———
function drawMoon(ctx, t) {
  const mx = W * 0.78, my = H * 0.12, mr = 25;
  // Glow
  const g = ctx.createRadialGradient(mx, my, mr * 0.5, mx, my, mr * 5);
  g.addColorStop(0, 'rgba(200, 210, 230, 0.08)');
  g.addColorStop(0.5, 'rgba(180, 200, 220, 0.02)');
  g.addColorStop(1, 'rgba(180, 200, 220, 0)');
  ctx.fillStyle = g;
  ctx.fillRect(mx - mr * 5, my - mr * 5, mr * 10, mr * 10);
  // Moon body
  ctx.beginPath();
  ctx.arc(mx, my, mr, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(210, 220, 240, 0.15)';
  ctx.fill();
  // Reflection
  const refMy = waterY + (waterY - my) * 0.25;
  const rg = ctx.createRadialGradient(mx, refMy, 0, mx, refMy, mr * 3);
  rg.addColorStop(0, 'rgba(200, 210, 230, 0.06)');
  rg.addColorStop(1, 'rgba(200, 210, 230, 0)');
  ctx.fillStyle = rg;
  ctx.fillRect(mx - mr * 3, refMy - mr * 3, mr * 6, mr * 6);
}

// ——— Render loop ———
function render() {
  time += 1 / 60;
  ctx.clearRect(0, 0, W, H);

  // Sky
  drawSky(ctx);

  // Stars
  stars.forEach(s => s.draw(ctx, time));

  // Moon
  drawMoon(ctx, time);

  // Fireflies (sky)
  ctx.globalCompositeOperation = 'lighter';
  fireflies.forEach(f => {
    f.update(time);
    f.draw(ctx, time);
  });
  ctx.globalCompositeOperation = 'source-over';

  // Water
  drawWater(ctx, time);

  // Firefly reflections
  ctx.globalCompositeOperation = 'lighter';
  fireflies.forEach(f => f.drawReflection(ctx, time));
  ctx.globalCompositeOperation = 'source-over';

  // Grass (over water edge)
  grasses.forEach(g => g.draw(ctx, time));

  // Cursor
  ctx.globalCompositeOperation = 'lighter';
  drawCursor(ctx);
  ctx.globalCompositeOperation = 'source-over';

  // Remove excess fireflies from clicks (cap at 200)
  if (fireflies.length > 200) {
    fireflies.splice(0, fireflies.length - 200);
  }

  requestAnimationFrame(render);
}
render();
</script>
</body>
</html>
