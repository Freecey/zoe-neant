<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zoe ✶</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    overflow: hidden;
    background: #06080f;
    font-family: 'Inter', sans-serif;
    height: 100vh;
    width: 100vw;
  }

  canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  /* ── Centered branding ── */
  .brand {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }

  .brand span {
    font-size: 1.4rem;
    font-weight: 300;
    letter-spacing: 0.35em;
    color: rgba(190, 210, 235, 0.75);
    text-shadow:
      0 0 20px rgba(100, 160, 220, 0.25),
      0 0 60px rgba(80, 140, 200, 0.10);
    animation: breathe 6s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { opacity: 0.70; }
    50%      { opacity: 1;    }
  }
</style>
</head>
<body>

<div class="brand"><span>Zoe ✶</span></div>
<canvas id="scene"></canvas>

<script>
/* ═══════════════════════════════════════════════════════════
   Zoe ✶  –  animated ocean + twinkling stars
   Pure canvas, no dependencies
   ═══════════════════════════════════════════════════════════ */

const canvas = document.getElementById('scene');
const ctx    = canvas.getContext('2d');

let W, H, dpr;

/* ── Resize handling ── */
function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

/* ── Stars ── */
const STAR_COUNT = 260;
const stars = Array.from({ length: STAR_COUNT }, () => ({
  x: Math.random(),
  y: Math.random() * 0.72,          // keep stars above the waves
  r: Math.random() * 1.3 + 0.3,
  phase: Math.random() * Math.PI * 2,
  speed: Math.random() * 0.6 + 0.3, // twinkle speed
  base: Math.random() * 0.4 + 0.35, // base brightness floor
}));

function drawStars(t) {
  for (const s of stars) {
    const flicker = s.base + (1 - s.base) * (0.5 + 0.5 * Math.sin(t * s.speed + s.phase));
    const alpha   = flicker * 0.9;
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(210,225,255,${alpha.toFixed(3)})`;
    ctx.fill();
  }
}

/* ── Wave layers ── */
const waves = [
  { color: 'rgba(20, 50, 100, 0.55)',  amp: 28, freq: 0.006, speed: 0.25, yOff: 0.70 },
  { color: 'rgba(15, 70, 110, 0.50)',  amp: 22, freq: 0.008, speed: 0.35, yOff: 0.74 },
  { color: 'rgba(10, 90, 120, 0.50)',  amp: 18, freq: 0.010, speed: 0.45, yOff: 0.78 },
  { color: 'rgba( 0,120, 130, 0.45)',  amp: 14, freq: 0.012, speed: 0.55, yOff: 0.82 },
  { color: 'rgba( 0,150, 140, 0.40)',  amp: 10, freq: 0.015, speed: 0.65, yOff: 0.86 },
  { color: 'rgba(40, 80,140, 0.30)',   amp:  8, freq: 0.018, speed: 0.80, yOff: 0.90 },
];

function drawWaves(t) {
  for (const w of waves) {
    const baseY = H * w.yOff;
    ctx.beginPath();
    ctx.moveTo(0, H);

    for (let x = 0; x <= W; x += 2) {
      const y = baseY
        + Math.sin(x * w.freq + t * w.speed)            * w.amp
        + Math.sin(x * w.freq * 0.6 + t * w.speed * 1.3) * w.amp * 0.4
        + Math.sin(x * w.freq * 1.8 + t * w.speed * 0.7) * w.amp * 0.15;
      ctx.lineTo(x, y);
    }

    ctx.lineTo(W, H);
    ctx.closePath();
    ctx.fillStyle = w.color;
    ctx.fill();
  }
}

/* ── Subtle ambient glow near horizon ── */
function drawGlow() {
  const grad = ctx.createRadialGradient(W * 0.5, H * 0.68, 0, W * 0.5, H * 0.68, W * 0.55);
  grad.addColorStop(0, 'rgba(40, 80, 160, 0.08)');
  grad.addColorStop(1, 'rgba(40, 80, 160, 0.00)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

/* ── Sky gradient ── */
function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0.0, '#06080f');
  grad.addColorStop(0.5, '#0a1020');
  grad.addColorStop(0.7, '#0d1830');
  grad.addColorStop(1.0, '#0f1e3a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

/* ── Moon glow (subtle) ── */
function drawMoon() {
  const mx = W * 0.78;
  const my = H * 0.15;
  const grad = ctx.createRadialGradient(mx, my, 2, mx, my, 120);
  grad.addColorStop(0.0, 'rgba(200, 215, 245, 0.18)');
  grad.addColorStop(0.3, 'rgba(150, 180, 230, 0.06)');
  grad.addColorStop(1.0, 'rgba(150, 180, 230, 0.00)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(mx, my, 120, 0, Math.PI * 2);
  ctx.fill();

  // tiny moon disc
  ctx.beginPath();
  ctx.arc(mx, my, 5, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(220, 230, 250, 0.60)';
  ctx.fill();
}

/* ── Main loop ── */
const T0 = performance.now();

function frame(now) {
  const t = (now - T0) / 1000; // seconds

  ctx.clearRect(0, 0, W, H);

  drawSky();
  drawMoon();
  drawStars(t);
  drawGlow();
  drawWaves(t);

  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
</script>
</body>
</html>
