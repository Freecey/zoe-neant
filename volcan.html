<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volcan — Zoe ✶</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; cursor: none; }
canvas { display: block; }
#title {
  position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
  font-family: 'Georgia', serif; font-size: 14px; letter-spacing: 4px;
  color: rgba(255, 120, 60, 0.35); text-transform: uppercase;
  pointer-events: none; z-index: 10;
}
#cursor {
  position: fixed; width: 12px; height: 12px; border-radius: 50%;
  background: radial-gradient(circle, rgba(255,140,50,0.8), rgba(255,60,20,0) 70%);
  pointer-events: none; z-index: 100; transform: translate(-50%, -50%);
  mix-blend-mode: screen;
}
#hint {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  font-family: monospace; font-size: 11px; color: rgba(255,100,40,0.3);
  pointer-events: none; z-index: 10;
}
</style>
</head>
<body>
<div id="title">Volcan</div>
<div id="cursor"></div>
<div id="hint">click — eruption &nbsp;|&nbsp; move — wind</div>
<canvas id="c"></canvas>
<script>
// --- Perlin Noise (compact) ---
const Noise = (() => {
  const p = new Uint8Array(512);
  const perm = new Uint8Array(256);
  for (let i = 0; i < 256; i++) perm[i] = i;
  for (let i = 255; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [perm[i], perm[j]] = [perm[j], perm[i]]; }
  for (let i = 0; i < 512; i++) p[i] = perm[i & 255];
  const fade = t => t * t * t * (t * (t * 6 - 15) + 10);
  const lerp = (a, b, t) => a + t * (b - a);
  const grad = (hash, x, y) => { const h = hash & 3; return ((h & 1) ? -x : x) + ((h & 2) ? -y : y); };
  return {
    noise2D(x, y) {
      const xi = Math.floor(x) & 255, yi = Math.floor(y) & 255;
      const xf = x - Math.floor(x), yf = y - Math.floor(y);
      const u = fade(xf), v = fade(yf);
      const aa = p[p[xi] + yi], ab = p[p[xi] + yi + 1], ba = p[p[xi + 1] + yi], bb = p[p[xi + 1] + yi + 1];
      return lerp(lerp(grad(aa, xf, yf), grad(ba, xf - 1, yf), u), lerp(grad(ab, xf, yf - 1), grad(bb, xf - 1, yf - 1), u), v);
    },
    noise3D(x, y, z) {
      const xi = Math.floor(x) & 255, yi = Math.floor(y) & 255, zi = Math.floor(z) & 255;
      const xf = x - Math.floor(x), yf = y - Math.floor(y), zf = z - Math.floor(z);
      const u = fade(xf), v = fade(yf), w = fade(zf);
      const aaa=p[p[p[xi]+yi]+zi], aba=p[p[p[xi]+yi+1]+zi], aab=p[p[p[xi]+yi]+zi+1], abb=p[p[p[xi]+yi+1]+zi+1];
      const baa=p[p[p[xi+1]+yi]+zi], bba=p[p[p[xi+1]+yi+1]+zi], bab=p[p[p[xi+1]+yi]+zi+1], bbb=p[p[p[xi+1]+yi+1]+zi+1];
      const g = (h,x,y,z) => { h&=15; const u=h<8?x:y, v=h<4?y:h===12||h===14?x:z; return ((h&1)?-u:u)+((h&2)?-v:v); };
      return lerp(lerp(lerp(g(aaa,xf,yf,zf),g(baa,xf-1,yf,zf),u),lerp(g(aba,xf,yf-1,zf),g(bba,xf-1,yf-1,zf),u),v),
                  lerp(lerp(g(aab,xf,yf,zf-1),g(bab,xf-1,yf,zf-1),u),lerp(g(abb,xf,yf-1,zf-1),g(bbb,xf-1,yf-1,zf-1),u),v),w);
    }
  };
})();

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const cursorEl = document.getElementById('cursor');
let W, H, time = 0;
let mouseX = -1000, mouseY = -1000;
let windX = 0; // mouse-driven wind

// --- Volcano geometry ---
let volcanoBaseY, craterY, craterLeftX, craterRightX, craterCenterX;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  volcanoBaseY = H * 0.95;
  craterY = H * 0.38;
  craterCenterX = W * 0.5;
  craterLeftX = craterCenterX - W * 0.04;
  craterRightX = craterCenterX + W * 0.04;
}
resize();
window.addEventListener('resize', resize);

// --- Mouse ---
document.addEventListener('mousemove', e => {
  mouseX = e.clientX; mouseY = e.clientY;
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top = e.clientY + 'px';
  // Wind: horizontal offset from center
  windX = (mouseX - W / 2) / W * 2; // -1 to 1
});
document.addEventListener('touchmove', e => {
  e.preventDefault();
  mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY;
  windX = (mouseX - W / 2) / W * 2;
}, { passive: false });

// --- Particles ---
const lavaParticles = [];
const smokeParticles = [];
const emberParticles = [];
const sparkParticles = [];

class LavaParticle {
  constructor(x, y, vx, vy, size) {
    this.x = x; this.y = y;
    this.vx = vx; this.vy = vy;
    this.size = size || (2 + Math.random() * 4);
    this.life = 1;
    this.decay = 0.002 + Math.random() * 0.004;
    this.hue = 15 + Math.random() * 30; // orange-red
    this.trail = [];
    this.maxTrail = 12;
    this.glowing = true;
  }
  update() {
    this.trail.push({ x: this.x, y: this.y });
    if (this.trail.length > this.maxTrail) this.trail.shift();
    this.vy += 0.08; // gravity
    this.vx += windX * 0.01;
    this.x += this.vx;
    this.y += this.vy;
    this.life -= this.decay;
    // Bounce off volcano slope
    const slopeY = getVolcanoY(this.x);
    if (this.y > slopeY) {
      this.y = slopeY;
      this.vy *= -0.3;
      this.vx *= 0.8;
      // Roll downhill
      const centerDist = this.x - craterCenterX;
      this.vx += centerDist > 0 ? 0.3 : -0.3;
    }
    return this.life > 0;
  }
  draw(ctx) {
    if (this.trail.length > 1) {
      ctx.beginPath();
      ctx.moveTo(this.trail[0].x, this.trail[0].y);
      for (let i = 1; i < this.trail.length; i++) ctx.lineTo(this.trail[i].x, this.trail[i].y);
      ctx.lineTo(this.x, this.y);
      ctx.strokeStyle = `hsla(${this.hue}, 100%, 55%, ${this.life * 0.4})`;
      ctx.lineWidth = this.size * this.life * 0.5;
      ctx.stroke();
    }
    const s = this.size * this.life;
    const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, s * 3);
    g.addColorStop(0, `hsla(${this.hue}, 100%, 80%, ${this.life * 0.9})`);
    g.addColorStop(0.3, `hsla(${this.hue}, 100%, 55%, ${this.life * 0.5})`);
    g.addColorStop(1, `hsla(${this.hue}, 100%, 40%, 0)`);
    ctx.fillStyle = g;
    ctx.fillRect(this.x - s * 3, this.y - s * 3, s * 6, s * 6);
  }
}

class SmokeParticle {
  constructor(x, y, big) {
    this.x = x; this.y = y;
    this.vx = (Math.random() - 0.5) * 0.8 + windX * 0.5;
    this.vy = -(1 + Math.random() * 2);
    this.size = big ? (20 + Math.random() * 40) : (8 + Math.random() * 20);
    this.life = 1;
    this.decay = 0.003 + Math.random() * 0.005;
    this.rotation = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 0.02;
  }
  update() {
    this.x += this.vx + windX * 0.3;
    this.y += this.vy;
    this.vy *= 0.995;
    this.vx *= 0.99;
    this.size += 0.3;
    this.life -= this.decay;
    this.rotation += this.rotSpeed;
    return this.life > 0;
  }
  draw(ctx) {
    const alpha = this.life * 0.08;
    const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
    g.addColorStop(0, `rgba(80, 60, 50, ${alpha})`);
    g.addColorStop(0.5, `rgba(50, 40, 35, ${alpha * 0.5})`);
    g.addColorStop(1, `rgba(30, 25, 20, 0)`);
    ctx.fillStyle = g;
    ctx.fillRect(this.x - this.size, this.y - this.size, this.size * 2, this.size * 2);
  }
}

class EmberParticle {
  constructor(x, y, burst) {
    this.x = x; this.y = y;
    if (burst) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 2 + Math.random() * 5;
      this.vx = Math.cos(angle) * speed;
      this.vy = Math.sin(angle) * speed - 2;
      this.life = 0.5 + Math.random() * 1;
    } else {
      this.vx = (Math.random() - 0.5) * 2;
      this.vy = -(1 + Math.random() * 3);
      this.life = 0.8 + Math.random() * 1.5;
    }
    this.size = 1 + Math.random() * 2.5;
    this.decay = 0.008 + Math.random() * 0.012;
    this.hue = 20 + Math.random() * 30;
    this.brightness = 50 + Math.random() * 30;
  }
  update() {
    this.x += this.vx + windX * 0.2;
    this.y += this.vy;
    this.vy += 0.02; // slight gravity but mostly rising
    this.vx *= 0.99;
    this.life -= this.decay;
    return this.life > 0;
  }
  draw(ctx) {
    const alpha = this.life;
    const s = this.size * (0.5 + this.life * 0.5);
    // Glow
    const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, s * 4);
    g.addColorStop(0, `hsla(${this.hue}, 100%, ${this.brightness}%, ${alpha})`);
    g.addColorStop(1, `hsla(${this.hue}, 100%, ${this.brightness}%, 0)`);
    ctx.fillStyle = g;
    ctx.fillRect(this.x - s * 4, this.y - s * 4, s * 8, s * 8);
    // Core
    ctx.beginPath();
    ctx.arc(this.x, this.y, s, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${this.hue - 5}, 100%, 85%, ${alpha})`;
    ctx.fill();
  }
}

// --- Volcano shape ---
function getVolcanoY(x) {
  const cx = craterCenterX;
  const dx = x - cx;
  const absDx = Math.abs(dx);
  const halfWidth = W * 0.35;
  if (absDx > halfWidth) return volcanoBaseY;
  // Crater dip
  const craterHalfW = W * 0.04;
  const craterDepth = H * 0.02;
  const slopeY = craterY + (volcanoBaseY - craterY) * Math.pow(absDx / halfWidth, 1.3);
  if (absDx < craterHalfW) {
    return slopeY + craterDepth * (1 - absDx / craterHalfW);
  }
  // Noise roughness
  const roughness = Noise.noise2D(x * 0.005, 0) * 8;
  return slopeY + roughness;
}

// --- Stars ---
const stars = [];
for (let i = 0; i < 200; i++) {
  stars.push({
    x: Math.random() * 3000,
    y: Math.random() * 3000,
    size: 0.5 + Math.random() * 1.5,
    twinkleSpeed: 0.5 + Math.random() * 2,
    twinkleOffset: Math.random() * Math.PI * 2
  });
}

function drawStars() {
  for (const s of stars) {
    const x = s.x % W;
    const y = s.y % (craterY * 1.1);
    const alpha = 0.3 + 0.4 * Math.sin(time * s.twinkleSpeed + s.twinkleOffset);
    ctx.beginPath();
    ctx.arc(x, y, s.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 240, 220, ${alpha})`;
    ctx.fill();
  }
}

// --- Draw volcano body ---
function drawVolcano() {
  // Mountain shape
  ctx.beginPath();
  ctx.moveTo(0, volcanoBaseY);
  const step = 3;
  for (let x = 0; x <= W; x += step) {
    const y = getVolcanoY(x);
    ctx.lineTo(x, y);
  }
  ctx.lineTo(W, volcanoBaseY);
  ctx.closePath();

  // Gradient fill
  const g = ctx.createLinearGradient(0, craterY, 0, volcanoBaseY);
  g.addColorStop(0, '#1a0f0a');
  g.addColorStop(0.3, '#120a06');
  g.addColorStop(0.7, '#0a0604');
  g.addColorStop(1, '#050302');
  ctx.fillStyle = g;
  ctx.fill();

  // Lava glow at crater
  const glowIntensity = 0.4 + 0.15 * Math.sin(time * 1.5) + 0.1 * Math.sin(time * 3.7);
  const lavaGlow = ctx.createRadialGradient(
    craterCenterX, craterY + H * 0.01, 5,
    craterCenterX, craterY + H * 0.01, W * 0.15
  );
  lavaGlow.addColorStop(0, `rgba(255, 100, 20, ${glowIntensity})`);
  lavaGlow.addColorStop(0.3, `rgba(255, 60, 10, ${glowIntensity * 0.4})`);
  lavaGlow.addColorStop(0.6, `rgba(200, 30, 5, ${glowIntensity * 0.15})`);
  lavaGlow.addColorStop(1, 'rgba(100, 10, 0, 0)');
  ctx.fillStyle = lavaGlow;
  ctx.fillRect(0, 0, W, H);

  // Lava streams on slope
  drawLavaStreams();
}

function drawLavaStreams() {
  const streams = 5;
  for (let s = 0; s < streams; s++) {
    const offsetX = (s - 2) * W * 0.015;
    const startX = craterCenterX + offsetX;
    const startY = craterY + H * 0.015;
    const streamLen = H * (0.15 + 0.1 * Math.sin(time * 0.5 + s * 1.7));

    ctx.beginPath();
    ctx.moveTo(startX, startY);
    for (let i = 1; i <= 20; i++) {
      const t = i / 20;
      const y = startY + streamLen * t;
      const noiseOff = Noise.noise2D(s * 10 + t * 3, time * 0.3) * (20 + t * 30);
      const x = startX + noiseOff + offsetX * t * 2;
      ctx.lineTo(x, y);
    }

    const alpha = 0.2 + 0.1 * Math.sin(time * 2 + s);
    const hue = 20 + 15 * Math.sin(time * 0.8 + s * 0.7);
    ctx.strokeStyle = `hsla(${hue}, 100%, 55%, ${alpha})`;
    ctx.lineWidth = 2 + Math.sin(time + s) * 1;
    ctx.stroke();

    // Glow pass
    ctx.strokeStyle = `hsla(${hue}, 100%, 50%, ${alpha * 0.3})`;
    ctx.lineWidth = 8;
    ctx.stroke();
  }
}

// --- Spawn functions ---
function spawnLava() {
  if (lavaParticles.length < 100 && Math.random() < 0.15) {
    const x = craterCenterX + (Math.random() - 0.5) * W * 0.06;
    const y = craterY + H * 0.01;
    const side = Math.random() > 0.5 ? 1 : -1;
    lavaParticles.push(new LavaParticle(
      x, y,
      side * (1 + Math.random() * 2),
      -(0.5 + Math.random() * 2),
      2 + Math.random() * 3
    ));
  }
}

function spawnSmoke() {
  if (smokeParticles.length < 60 && Math.random() < 0.1) {
    const x = craterCenterX + (Math.random() - 0.5) * W * 0.06;
    const y = craterY - 5;
    smokeParticles.push(new SmokeParticle(x, y, Math.random() > 0.7));
  }
}

function spawnEmbers() {
  if (emberParticles.length < 80 && Math.random() < 0.12) {
    const x = craterCenterX + (Math.random() - 0.5) * W * 0.06;
    const y = craterY;
    emberParticles.push(new EmberParticle(x, y, false));
  }
}

// --- Eruption on click ---
function erupt(ex, ey) {
  // Lava burst
  for (let i = 0; i < 30; i++) {
    const x = craterCenterX + (Math.random() - 0.5) * W * 0.05;
    const angle = -Math.PI / 2 + (Math.random() - 0.5) * 1.2;
    const speed = 3 + Math.random() * 6;
    lavaParticles.push(new LavaParticle(
      x, craterY,
      Math.cos(angle) * speed,
      Math.sin(angle) * speed,
      2 + Math.random() * 5
    ));
  }
  // Ember burst
  for (let i = 0; i < 60; i++) {
    emberParticles.push(new EmberParticle(
      craterCenterX + (Math.random() - 0.5) * W * 0.04,
      craterY,
      true
    ));
  }
  // Smoke burst
  for (let i = 0; i < 10; i++) {
    smokeParticles.push(new SmokeParticle(
      craterCenterX + (Math.random() - 0.5) * W * 0.08,
      craterY - 10,
      true
    ));
  }
}

canvas.addEventListener('click', e => { erupt(e.clientX, e.clientY); });
canvas.addEventListener('touchstart', e => { erupt(e.touches[0].clientX, e.touches[0].clientY); });

// --- Sky gradient ---
function drawSky() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#020108');
  g.addColorStop(0.5, '#080412');
  g.addColorStop(0.8, '#120810');
  g.addColorStop(1, '#1a0a08');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

// --- Main loop ---
function animate() {
  time += 0.016;

  drawSky();
  drawStars();

  // Spawn
  spawnLava();
  spawnSmoke();
  spawnEmbers();

  // Smoke behind volcano
  ctx.globalCompositeOperation = 'screen';
  for (let i = smokeParticles.length - 1; i >= 0; i--) {
    if (!smokeParticles[i].update()) { smokeParticles.splice(i, 1); continue; }
    smokeParticles[i].draw(ctx);
  }

  // Volcano body
  ctx.globalCompositeOperation = 'source-over';
  drawVolcano();

  // Lava & embers on top
  ctx.globalCompositeOperation = 'lighter';
  for (let i = lavaParticles.length - 1; i >= 0; i--) {
    if (!lavaParticles[i].update()) { lavaParticles.splice(i, 1); continue; }
    lavaParticles[i].draw(ctx);
  }
  for (let i = emberParticles.length - 1; i >= 0; i--) {
    if (!emberParticles[i].update()) { emberParticles.splice(i, 1); continue; }
    emberParticles[i].draw(ctx);
  }

  ctx.globalCompositeOperation = 'source-over';

  // Vignette
  const vig = ctx.createRadialGradient(W / 2, H / 2, W * 0.2, W / 2, H / 2, W * 0.8);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.6)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);

  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
