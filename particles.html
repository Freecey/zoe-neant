<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>zoe ✶ particles</title>
<style>
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #0a0a0f;
}

canvas {
  display: block;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}

.overlay {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Georgia', 'Times New Roman', serif;
  font-size: 14px;
  letter-spacing: 4px;
  color: #c8c8d4;
  opacity: 0.15;
  pointer-events: none;
  user-select: none;
  z-index: 10;
  white-space: nowrap;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div class="overlay">zoe ✶</div>

<script>
(() => {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  // --- Config ---
  const PARTICLE_COUNT = 200;
  const CONNECTION_DIST = 140;
  const MOUSE_RADIUS = 200;
  const MOUSE_STRENGTH = 0.015;
  const BASE_SPEED = 0.35;
  const PULSE_SPEED_MIN = 0.008;
  const PULSE_SPEED_MAX = 0.025;
  const PULSE_AMOUNT = 0.4; // fraction of base radius
  const FRICTION = 0.985;
  const WARM_CHANCE = 0.12; // ~12% of particles get warm tones

  // --- Palette ---
  // Cool: teals, cyans, soft purples
  // Warm: amber/gold accents
  const COOL_COLORS = [
    { r: 80,  g: 210, b: 200 }, // teal
    { r: 60,  g: 200, b: 220 }, // cyan
    { r: 90,  g: 180, b: 230 }, // light blue
    { r: 100, g: 160, b: 240 }, // soft blue
    { r: 140, g: 130, b: 220 }, // soft purple
    { r: 170, g: 120, b: 210 }, // lavender
    { r: 50,  g: 220, b: 180 }, // aquamarine
    { r: 70,  g: 190, b: 210 }, // steel cyan
  ];

  const WARM_COLORS = [
    { r: 240, g: 180, b: 60  }, // amber
    { r: 250, g: 200, b: 80  }, // gold
    { r: 230, g: 160, b: 70  }, // warm amber
    { r: 220, g: 190, b: 100 }, // soft gold
  ];

  // --- State ---
  let W, H;
  let mouse = { x: -9999, y: -9999, active: false };
  let particles = [];

  function pickColor() {
    if (Math.random() < WARM_CHANCE) {
      return WARM_COLORS[Math.floor(Math.random() * WARM_COLORS.length)];
    }
    return COOL_COLORS[Math.floor(Math.random() * COOL_COLORS.length)];
  }

  function createParticle() {
    const color = pickColor();
    const baseRadius = 1.2 + Math.random() * 2.0;
    return {
      x: Math.random() * W,
      y: Math.random() * H,
      vx: (Math.random() - 0.5) * BASE_SPEED * 2,
      vy: (Math.random() - 0.5) * BASE_SPEED * 2,
      baseRadius,
      radius: baseRadius,
      pulsePhase: Math.random() * Math.PI * 2,
      pulseSpeed: PULSE_SPEED_MIN + Math.random() * (PULSE_SPEED_MAX - PULSE_SPEED_MIN),
      color,
      alpha: 0.5 + Math.random() * 0.4,
    };
  }

  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function init() {
    resize();
    particles = [];
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      particles.push(createParticle());
    }
  }

  function updateParticle(p) {
    // Pulse
    p.pulsePhase += p.pulseSpeed;
    p.radius = p.baseRadius * (1 + Math.sin(p.pulsePhase) * PULSE_AMOUNT);

    // Mouse attraction
    if (mouse.active) {
      const dx = mouse.x - p.x;
      const dy = mouse.y - p.y;
      const distSq = dx * dx + dy * dy;
      const dist = Math.sqrt(distSq);
      if (dist < MOUSE_RADIUS && dist > 1) {
        const force = MOUSE_STRENGTH * (1 - dist / MOUSE_RADIUS);
        p.vx += (dx / dist) * force;
        p.vy += (dy / dist) * force;
      }
    }

    // Friction
    p.vx *= FRICTION;
    p.vy *= FRICTION;

    // Gentle drift to keep things moving
    const drift = 0.001;
    p.vx += (Math.random() - 0.5) * drift;
    p.vy += (Math.random() - 0.5) * drift;

    // Speed limit
    const maxSpeed = 2.5;
    const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
    if (speed > maxSpeed) {
      p.vx = (p.vx / speed) * maxSpeed;
      p.vy = (p.vy / speed) * maxSpeed;
    }

    p.x += p.vx;
    p.y += p.vy;

    // Wrap around edges with padding
    const pad = 20;
    if (p.x < -pad) p.x = W + pad;
    if (p.x > W + pad) p.x = -pad;
    if (p.y < -pad) p.y = H + pad;
    if (p.y > H + pad) p.y = -pad;
  }

  function drawParticle(p) {
    const r = Math.max(0.5, p.radius);
    const glowR = r * 4;

    // Soft glow
    const grad = ctx.createRadialGradient(p.x, p.y, r * 0.3, p.x, p.y, glowR);
    const c = p.color;
    grad.addColorStop(0, `rgba(${c.r},${c.g},${c.b},${p.alpha * 0.8})`);
    grad.addColorStop(0.3, `rgba(${c.r},${c.g},${c.b},${p.alpha * 0.2})`);
    grad.addColorStop(1, `rgba(${c.r},${c.g},${c.b},0)`);

    ctx.beginPath();
    ctx.arc(p.x, p.y, glowR, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // Core
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${c.r},${c.g},${c.b},${p.alpha})`;
    ctx.fill();
  }

  function drawConnections() {
    const maxDistSq = CONNECTION_DIST * CONNECTION_DIST;

    for (let i = 0; i < particles.length; i++) {
      const a = particles[i];
      for (let j = i + 1; j < particles.length; j++) {
        const b = particles[j];
        const dx = a.x - b.x;
        const dy = a.y - b.y;
        const distSq = dx * dx + dy * dy;

        if (distSq < maxDistSq) {
          const dist = Math.sqrt(distSq);
          const opacity = (1 - dist / CONNECTION_DIST) * 0.25;

          // Blend colors of the two particles
          const cr = Math.round((a.color.r + b.color.r) / 2);
          const cg = Math.round((a.color.g + b.color.g) / 2);
          const cb = Math.round((a.color.b + b.color.b) / 2);

          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.strokeStyle = `rgba(${cr},${cg},${cb},${opacity})`;
          ctx.lineWidth = 0.6;
          ctx.stroke();
        }
      }
    }
  }

  function drawMouseGlow() {
    if (!mouse.active) return;
    const grad = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, MOUSE_RADIUS * 0.8);
    grad.addColorStop(0, 'rgba(100,180,220,0.04)');
    grad.addColorStop(0.5, 'rgba(80,160,200,0.015)');
    grad.addColorStop(1, 'rgba(60,140,180,0)');
    ctx.beginPath();
    ctx.arc(mouse.x, mouse.y, MOUSE_RADIUS * 0.8, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
  }

  function frame() {
    ctx.clearRect(0, 0, W, H);

    // Update all particles
    for (let i = 0; i < particles.length; i++) {
      updateParticle(particles[i]);
    }

    // Draw connections first (behind particles)
    drawConnections();

    // Draw mouse glow
    drawMouseGlow();

    // Draw particles on top
    for (let i = 0; i < particles.length; i++) {
      drawParticle(particles[i]);
    }

    requestAnimationFrame(frame);
  }

  // --- Events ---
  window.addEventListener('resize', () => {
    resize();
  });

  window.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
    mouse.active = true;
  });

  window.addEventListener('mouseleave', () => {
    mouse.active = false;
  });

  window.addEventListener('touchmove', (e) => {
    if (e.touches.length > 0) {
      mouse.x = e.touches[0].clientX;
      mouse.y = e.touches[0].clientY;
      mouse.active = true;
    }
  }, { passive: true });

  window.addEventListener('touchstart', (e) => {
    if (e.touches.length > 0) {
      mouse.x = e.touches[0].clientX;
      mouse.y = e.touches[0].clientY;
      mouse.active = true;
    }
  }, { passive: true });

  window.addEventListener('touchend', () => {
    mouse.active = false;
  });

  // --- Start ---
  init();
  frame();
})();
</script>
</body>
</html>
