<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zoe ✶ — Rain</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #030810; cursor: none; }
  canvas { display: block; }
  #cursor {
    position: fixed; pointer-events: none; z-index: 10;
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(150, 200, 255, 0.5);
    box-shadow: 0 0 12px rgba(150, 200, 255, 0.3);
    transform: translate(-50%, -50%);
    transition: opacity 0.3s;
  }
</style>
</head>
<body>
<div id="cursor"></div>
<canvas id="c"></canvas>
<script>
// ─── Perlin Noise (self-contained) ───
const Noise = (() => {
  const p = new Uint8Array(512);
  const perm = new Uint8Array(256);
  for (let i = 0; i < 256; i++) perm[i] = i;
  // Shuffle
  for (let i = 255; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [perm[i], perm[j]] = [perm[j], perm[i]];
  }
  for (let i = 0; i < 512; i++) p[i] = perm[i & 255];

  const fade = t => t * t * t * (t * (t * 6 - 15) + 10);
  const lerp = (a, b, t) => a + t * (b - a);
  const grad = (hash, x, y) => {
    const h = hash & 3;
    const u = h < 2 ? x : y;
    const v = h < 2 ? y : x;
    return ((h & 1) ? -u : u) + ((h & 2) ? -v : v);
  };

  return {
    noise2D(x, y) {
      const X = Math.floor(x) & 255, Y = Math.floor(y) & 255;
      const xf = x - Math.floor(x), yf = y - Math.floor(y);
      const u = fade(xf), v = fade(yf);
      const aa = p[p[X] + Y], ab = p[p[X] + Y + 1];
      const ba = p[p[X + 1] + Y], bb = p[p[X + 1] + Y + 1];
      return lerp(
        lerp(grad(aa, xf, yf), grad(ba, xf - 1, yf), u),
        lerp(grad(ab, xf, yf - 1), grad(bb, xf - 1, yf - 1), u), v
      );
    }
  };
})();

// ─── Setup ───
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const cursorEl = document.getElementById('cursor');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

let mouseX = -100, mouseY = -100, mouseActive = false;
let time = 0;

canvas.addEventListener('mousemove', e => {
  mouseX = e.clientX; mouseY = e.clientY;
  mouseActive = true;
  cursorEl.style.left = mouseX + 'px';
  cursorEl.style.top = mouseY + 'px';
  cursorEl.style.opacity = '1';
});
canvas.addEventListener('mouseleave', () => {
  mouseActive = false;
  cursorEl.style.opacity = '0';
});
canvas.addEventListener('click', e => {
  // Big splash on click
  for (let i = 0; i < 3; i++) {
    ripples.push(new Ripple(e.clientX + (Math.random() - 0.5) * 20, e.clientY + (Math.random() - 0.5) * 20, 40 + Math.random() * 30));
  }
});
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  for (let i = 0; i < 3; i++) {
    ripples.push(new Ripple(t.clientX + (Math.random() - 0.5) * 20, t.clientY + (Math.random() - 0.5) * 20, 40 + Math.random() * 30));
  }
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  mouseX = t.clientX; mouseY = t.clientY;
  mouseActive = true;
}, { passive: false });

// ─── Stars (background) ───
class Star {
  constructor() {
    this.x = Math.random() * W;
    this.y = Math.random() * H * 0.4; // top portion only
    this.size = 0.3 + Math.random() * 1.2;
    this.twinkleSpeed = 0.5 + Math.random() * 2;
    this.phase = Math.random() * Math.PI * 2;
    this.brightness = 0.3 + Math.random() * 0.7;
  }
  draw(ctx, t) {
    const flicker = 0.5 + 0.5 * Math.sin(t * this.twinkleSpeed + this.phase);
    const alpha = this.brightness * flicker * 0.6;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(180, 200, 255, ${alpha})`;
    ctx.fill();
  }
}

// ─── Raindrop (falling) ───
class Raindrop {
  constructor() {
    this.reset();
  }
  reset() {
    this.x = Math.random() * (W + 200) - 100;
    this.y = -10 - Math.random() * H;
    this.speed = 8 + Math.random() * 12;
    this.length = 10 + Math.random() * 25;
    this.opacity = 0.05 + Math.random() * 0.15;
    this.wind = -1 + Math.random() * 0.5; // slight wind
    this.thickness = 0.5 + Math.random() * 1;
  }
  update() {
    this.y += this.speed;
    this.x += this.wind;
    // Hit the water surface (entire screen is water)
    if (this.y > H) {
      // Create ripple where it lands
      if (Math.random() < 0.7) {
        ripples.push(new Ripple(this.x, H - 5 - Math.random() * 30, 8 + Math.random() * 15));
      }
      this.reset();
    }
  }
  draw(ctx) {
    ctx.beginPath();
    ctx.moveTo(this.x, this.y);
    ctx.lineTo(this.x + this.wind * 2, this.y + this.length);
    ctx.strokeStyle = `rgba(150, 190, 230, ${this.opacity})`;
    ctx.lineWidth = this.thickness;
    ctx.stroke();
  }
}

// ─── Ripple (on water surface) ───
class Ripple {
  constructor(x, y, maxRadius) {
    this.x = x;
    this.y = y;
    this.radius = 0;
    this.maxRadius = maxRadius || 15 + Math.random() * 25;
    this.speed = 0.8 + Math.random() * 1.2;
    this.life = 1;
    this.rings = 2 + Math.floor(Math.random() * 2); // concentric rings
  }
  update() {
    this.radius += this.speed;
    this.life = 1 - (this.radius / this.maxRadius);
    return this.life > 0;
  }
  draw(ctx) {
    for (let r = 0; r < this.rings; r++) {
      const rad = this.radius - r * 4;
      if (rad <= 0) continue;
      const alpha = this.life * (1 - r * 0.3) * 0.4;
      if (alpha <= 0) continue;
      ctx.beginPath();
      ctx.ellipse(this.x, this.y, rad, rad * 0.35, 0, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(140, 190, 240, ${alpha})`;
      ctx.lineWidth = 1.5 - r * 0.3;
      ctx.stroke();
    }
    // Central bright point at start
    if (this.life > 0.8) {
      const pointAlpha = (this.life - 0.8) * 5 * 0.6;
      ctx.beginPath();
      ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200, 220, 255, ${pointAlpha})`;
      ctx.fill();
    }
  }
}

// ─── Lightning ───
let lightningAlpha = 0;
let lightningTimer = 0;
let nextLightning = 300 + Math.random() * 600;

function triggerLightning() {
  lightningAlpha = 0.3 + Math.random() * 0.2;
  lightningTimer = 4 + Math.floor(Math.random() * 3); // frames
}

// ─── Mouse ripple timer ───
let mouseRippleTimer = 0;

// ─── Initialize ───
const stars = Array.from({ length: 120 }, () => new Star());
const raindrops = Array.from({ length: 300 }, () => new Raindrop());
let ripples = [];

// ─── Draw water surface shimmer ───
function drawWaterSurface(ctx, t) {
  // Subtle horizontal lines of light on water
  for (let y = H * 0.3; y < H; y += 3) {
    const n = Noise.noise2D(y * 0.01, t * 0.3);
    const alpha = Math.max(0, n * 0.015 + 0.005);
    const offset = Noise.noise2D(y * 0.02, t * 0.5) * 30;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.strokeStyle = `rgba(100, 140, 180, ${alpha})`;
    ctx.lineWidth = 1;
    ctx.stroke();
  }
}

// ─── Main loop ───
function draw() {
  time += 0.016;

  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
  skyGrad.addColorStop(0, '#050a15');
  skyGrad.addColorStop(0.3, '#0a1225');
  skyGrad.addColorStop(0.5, '#0d1830');
  skyGrad.addColorStop(1, '#081020');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  // Lightning flash
  if (lightningAlpha > 0) {
    ctx.fillStyle = `rgba(180, 200, 240, ${lightningAlpha})`;
    ctx.fillRect(0, 0, W, H);
    lightningTimer--;
    if (lightningTimer <= 0) {
      lightningAlpha *= 0.4;
      if (lightningAlpha < 0.01) lightningAlpha = 0;
    }
  }

  // Clouds (subtle noise-based)
  for (let i = 0; i < 5; i++) {
    const cx = (W * 0.2 * i + Math.sin(time * 0.1 + i) * 100 + W * 0.5) % (W + 400) - 200;
    const cy = 30 + i * 25 + Math.sin(time * 0.15 + i * 2) * 10;
    const cw = 200 + i * 50;
    const ch = 30 + i * 8;
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, cw * 0.5);
    grad.addColorStop(0, `rgba(25, 35, 55, ${0.15 + Math.sin(time * 0.3 + i) * 0.05})`);
    grad.addColorStop(1, 'rgba(25, 35, 55, 0)');
    ctx.fillStyle = grad;
    ctx.fillRect(cx - cw * 0.5, cy - ch, cw, ch * 2);
  }

  // Stars
  stars.forEach(s => s.draw(ctx, time));

  // Water surface shimmer
  drawWaterSurface(ctx, time);

  // Rain
  ctx.globalCompositeOperation = 'lighter';
  raindrops.forEach(d => { d.update(); d.draw(ctx); });
  ctx.globalCompositeOperation = 'source-over';

  // Ripples
  ripples = ripples.filter(r => {
    const alive = r.update();
    if (alive) r.draw(ctx);
    return alive;
  });

  // Mouse interaction — gentle ripple trail
  mouseRippleTimer++;
  if (mouseActive && mouseRippleTimer % 6 === 0) {
    ripples.push(new Ripple(
      mouseX + (Math.random() - 0.5) * 10,
      mouseY + (Math.random() - 0.5) * 10,
      12 + Math.random() * 8
    ));
  }

  // Mouse glow
  if (mouseActive) {
    const glowGrad = ctx.createRadialGradient(mouseX, mouseY, 0, mouseX, mouseY, 80);
    glowGrad.addColorStop(0, 'rgba(120, 170, 220, 0.04)');
    glowGrad.addColorStop(1, 'rgba(120, 170, 220, 0)');
    ctx.fillStyle = glowGrad;
    ctx.fillRect(mouseX - 80, mouseY - 80, 160, 160);
  }

  // Lightning trigger
  lightningTimer === 0 && nextLightning--;
  if (nextLightning <= 0) {
    triggerLightning();
    nextLightning = 400 + Math.random() * 800;
  }

  // Fog / mist at bottom
  const fogGrad = ctx.createLinearGradient(0, H - 80, 0, H);
  fogGrad.addColorStop(0, 'rgba(8, 16, 32, 0)');
  fogGrad.addColorStop(1, 'rgba(8, 16, 32, 0.5)');
  ctx.fillStyle = fogGrad;
  ctx.fillRect(0, H - 80, W, 80);

  requestAnimationFrame(draw);
}

draw();

// ─── Resize stars ───
window.addEventListener('resize', () => {
  stars.length = 0;
  for (let i = 0; i < 120; i++) stars.push(new Star());
});
</script>
</body>
</html>
