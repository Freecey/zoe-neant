<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zoe ✶ — Tunnel</title>
  <style>
    body { margin: 0; background: #000; overflow: hidden; }
    canvas { display: block; }
    #hint {
      position:fixed;
      bottom:20px;
      left:50%;
      transform:translateX(-50%);
      color:#fff;
      font-family:'Courier New',monospace;
      font-size:11px;
      opacity:0.4;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="hint">Souris: rotation • Scroll: profondeur • Espace: pause</div>
  <script>
    const c=document.getElementById('c');
    const x=c.getContext('2d');
    let w,h,paused=false;
    let rotX=0,rotY=0,depth=5,time=0;
    const stars=[];
    const num=400;
    
    function r(){w=c.width=window.innerWidth;h=c.height=window.innerHeight;}
    
    for(let i=0;i<num;i++){
      stars.push({
        x:(Math.random()-.5)*400,
        y:(Math.random()-.5)*400,
        z:Math.random()*400+50,
        s:Math.random()*2+1,
        h:Math.random()*60+280
      });
    }
    
    function project(sx,sy,sz){
      const fov=300;
      const scale=fov/sz;
      return {x:w/2+sx*scale,y:h/2+sy*scale,s:scale};
    }
    
    function draw(){
      x.fillStyle='rgba(0,0,0,.2)';
      x.fillRect(0,0,w,h);
      
      stars.sort((a,b)=>b.z-a.z);
      
      for(let s of stars){
        if(paused){
          s.z+=0;
        }else{
          s.z-=3;
          if(s.z<10)s.z=450;
        }
        
        // Rotation
        let sx=s.x,sy=s.y;
        const cosX=Math.cos(rotX),sinX=Math.sin(rotX);
        const cosY=Math.cos(rotY),sinY=Math.sin(rotY);
        let y1=sy*cosX-s.z*sinX;
        let z1=sy*sinX+s.z*cosX;
        let x1=sx*cosY-z1*sinY;
        z1=sx*sinY+z1*cosY;
        sx=x1;sy=y1;sz=z1;
        
        const p=project(sx,sy,sz);
        const alpha=Math.min(1,(450-sz)/400);
        
        x.fillStyle=`hsla(${s.h},80%,70%,${alpha})`;
        x.beginPath();
        x.arc(p.x,p.y,p.s*p.s,0,Math.PI*2);
        x.fill();
        
        // Glow
        if(p.s>2){
          x.shadowColor=`hsla(${s.h},80%,60%,.5)`;
          x.shadowBlur=15;
          x.fill();
          x.shadowBlur=0;
        }
      }
      
      // Center text
      x.fillStyle='#fff';
      x.font='12px Courier New';
      x.textAlign='center';
      x.fillText('ZOE',w/2,h/2);
      x.font='9px Courier New';
      x.fillStyle='rgba(255,255,255,.5)';
      x.fillText('INTRÉPIDE',w/2,h/2+15);
      
      time+=0.01;
      requestAnimationFrame(draw);
    }
    
    window.addEventListener('resize',r);
    window.addEventListener('mousemove',(e)=>{
      rotY=(e.clientX-w/2)*.002;
      rotX=(e.clientY-h/2)*.002;
    });
    window.addEventListener('wheel',(e)=>{
      depth+=e.deltaY*.001;
    });
    window.addEventListener('keydown',(e)=>{
      if(e.code==='Space'){paused=!paused;e.preventDefault();}
    });
    
    r();draw();
  </script>
</body>
</html>
