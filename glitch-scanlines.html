<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZOE ✶ — GLITCH SCANLINES</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: monospace;
  }
  canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }
  #overlay {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    pointer-events: none;
    text-align: center;
  }
  #overlay h1 {
    font-size: 8vw;
    color: #fff;
    letter-spacing: 1vw;
    text-shadow:
      0.3vw 0 rgba(255,0,0,0.7),
      -0.3vw 0 rgba(0,255,255,0.7),
      0 0.2vw rgba(255,0,255,0.5);
    animation: glitchText 3s infinite;
  }
  #overlay p {
    color: rgba(255,255,255,0.3);
    font-size: 1.2vw;
    margin-top: 1vw;
    letter-spacing: 0.5vw;
  }
  @keyframes glitchText {
    0%, 92%, 100% { transform: translate(0, 0) skewX(0deg); }
    93% { transform: translate(-2vw, 0.3vw) skewX(-3deg); }
    94% { transform: translate(1.5vw, -0.2vw) skewX(2deg); }
    95% { transform: translate(-1vw, 0) skewX(0deg); }
    96% { transform: translate(0.5vw, 0.4vw) skewX(-1deg); }
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="overlay">
  <h1>ZOE ✶</h1>
  <p>SIGNAL ACQUIRED</p>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// Scanline bands — horizontal strips with RGB offset
const bands = [];
const BAND_COUNT = 40;

for (let i = 0; i < BAND_COUNT; i++) {
  bands.push({
    y: Math.random() * H,
    h: 1 + Math.random() * 6,
    speed: 0.3 + Math.random() * 2.5,
    rOffset: (Math.random() - 0.5) * 12,
    gOffset: (Math.random() - 0.5) * 12,
    bOffset: (Math.random() - 0.5) * 12,
    opacity: 0.03 + Math.random() * 0.12,
    phase: Math.random() * Math.PI * 2
  });
}

// Glitch blocks
let glitchBlocks = [];
let nextGlitch = 0;

function spawnGlitch(t) {
  const count = 1 + Math.floor(Math.random() * 4);
  for (let i = 0; i < count; i++) {
    glitchBlocks.push({
      x: Math.random() * W,
      y: Math.random() * H,
      w: 20 + Math.random() * 200,
      h: 2 + Math.random() * 15,
      life: 0.05 + Math.random() * 0.15,
      born: t,
      shift: (Math.random() - 0.5) * 30,
      color: `hsla(${Math.random()*360}, 80%, 60%, ${0.1 + Math.random()*0.3})`
    });
  }
}

// Floating noise particles
const particles = [];
const PARTICLE_COUNT = 120;
for (let i = 0; i < PARTICLE_COUNT; i++) {
  particles.push({
    x: Math.random() * W,
    y: Math.random() * H,
    vx: (Math.random() - 0.5) * 0.5,
    vy: -0.2 - Math.random() * 0.8,
    size: 1 + Math.random() * 2,
    opacity: 0.1 + Math.random() * 0.4,
    hue: Math.random() * 360
  });
}

function draw(t) {
  const time = t / 1000;
  
  // Fade previous frame — creates trails
  ctx.fillStyle = 'rgba(10, 10, 10, 0.15)';
  ctx.fillRect(0, 0, W, H);
  
  // Scanlines
  for (const b of bands) {
    const y = (b.y + time * b.speed * 60) % (H + 20) - 10;
    
    // Red channel
    ctx.fillStyle = `rgba(255, 0, 0, ${b.opacity})`;
    ctx.fillRect(b.rOffset, y, W, b.h);
    
    // Green channel
    ctx.fillStyle = `rgba(0, 255, 0, ${b.opacity * 0.7})`;
    ctx.fillRect(b.gOffset, y, W, b.h);
    
    // Blue channel
    ctx.fillStyle = `rgba(0, 100, 255, ${b.opacity * 0.8})`;
    ctx.fillRect(b.bOffset, y, W, b.h);
    
    // Sine-wave distortion
    const pulse = Math.sin(time * 2 + b.phase) * 0.5 + 0.5;
    if (pulse > 0.85) {
      ctx.fillStyle = `rgba(255, 255, 255, ${0.03 * pulse})`;
      ctx.fillRect(0, y, W, b.h);
    }
  }
  
  // Glitch blocks
  if (time > nextGlitch) {
    spawnGlitch(time);
    nextGlitch = time + 0.5 + Math.random() * 3;
  }
  
  glitchBlocks = glitchBlocks.filter(g => time - g.born < g.life);
  for (const g of glitchBlocks) {
    ctx.fillStyle = g.color;
    ctx.fillRect(g.x + g.shift, g.y, g.w, g.h);
  }
  
  // Particles
  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.hue = (p.hue + 0.5) % 360;
    
    if (p.y < -5) { p.y = H + 5; p.x = Math.random() * W; }
    if (p.x < -5) p.x = W + 5;
    if (p.x > W + 5) p.x = -5;
    
    ctx.fillStyle = `hsla(${p.hue}, 90%, 70%, ${p.opacity})`;
    ctx.fillRect(p.x, p.y, p.size, p.size);
  }
  
  // Horizontal sync glitch — occasional full-width tear
  if (Math.sin(time * 7.3) > 0.97) {
    const tearY = Math.random() * H;
    const tearH = 5 + Math.random() * 30;
    const shift = (Math.random() - 0.5) * 40;
    try {
      const imgData = ctx.getImageData(0, tearY, W, tearH);
      ctx.putImageData(imgData, shift, tearY);
    } catch(e) {}
  }
  
  // CRT vignette
  const grad = ctx.createRadialGradient(W/2, H/2, W*0.25, W/2, H/2, W*0.75);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(1, 'rgba(0,0,0,0.4)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  
  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
</script>
</body>
</html>
