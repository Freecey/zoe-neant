<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Constellations Vivantes — Zoe ✶</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #020810; overflow: hidden; cursor: none; }
  canvas { display: block; }
  #info {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: rgba(180, 200, 255, 0.4); font-family: 'Courier New', monospace;
    font-size: 12px; letter-spacing: 2px; pointer-events: none;
    transition: opacity 3s;
  }
  #cursor {
    position: fixed; pointer-events: none; width: 6px; height: 6px;
    border-radius: 50%; background: rgba(200, 220, 255, 0.8);
    box-shadow: 0 0 15px rgba(180, 200, 255, 0.6), 0 0 40px rgba(140, 160, 255, 0.2);
    transform: translate(-50%, -50%); z-index: 100;
    transition: opacity 0.3s;
  }
</style>
</head>
<body>
<div id="cursor"></div>
<canvas id="canvas"></canvas>
<div id="info">bouge la souris · clique pour créer · double-clique pour renaître</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const cursorEl = document.getElementById('cursor');
const infoEl = document.getElementById('info');

let W, H;
let mouse = { x: -1000, y: -1000 };
let stars = [];
let time = 0;
const MAX_STARS = 300;
const CONNECT_DIST = 150;
const MOUSE_RADIUS = 220;
const FADE_RATE = 0.03;

// Simple 2D noise approximation
function noise(x, y) {
  const n = Math.sin(x * 12.9898 + y * 78.233) * 43758.5453;
  return n - Math.floor(n);
}

class Star {
  constructor(x, y, fromClick = false) {
    this.x = x ?? Math.random() * W;
    this.y = y ?? Math.random() * H;
    this.baseX = this.x;
    this.baseY = this.y;
    this.size = 0.5 + Math.random() * 2;
    this.brightness = fromClick ? 1 : (0.2 + Math.random() * 0.5);
    this.maxBrightness = 0.3 + Math.random() * 0.7;
    this.phase = Math.random() * Math.PI * 2;
    this.breathSpeed = 0.005 + Math.random() * 0.015;
    this.driftAmplitude = 2 + Math.random() * 8;
    this.driftPhaseX = Math.random() * Math.PI * 2;
    this.driftPhaseY = Math.random() * Math.PI * 2;
    this.driftSpeedX = 0.002 + Math.random() * 0.005;
    this.driftSpeedY = 0.002 + Math.random() * 0.005;
    this.hue = 210 + Math.random() * 40; // blue-ish spectrum
    this.born = time;
    this.life = fromClick ? 0 : 1;
    this.spawning = fromClick;
    this.alive = true;
  }

  update() {
    // Spawning animation
    if (this.spawning) {
      this.life = Math.min(1, this.life + 0.02);
      if (this.life >= 1) this.spawning = false;
    }

    // Breathing
    this.phase += this.breathSpeed;
    this.brightness = this.maxBrightness * (0.5 + 0.5 * Math.sin(this.phase));

    // Gentle drift
    this.driftPhaseX += this.driftSpeedX;
    this.driftPhaseY += this.driftSpeedY;
    this.x = this.baseX + Math.sin(this.driftPhaseX) * this.driftAmplitude;
    this.y = this.baseY + Math.cos(this.driftPhaseY) * this.driftAmplitude;

    // Mouse influence — gentle attraction + brightness boost
    const dx = mouse.x - this.x;
    const dy = mouse.y - this.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < MOUSE_RADIUS) {
      const force = (1 - dist / MOUSE_RADIUS) * 0.015;
      this.x += dx * force;
      this.y += dy * force;
      this.brightness = Math.min(1, this.brightness + (1 - dist / MOUSE_RADIUS) * 0.4);
    }

    // Wrap around
    if (this.x < -20) this.baseX += W + 40;
    if (this.x > W + 20) this.baseX -= W + 40;
    if (this.y < -20) this.baseY += H + 40;
    if (this.y > H + 20) this.baseY -= H + 40;
  }

  draw() {
    const alpha = this.brightness * this.life;
    if (alpha < 0.01) return;

    // Glow
    const glowSize = this.size * 8;
    const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, glowSize);
    gradient.addColorStop(0, `hsla(${this.hue}, 60%, 85%, ${alpha * 0.4})`);
    gradient.addColorStop(0.3, `hsla(${this.hue}, 50%, 70%, ${alpha * 0.1})`);
    gradient.addColorStop(1, `hsla(${this.hue}, 40%, 50%, 0)`);
    ctx.fillStyle = gradient;
    ctx.fillRect(this.x - glowSize, this.y - glowSize, glowSize * 2, glowSize * 2);

    // Core
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${this.hue}, 30%, 95%, ${alpha})`;
    ctx.fill();
  }
}

function init() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  stars = [];
  // Scatter initial stars organically
  const count = Math.floor(Math.min(MAX_STARS, (W * H) / 8000));
  for (let i = 0; i < count; i++) {
    stars.push(new Star());
  }
}

function drawConnections() {
  for (let i = 0; i < stars.length; i++) {
    for (let j = i + 1; j < stars.length; j++) {
      const a = stars[i], b = stars[j];
      const dx = a.x - b.x;
      const dy = a.y - b.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < CONNECT_DIST) {
        // Check if mouse is near midpoint for boost
        const mx = (a.x + b.x) / 2;
        const my = (a.y + b.y) / 2;
        const mouseDist = Math.sqrt((mouse.x - mx) ** 2 + (mouse.y - my) ** 2);
        const mouseBoost = mouseDist < MOUSE_RADIUS ? (1 - mouseDist / MOUSE_RADIUS) * 0.3 : 0;

        const baseAlpha = (1 - dist / CONNECT_DIST) * 0.12 * a.life * b.life;
        const alpha = baseAlpha + mouseBoost * (1 - dist / CONNECT_DIST);
        const hue = (a.hue + b.hue) / 2;

        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.strokeStyle = `hsla(${hue}, 40%, 70%, ${alpha})`;
        ctx.lineWidth = 0.5 + mouseBoost * 1.5;
        ctx.stroke();
      }
    }
  }
}

function drawMouseGlow() {
  if (mouse.x < 0) return;
  const gradient = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, MOUSE_RADIUS);
  gradient.addColorStop(0, 'rgba(140, 170, 255, 0.015)');
  gradient.addColorStop(0.5, 'rgba(120, 150, 255, 0.005)');
  gradient.addColorStop(1, 'rgba(100, 130, 255, 0)');
  ctx.fillStyle = gradient;
  ctx.fillRect(mouse.x - MOUSE_RADIUS, mouse.y - MOUSE_RADIUS, MOUSE_RADIUS * 2, MOUSE_RADIUS * 2);
}

// Shooting stars
let shootingStars = [];
class ShootingStar {
  constructor() {
    this.x = Math.random() * W;
    this.y = Math.random() * H * 0.3;
    const angle = Math.PI * 0.15 + Math.random() * Math.PI * 0.2;
    const speed = 8 + Math.random() * 12;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.trail = [];
    this.maxTrail = 20 + Math.floor(Math.random() * 30);
    this.life = 1;
    this.decay = 0.015 + Math.random() * 0.01;
  }
  update() {
    this.trail.unshift({ x: this.x, y: this.y });
    if (this.trail.length > this.maxTrail) this.trail.pop();
    this.x += this.vx;
    this.y += this.vy;
    this.life -= this.decay;
  }
  draw() {
    if (this.trail.length < 2) return;
    for (let i = 1; i < this.trail.length; i++) {
      const alpha = (1 - i / this.trail.length) * this.life * 0.6;
      ctx.beginPath();
      ctx.moveTo(this.trail[i - 1].x, this.trail[i - 1].y);
      ctx.lineTo(this.trail[i].x, this.trail[i].y);
      ctx.strokeStyle = `rgba(200, 220, 255, ${alpha})`;
      ctx.lineWidth = (1 - i / this.trail.length) * 2;
      ctx.stroke();
    }
  }
}

// Background nebula — very subtle
function drawNebula() {
  const t = time * 0.0003;
  // Two subtle gradient blobs that drift slowly
  const cx1 = W * 0.3 + Math.sin(t * 0.7) * W * 0.15;
  const cy1 = H * 0.4 + Math.cos(t * 0.5) * H * 0.1;
  const cx2 = W * 0.7 + Math.cos(t * 0.6) * W * 0.15;
  const cy2 = H * 0.6 + Math.sin(t * 0.8) * H * 0.1;

  const r1 = Math.min(W, H) * 0.4;
  const r2 = Math.min(W, H) * 0.35;

  const g1 = ctx.createRadialGradient(cx1, cy1, 0, cx1, cy1, r1);
  g1.addColorStop(0, 'rgba(20, 30, 80, 0.008)');
  g1.addColorStop(0.5, 'rgba(30, 20, 60, 0.004)');
  g1.addColorStop(1, 'rgba(10, 10, 30, 0)');
  ctx.fillStyle = g1;
  ctx.fillRect(0, 0, W, H);

  const g2 = ctx.createRadialGradient(cx2, cy2, 0, cx2, cy2, r2);
  g2.addColorStop(0, 'rgba(40, 15, 50, 0.006)');
  g2.addColorStop(0.5, 'rgba(15, 25, 55, 0.003)');
  g2.addColorStop(1, 'rgba(10, 10, 30, 0)');
  ctx.fillStyle = g2;
  ctx.fillRect(0, 0, W, H);
}

function animate() {
  time++;

  // Fade — very slow for long trails
  ctx.fillStyle = 'rgba(2, 8, 16, 0.08)';
  ctx.fillRect(0, 0, W, H);

  drawNebula();
  drawMouseGlow();

  // Update and draw stars
  stars.forEach(s => { s.update(); s.draw(); });
  drawConnections();

  // Shooting stars — rare
  if (Math.random() < 0.003) {
    shootingStars.push(new ShootingStar());
  }
  shootingStars = shootingStars.filter(s => s.life > 0);
  shootingStars.forEach(s => { s.update(); s.draw(); });

  // Slowly spawn new stars if below max
  if (stars.length < MAX_STARS && Math.random() < 0.01) {
    // Spawn at edges
    const edge = Math.floor(Math.random() * 4);
    let x, y;
    switch(edge) {
      case 0: x = Math.random() * W; y = -10; break;
      case 1: x = W + 10; y = Math.random() * H; break;
      case 2: x = Math.random() * W; y = H + 10; break;
      case 3: x = -10; y = Math.random() * H; break;
    }
    const s = new Star(x, y, false);
    s.baseX = x; s.baseY = y;
    stars.push(s);
  }

  requestAnimationFrame(animate);
}

// Events
window.addEventListener('resize', () => {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
});

window.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top = e.clientY + 'px';
  cursorEl.style.opacity = '1';
});

window.addEventListener('mouseleave', () => {
  mouse.x = -1000;
  mouse.y = -1000;
  cursorEl.style.opacity = '0';
});

canvas.addEventListener('click', e => {
  // Spawn a constellation burst
  const count = 5 + Math.floor(Math.random() * 8);
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = Math.random() * 80;
    const x = e.clientX + Math.cos(angle) * dist;
    const y = e.clientY + Math.sin(angle) * dist;
    const s = new Star(x, y, true);
    s.baseX = x; s.baseY = y;
    stars.push(s);
  }
  // Cap total
  while (stars.length > MAX_STARS + 50) {
    stars.shift();
  }
});

canvas.addEventListener('dblclick', e => {
  e.preventDefault();
  // Respawn all
  stars = [];
  ctx.fillStyle = '#020810';
  ctx.fillRect(0, 0, W, H);
  const count = Math.floor(Math.min(MAX_STARS, (W * H) / 8000));
  for (let i = 0; i < count; i++) {
    const s = new Star(undefined, undefined, true);
    stars.push(s);
  }
});

// Touch support
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  mouse.x = t.clientX;
  mouse.y = t.clientY;
}, { passive: false });

canvas.addEventListener('touchstart', e => {
  const t = e.touches[0];
  const count = 5 + Math.floor(Math.random() * 8);
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = Math.random() * 80;
    const x = t.clientX + Math.cos(angle) * dist;
    const y = t.clientY + Math.sin(angle) * dist;
    const s = new Star(x, y, true);
    s.baseX = x; s.baseY = y;
    stars.push(s);
  }
});

canvas.addEventListener('touchend', () => {
  mouse.x = -1000;
  mouse.y = -1000;
});

// Fade info text after 6 seconds
setTimeout(() => { infoEl.style.opacity = '0'; }, 6000);

init();
animate();
</script>
</body>
</html>
