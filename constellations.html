<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Constellations — Zoe ✶</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #010108; overflow: hidden; cursor: none; }
canvas { display: block; }
#cursor {
  position: fixed;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(180, 200, 255, 0.8);
  box-shadow: 0 0 12px rgba(140, 160, 255, 0.6), 0 0 30px rgba(100, 120, 255, 0.3);
  pointer-events: none;
  transform: translate(-50%, -50%);
  z-index: 100;
  transition: width 0.2s, height 0.2s;
}
#info {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(100, 120, 180, 0.4);
  font-family: 'Courier New', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  pointer-events: none;
  z-index: 10;
}
</style>
</head>
<body>
<div id="cursor"></div>
<div id="info">move · click · hold</div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const cursorEl = document.getElementById('cursor');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Mouse state
let mouse = { x: W / 2, y: H / 2, down: false, active: false };
document.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  mouse.active = true;
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top = e.clientY + 'px';
});
document.addEventListener('mousedown', () => { mouse.down = true; cursorEl.style.width = '12px'; cursorEl.style.height = '12px'; });
document.addEventListener('mouseup', () => { mouse.down = false; cursorEl.style.width = '6px'; cursorEl.style.height = '6px'; });
document.addEventListener('click', e => {
  // Spawn a cluster of new stars at click position
  for (let i = 0; i < 8; i++) {
    stars.push(createStar(e.clientX + (Math.random() - 0.5) * 80, e.clientY + (Math.random() - 0.5) * 80));
  }
  // Create a strong pulse
  pulses.push({ x: e.clientX, y: e.clientY, r: 0, maxR: 250, alpha: 0.6, speed: 5 });
});
document.addEventListener('touchstart', e => {
  const t = e.touches[0];
  mouse.x = t.clientX;
  mouse.y = t.clientY;
  mouse.active = true;
  mouse.down = true;
});

// Stars
const MAX_STARS = 350;
const CONNECTION_DIST = 140;
const stars = [];

function createStar(x, y) {
  return {
    x: x !== undefined ? x : Math.random() * W,
    y: y !== undefined ? y : Math.random() * H,
    vx: (Math.random() - 0.5) * 0.3,
    vy: (Math.random() - 0.5) * 0.3,
    baseSize: 0.5 + Math.random() * 2,
    size: 0,
    brightness: 0.3 + Math.random() * 0.7,
    twinkleSpeed: 0.005 + Math.random() * 0.02,
    twinklePhase: Math.random() * Math.PI * 2,
    hue: 200 + Math.random() * 60, // blue to purple range
    age: 0,
    connections: []
  };
}

// Initialize
for (let i = 0; i < 250; i++) stars.push(createStar());

// Pulses (from clicks)
const pulses = [];

// Shooting stars
const shootingStars = [];
function maybeSpawnShootingStar() {
  if (Math.random() < 0.003 && shootingStars.length < 3) {
    const angle = -Math.PI / 6 + (Math.random() - 0.5) * 0.4;
    const speed = 8 + Math.random() * 8;
    shootingStars.push({
      x: Math.random() * W * 1.2 - W * 0.1,
      y: -20,
      vx: Math.cos(angle) * speed,
      vy: -Math.sin(angle) * speed,
      trail: [],
      maxTrail: 30 + Math.floor(Math.random() * 20),
      life: 1,
      decay: 0.008 + Math.random() * 0.01
    });
  }
}

// Nebula clouds (background atmosphere)
const nebulae = [];
for (let i = 0; i < 5; i++) {
  nebulae.push({
    x: Math.random() * W,
    y: Math.random() * H,
    radius: 150 + Math.random() * 300,
    hue: 220 + Math.random() * 80,
    alpha: 0.012 + Math.random() * 0.015,
    vx: (Math.random() - 0.5) * 0.08,
    vy: (Math.random() - 0.5) * 0.08,
    pulse: Math.random() * Math.PI * 2
  });
}

let time = 0;

function draw() {
  time += 0.01;

  // Fade trail — very slow fade for organic feel
  ctx.fillStyle = 'rgba(1, 1, 8, 0.12)';
  ctx.fillRect(0, 0, W, H);

  // Draw nebula clouds
  ctx.globalCompositeOperation = 'screen';
  nebulae.forEach(n => {
    n.x += n.vx;
    n.y += n.vy;
    n.pulse += 0.003;
    if (n.x < -n.radius) n.x = W + n.radius;
    if (n.x > W + n.radius) n.x = -n.radius;
    if (n.y < -n.radius) n.y = H + n.radius;
    if (n.y > H + n.radius) n.y = -n.radius;

    const r = n.radius + Math.sin(n.pulse) * 30;
    const a = n.alpha + Math.sin(n.pulse * 0.7) * 0.004;
    const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, r);
    g.addColorStop(0, `hsla(${n.hue + Math.sin(time) * 10}, 60%, 30%, ${a})`);
    g.addColorStop(0.5, `hsla(${n.hue + 20}, 50%, 20%, ${a * 0.5})`);
    g.addColorStop(1, `hsla(${n.hue}, 50%, 10%, 0)`);
    ctx.fillStyle = g;
    ctx.fillRect(n.x - r, n.y - r, r * 2, r * 2);
  });

  // Draw pulses
  pulses.forEach((p, i) => {
    p.r += p.speed;
    p.alpha *= 0.97;
    if (p.alpha < 0.01 || p.r > p.maxR) { pulses.splice(i, 1); return; }
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(140, 160, 255, ${p.alpha * 0.3})`;
    ctx.lineWidth = 1;
    ctx.stroke();
  });

  // Update stars
  stars.forEach(s => {
    s.age += 0.01;
    s.twinklePhase += s.twinkleSpeed;
    const twinkle = 0.5 + 0.5 * Math.sin(s.twinklePhase);
    s.size = s.baseSize * (0.6 + twinkle * 0.4);

    // Gentle drift
    s.x += s.vx;
    s.y += s.vy;

    // Mouse influence
    if (mouse.active) {
      const dx = mouse.x - s.x;
      const dy = mouse.y - s.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 200) {
        const force = (1 - dist / 200) * (mouse.down ? -0.15 : 0.05);
        s.vx += (dx / dist) * force;
        s.vy += (dy / dist) * force;
      }
    }

    // Damping
    s.vx *= 0.995;
    s.vy *= 0.995;

    // Wrap
    if (s.x < -10) s.x = W + 10;
    if (s.x > W + 10) s.x = -10;
    if (s.y < -10) s.y = H + 10;
    if (s.y > H + 10) s.y = -10;
  });

  // Draw connections
  ctx.globalCompositeOperation = 'lighter';
  for (let i = 0; i < stars.length; i++) {
    for (let j = i + 1; j < stars.length; j++) {
      const dx = stars[i].x - stars[j].x;
      const dy = stars[i].y - stars[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < CONNECTION_DIST) {
        const alpha = (1 - dist / CONNECTION_DIST);
        // Mouse proximity boost
        let boost = 0;
        if (mouse.active) {
          const mx1 = Math.hypot(mouse.x - stars[i].x, mouse.y - stars[i].y);
          const mx2 = Math.hypot(mouse.x - stars[j].x, mouse.y - stars[j].y);
          boost = Math.max(0, 1 - Math.min(mx1, mx2) / 200) * 0.3;
        }
        const finalAlpha = (alpha * 0.08 + boost) * Math.min(stars[i].brightness, stars[j].brightness);
        const hue = (stars[i].hue + stars[j].hue) / 2;
        ctx.beginPath();
        ctx.moveTo(stars[i].x, stars[i].y);
        ctx.lineTo(stars[j].x, stars[j].y);
        ctx.strokeStyle = `hsla(${hue}, 60%, 60%, ${finalAlpha})`;
        ctx.lineWidth = 0.5 + alpha * 0.5;
        ctx.stroke();
      }
    }
  }

  // Draw stars
  stars.forEach(s => {
    const glow = s.size * (2 + s.brightness);
    const g = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, glow);
    const b = s.brightness * (0.7 + 0.3 * Math.sin(s.twinklePhase));
    g.addColorStop(0, `hsla(${s.hue}, 40%, 95%, ${b})`);
    g.addColorStop(0.3, `hsla(${s.hue}, 60%, 70%, ${b * 0.4})`);
    g.addColorStop(1, `hsla(${s.hue}, 60%, 50%, 0)`);
    ctx.fillStyle = g;
    ctx.fillRect(s.x - glow, s.y - glow, glow * 2, glow * 2);

    // Core point
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size * 0.5, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(220, 230, 255, ${b * 0.9})`;
    ctx.fill();
  });

  // Shooting stars
  maybeSpawnShootingStar();
  shootingStars.forEach((ss, i) => {
    ss.trail.unshift({ x: ss.x, y: ss.y });
    if (ss.trail.length > ss.maxTrail) ss.trail.pop();
    ss.x += ss.vx;
    ss.y -= ss.vy;
    ss.life -= ss.decay;

    if (ss.life <= 0 || ss.x > W + 50 || ss.y > H + 50) {
      shootingStars.splice(i, 1);
      return;
    }

    // Draw trail
    ss.trail.forEach((pt, ti) => {
      const a = (1 - ti / ss.trail.length) * ss.life;
      const size = (1 - ti / ss.trail.length) * 2;
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200, 220, 255, ${a * 0.7})`;
      ctx.fill();
    });
  });

  ctx.globalCompositeOperation = 'source-over';

  // Cap star count
  while (stars.length > MAX_STARS) stars.shift();

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
