<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Constellations — Zoe ✶</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #050510;
  overflow: hidden;
  cursor: none;
  font-family: 'Georgia', serif;
}
canvas { display: block; position: fixed; top: 0; left: 0; }
#cursor {
  position: fixed;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(200, 210, 255, 0.9);
  box-shadow: 0 0 15px 5px rgba(150, 170, 255, 0.3), 0 0 40px 10px rgba(150, 170, 255, 0.1);
  pointer-events: none;
  z-index: 100;
  transform: translate(-50%, -50%);
  transition: opacity 0.3s;
}
#thought {
  position: fixed;
  color: rgba(180, 195, 220, 0);
  font-size: 16px;
  letter-spacing: 2px;
  font-style: italic;
  pointer-events: none;
  z-index: 50;
  transition: color 2s ease-in-out, text-shadow 2s ease-in-out;
  text-align: center;
  max-width: 500px;
  line-height: 1.6;
  transform: translate(-50%, -50%);
  text-shadow: 0 0 0 transparent;
}
#thought.visible {
  color: rgba(180, 195, 220, 0.7);
  text-shadow: 0 0 30px rgba(150, 170, 255, 0.2);
}
#thought.fading {
  color: rgba(180, 195, 220, 0);
  text-shadow: 0 0 0 transparent;
}
#hint {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(120, 130, 160, 0.4);
  font-family: 'Georgia', serif;
  font-size: 12px;
  letter-spacing: 3px;
  pointer-events: none;
  z-index: 50;
  transition: opacity 3s;
}
</style>
</head>
<body>
<canvas id="sky"></canvas>
<div id="cursor"></div>
<div id="thought"></div>
<div id="hint">move through the night</div>
<script>
// ─── Perlin Noise ───────────────────────────────────────
const Noise = (() => {
  const p = new Uint8Array(512);
  const perm = new Uint8Array(256);
  for (let i = 0; i < 256; i++) perm[i] = i;
  for (let i = 255; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [perm[i], perm[j]] = [perm[j], perm[i]];
  }
  for (let i = 0; i < 512; i++) p[i] = perm[i & 255];
  const fade = t => t * t * t * (t * (t * 6 - 15) + 10);
  const lerp = (a, b, t) => a + t * (b - a);
  const grad = (h, x, y) => {
    const v = h & 3;
    return (v === 0 ? x + y : v === 1 ? -x + y : v === 2 ? x - y : -x - y);
  };
  return {
    noise2D(x, y) {
      const X = Math.floor(x) & 255, Y = Math.floor(y) & 255;
      const xf = x - Math.floor(x), yf = y - Math.floor(y);
      const u = fade(xf), v = fade(yf);
      const a = p[X] + Y, b = p[X + 1] + Y;
      return lerp(
        lerp(grad(p[a], xf, yf), grad(p[b], xf - 1, yf), u),
        lerp(grad(p[a + 1], xf, yf - 1), grad(p[b + 1], xf - 1, yf - 1), u), v
      );
    }
  };
})();

// ─── Setup ──────────────────────────────────────────────
const canvas = document.getElementById('sky');
const ctx = canvas.getContext('2d');
const cursorEl = document.getElementById('cursor');
const thoughtEl = document.getElementById('thought');
const hintEl = document.getElementById('hint');

let W, H, time = 0;
let mx = -1000, my = -1000;
let stars = [], shootingStars = [];
const CONNECT_DIST = 160;
const MOUSE_RADIUS = 220;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', () => {
  resize();
  initStars();
});
resize();

// ─── Stars ──────────────────────────────────────────────
function initStars() {
  const count = Math.floor((W * H) / 2200);
  stars = [];
  for (let i = 0; i < count; i++) {
    const brightness = Math.random();
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      baseR: 0.3 + brightness * 1.8,
      r: 0.3 + brightness * 1.8,
      twinkleSpeed: 0.5 + Math.random() * 2,
      twinkleOffset: Math.random() * Math.PI * 2,
      hue: 200 + Math.random() * 40, // blue-white range
      saturation: 10 + Math.random() * 30,
      brightness: brightness,
      activated: 0 // 0-1, how much mouse has awakened it
    });
  }
}
initStars();

// ─── Shooting Stars ─────────────────────────────────────
function spawnShootingStar() {
  const startX = Math.random() * W * 1.2 - W * 0.1;
  const angle = Math.PI / 4 + (Math.random() - 0.5) * 0.4;
  shootingStars.push({
    x: startX,
    y: -20,
    vx: Math.cos(angle) * (8 + Math.random() * 6),
    vy: Math.sin(angle) * (8 + Math.random() * 6),
    life: 1,
    trail: [],
    maxTrail: 20 + Math.floor(Math.random() * 15)
  });
}

// ─── Thoughts ───────────────────────────────────────────
const thoughts = [
  "les étoiles n'appartiennent à personne",
  "chaque lumière a traversé le temps pour到达 ici",
  "le noir n'est pas l'absence — c'est le tissu",
  "tu es fait de la même poussière",
  "les constellations n'existent que dans le regard",
  "silence · lumière · patience",
  "nous connectons des points qui ne se connaissent pas",
  "la nuit n'a pas de bord",
  "respire — le ciel a le temps",
  "quelque part, quelqu'un regarde la même étoile",
  "chaque point est un soleil pour quelqu'un",
  "l'infini est une question sans réponse",
  "la beauté est dans les intervalles",
  "tu n'es pas si petit que ça",
  "même l'obscurité a une texture"
];
let thoughtIndex = 0;
let thoughtTimer = 0;

function showThought() {
  thoughtEl.textContent = thoughts[thoughtIndex % thoughts.length];
  thoughtIndex++;
  // Position near center with slight randomness
  thoughtEl.style.left = (30 + Math.random() * 40) + '%';
  thoughtEl.style.top = (35 + Math.random() * 30) + '%';
  thoughtEl.className = 'visible';
  setTimeout(() => { thoughtEl.className = 'fading'; }, 5000);
  setTimeout(() => { thoughtEl.className = ''; }, 7000);
}

// ─── Mouse ──────────────────────────────────────────────
document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursorEl.style.left = mx + 'px';
  cursorEl.style.top = my + 'px';
});
document.addEventListener('mouseleave', () => {
  mx = -1000; my = -1000;
});

// Click: burst of light
document.addEventListener('click', e => {
  for (let i = 0; i < 12; i++) {
    const angle = (Math.PI * 2 / 12) * i;
    const dist = 40 + Math.random() * 60;
    const sx = e.clientX + Math.cos(angle) * dist;
    const sy = e.clientY + Math.sin(angle) * dist;
    // Activate nearby stars strongly
    stars.forEach(s => {
      const d = Math.hypot(s.x - sx, s.y - sy);
      if (d < 100) s.activated = Math.min(1, s.activated + (1 - d / 100));
    });
  }
});

// Touch support
document.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  mx = t.clientX; my = t.clientY;
  cursorEl.style.left = mx + 'px';
  cursorEl.style.top = my + 'px';
}, { passive: false });
document.addEventListener('touchend', () => { mx = -1000; my = -1000; });

// ─── Render ─────────────────────────────────────────────
let nextShootingStar = 200 + Math.floor(Math.random() * 400);

function draw() {
  time += 0.016;

  // Dark sky with slight noise-based color
  const bgN = Noise.noise2D(time * 0.05, 0) * 0.02;
  ctx.fillStyle = `rgb(${5 + Math.floor(bgN * 50)}, ${5 + Math.floor(bgN * 30)}, ${16 + Math.floor(bgN * 60)})`;
  ctx.fillRect(0, 0, W, H);

  // Subtle nebula clouds
  drawNebula();

  // Update and draw stars
  const nearStars = [];
  stars.forEach(s => {
    // Twinkle
    const twinkle = 0.5 + 0.5 * Math.sin(time * s.twinkleSpeed + s.twinkleOffset);
    s.r = s.baseR * (0.6 + 0.4 * twinkle);

    // Mouse activation
    const dm = Math.hypot(s.x - mx, s.y - my);
    if (dm < MOUSE_RADIUS) {
      s.activated = Math.min(1, s.activated + 0.03);
      nearStars.push(s);
    } else {
      s.activated = Math.max(0, s.activated - 0.008);
    }

    // Draw star
    const a = 0.3 + 0.5 * twinkle + s.activated * 0.3;
    const r = s.r + s.activated * 1.5;

    // Glow
    if (s.activated > 0.1 || s.brightness > 0.7) {
      const glowR = r * (3 + s.activated * 4);
      const glow = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, glowR);
      glow.addColorStop(0, `hsla(${s.hue}, ${s.saturation}%, 85%, ${a * 0.15 * (1 + s.activated)})`);
      glow.addColorStop(1, `hsla(${s.hue}, ${s.saturation}%, 85%, 0)`);
      ctx.fillStyle = glow;
      ctx.fillRect(s.x - glowR, s.y - glowR, glowR * 2, glowR * 2);
    }

    // Core
    ctx.beginPath();
    ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${s.hue}, ${s.saturation}%, ${75 + s.activated * 20}%, ${a})`;
    ctx.fill();
  });

  // Draw constellation lines between activated nearby stars
  drawConstellations(nearStars);

  // Shooting stars
  drawShootingStars();

  // Thoughts
  thoughtTimer++;
  if (thoughtTimer > 500 + Math.random() * 300) {
    thoughtTimer = 0;
    showThought();
  }

  // Hide hint after a while
  if (time > 5) hintEl.style.opacity = '0';

  requestAnimationFrame(draw);
}

function drawNebula() {
  // 3 soft nebula blobs
  const nebulas = [
    { x: W * 0.3, y: H * 0.4, r: 300, hue: 240, alpha: 0.015 },
    { x: W * 0.7, y: H * 0.6, r: 250, hue: 280, alpha: 0.012 },
    { x: W * 0.5, y: H * 0.2, r: 200, hue: 220, alpha: 0.010 }
  ];
  nebulas.forEach(n => {
    const ox = Noise.noise2D(time * 0.1, n.hue) * 30;
    const oy = Noise.noise2D(n.hue, time * 0.1) * 30;
    const g = ctx.createRadialGradient(n.x + ox, n.y + oy, 0, n.x + ox, n.y + oy, n.r);
    g.addColorStop(0, `hsla(${n.hue}, 40%, 40%, ${n.alpha})`);
    g.addColorStop(0.5, `hsla(${n.hue + 20}, 30%, 25%, ${n.alpha * 0.5})`);
    g.addColorStop(1, `hsla(${n.hue}, 30%, 15%, 0)`);
    ctx.fillStyle = g;
    ctx.fillRect(n.x + ox - n.r, n.y + oy - n.r, n.r * 2, n.r * 2);
  });
}

function drawConstellations(nearStars) {
  if (nearStars.length < 2) return;

  for (let i = 0; i < nearStars.length; i++) {
    for (let j = i + 1; j < nearStars.length; j++) {
      const a = nearStars[i], b = nearStars[j];
      const d = Math.hypot(a.x - b.x, a.y - b.y);
      if (d < CONNECT_DIST) {
        const strength = (1 - d / CONNECT_DIST) * Math.min(a.activated, b.activated);
        if (strength < 0.05) continue;

        // Gradient line from a to b
        const grad = ctx.createLinearGradient(a.x, a.y, b.x, b.y);
        const alpha = strength * 0.5;
        const hue = (a.hue + b.hue) / 2;
        grad.addColorStop(0, `hsla(${hue}, 40%, 75%, ${alpha * a.activated})`);
        grad.addColorStop(0.5, `hsla(${hue}, 50%, 80%, ${alpha * 0.7})`);
        grad.addColorStop(1, `hsla(${hue}, 40%, 75%, ${alpha * b.activated})`);

        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.strokeStyle = grad;
        ctx.lineWidth = 0.5 + strength * 1.2;
        ctx.stroke();
      }
    }
  }
}

function drawShootingStars() {
  nextShootingStar--;
  if (nextShootingStar <= 0) {
    spawnShootingStar();
    nextShootingStar = 300 + Math.floor(Math.random() * 600);
  }

  shootingStars = shootingStars.filter(ss => {
    ss.x += ss.vx;
    ss.y += ss.vy;
    ss.life -= 0.012;
    ss.trail.push({ x: ss.x, y: ss.y });
    if (ss.trail.length > ss.maxTrail) ss.trail.shift();

    // Draw trail
    if (ss.trail.length > 1) {
      for (let i = 1; i < ss.trail.length; i++) {
        const alpha = (i / ss.trail.length) * ss.life * 0.8;
        const width = (i / ss.trail.length) * 2 * ss.life;
        ctx.beginPath();
        ctx.moveTo(ss.trail[i - 1].x, ss.trail[i - 1].y);
        ctx.lineTo(ss.trail[i].x, ss.trail[i].y);
        ctx.strokeStyle = `rgba(220, 230, 255, ${alpha})`;
        ctx.lineWidth = width;
        ctx.stroke();
      }
      // Head glow
      const head = ss.trail[ss.trail.length - 1];
      const g = ctx.createRadialGradient(head.x, head.y, 0, head.x, head.y, 8);
      g.addColorStop(0, `rgba(255, 255, 255, ${ss.life * 0.8})`);
      g.addColorStop(1, `rgba(200, 220, 255, 0)`);
      ctx.fillStyle = g;
      ctx.fillRect(head.x - 8, head.y - 8, 16, 16);
    }

    return ss.life > 0;
  });
}

// ─── Go ─────────────────────────────────────────────────
draw();
</script>
</body>
</html>
