<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurora — Zoe ✶</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #020812; cursor: none; }
canvas { display: block; position: fixed; top: 0; left: 0; }
#cursor {
  position: fixed; pointer-events: none; z-index: 999;
  width: 12px; height: 12px; border-radius: 50%;
  background: radial-gradient(circle, rgba(100,255,180,0.9), rgba(100,255,180,0) 70%);
  transform: translate(-50%, -50%);
  box-shadow: 0 0 20px rgba(100,255,180,0.4);
}
</style>
</head>
<body>
<div id="cursor"></div>
<canvas id="c"></canvas>
<script>
// ——— Perlin Noise (self-contained) ———
const Noise = (() => {
  const p = new Uint8Array(512);
  const perm = new Uint8Array(256);
  for (let i = 0; i < 256; i++) perm[i] = i;
  // Fisher-Yates shuffle
  for (let i = 255; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [perm[i], perm[j]] = [perm[j], perm[i]];
  }
  for (let i = 0; i < 512; i++) p[i] = perm[i & 255];

  const fade = t => t * t * t * (t * (t * 6 - 15) + 10);
  const lerp = (a, b, t) => a + t * (b - a);
  const grad = (hash, x, y, z) => {
    const h = hash & 15;
    const u = h < 8 ? x : y;
    const v = h < 4 ? y : (h === 12 || h === 14 ? x : z);
    return ((h & 1) ? -u : u) + ((h & 2) ? -v : v);
  };

  return {
    noise3D(x, y, z) {
      const X = Math.floor(x) & 255, Y = Math.floor(y) & 255, Z = Math.floor(z) & 255;
      x -= Math.floor(x); y -= Math.floor(y); z -= Math.floor(z);
      const u = fade(x), v = fade(y), w = fade(z);
      const A = p[X] + Y, AA = p[A] + Z, AB = p[A + 1] + Z;
      const B = p[X + 1] + Y, BA = p[B] + Z, BB = p[B + 1] + Z;
      return lerp(
        lerp(lerp(grad(p[AA], x, y, z), grad(p[BA], x-1, y, z), u),
             lerp(grad(p[AB], x, y-1, z), grad(p[BB], x-1, y-1, z), u), v),
        lerp(lerp(grad(p[AA+1], x, y, z-1), grad(p[BA+1], x-1, y, z-1), u),
             lerp(grad(p[AB+1], x, y-1, z-1), grad(p[BB+1], x-1, y-1, z-1), u), v),
        w
      );
    },
    noise2D(x, y) {
      return this.noise3D(x, y, 0);
    }
  };
})();

// ——— Canvas Setup ———
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const cursor = document.getElementById('cursor');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ——— Mouse ———
let mx = W / 2, my = H / 2;
window.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursor.style.left = mx + 'px';
  cursor.style.top = my + 'px';
});

// ——— Stars ———
class Star {
  constructor() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.size = 0.3 + Math.random() * 1.5;
    this.twinkleSpeed = 0.01 + Math.random() * 0.03;
    this.phase = Math.random() * Math.PI * 2;
    this.baseAlpha = 0.3 + Math.random() * 0.5;
  }
  draw(ctx, time) {
    const alpha = this.baseAlpha + Math.sin(time * this.twinkleSpeed + this.phase) * 0.3;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200, 220, 255, ${Math.max(0.05, alpha)})`;
    ctx.fill();
  }
}

const stars = Array.from({ length: 200 }, () => new Star());

// ——— Aurora Band ———
// Each band is a vertical curtain that undulates with noise
class AuroraBand {
  constructor(config) {
    this.yBase = config.yBase;           // base Y position (fraction of H)
    this.amplitude = config.amplitude;   // vertical amplitude
    this.frequency = config.frequency;   // spatial frequency
    this.speed = config.speed;           // time speed
    this.noiseScale = config.noiseScale;
    this.hue = config.hue;
    this.hueRange = config.hueRange;
    this.width = config.width;           // band thickness
    this.alpha = config.alpha;
    this.drift = config.drift || 0;      // horizontal drift
    this.offsetX = Math.random() * 1000;
  }

  draw(ctx, time) {
    const steps = Math.ceil(W / 3);
    const yCenter = this.yBase * H;

    // Draw multiple layers for depth
    for (let layer = 0; layer < 3; layer++) {
      const layerAlpha = this.alpha * (1 - layer * 0.3);
      const layerWidth = this.width * (1 + layer * 0.5);
      const layerOffset = layer * 0.5;

      ctx.beginPath();
      const points = [];

      for (let i = 0; i <= steps; i++) {
        const x = (i / steps) * W;
        const nx = (x + this.offsetX + time * this.drift) * this.noiseScale;
        const nt = time * this.speed + layerOffset;

        // Noise-driven vertical displacement
        const n1 = Noise.noise3D(nx, nt, layer * 0.3);
        const n2 = Noise.noise3D(nx * 2, nt * 0.7, layer * 0.5 + 10);

        // Mouse influence
        const dx = x - mx;
        const dy = yCenter - my;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const mouseInfluence = Math.max(0, 1 - dist / 350) * 40;

        const y = yCenter + (n1 * this.amplitude + n2 * this.amplitude * 0.3) - mouseInfluence * Math.sign(dy || 1);
        points.push({ x, y });
      }

      // Upper edge
      ctx.moveTo(points[0].x, points[0].y - layerWidth / 2);
      for (let i = 1; i < points.length; i++) {
        ctx.lineTo(points[i].x, points[i].y - layerWidth / 2);
      }
      // Lower edge (reverse)
      for (let i = points.length - 1; i >= 0; i--) {
        const x = points[i].x;
        const nx = (x + this.offsetX + time * this.drift) * this.noiseScale;
        const nt = time * this.speed + layerOffset + 5;
        const extraWave = Noise.noise3D(nx * 1.5, nt, 20) * 15;
        ctx.lineTo(x, points[i].y + layerWidth / 2 + extraWave);
      }
      ctx.closePath();

      // Gradient fill along the band
      const grad = ctx.createLinearGradient(0, yCenter - layerWidth, 0, yCenter + layerWidth);
      const h = this.hue + Math.sin(time * 0.2 + layer) * this.hueRange;
      grad.addColorStop(0, `hsla(${h}, 80%, 60%, 0)`);
      grad.addColorStop(0.3, `hsla(${h}, 80%, 55%, ${layerAlpha * 0.5})`);
      grad.addColorStop(0.5, `hsla(${h}, 85%, 50%, ${layerAlpha})`);
      grad.addColorStop(0.7, `hsla(${h}, 80%, 55%, ${layerAlpha * 0.5})`);
      grad.addColorStop(1, `hsla(${h}, 80%, 60%, 0)`);

      ctx.fillStyle = grad;
      ctx.fill();
    }
  }
}

// ——— Aurora Bands Configuration ———
const bands = [
  new AuroraBand({
    yBase: 0.25, amplitude: 80, frequency: 0.003, speed: 0.15,
    noiseScale: 0.002, hue: 130, hueRange: 20, width: 120, alpha: 0.08, drift: 15
  }),
  new AuroraBand({
    yBase: 0.3, amplitude: 60, frequency: 0.004, speed: 0.12,
    noiseScale: 0.0025, hue: 150, hueRange: 30, width: 90, alpha: 0.1, drift: 10
  }),
  new AuroraBand({
    yBase: 0.22, amplitude: 100, frequency: 0.002, speed: 0.1,
    noiseScale: 0.0015, hue: 280, hueRange: 25, width: 140, alpha: 0.06, drift: 20
  }),
  new AuroraBand({
    yBase: 0.35, amplitude: 50, frequency: 0.005, speed: 0.18,
    noiseScale: 0.003, hue: 320, hueRange: 15, width: 70, alpha: 0.07, drift: 8
  }),
  new AuroraBand({
    yBase: 0.18, amplitude: 120, frequency: 0.001, speed: 0.08,
    noiseScale: 0.001, hue: 100, hueRange: 40, width: 160, alpha: 0.05, drift: 25
  }),
];

// ——— Floating Particles (aurora dust) ———
class AuroraParticle {
  constructor() {
    this.reset();
  }
  reset() {
    this.x = Math.random() * W;
    this.y = Math.random() * H * 0.6;
    this.size = 0.5 + Math.random() * 2;
    this.speed = 0.1 + Math.random() * 0.4;
    this.life = 1;
    this.decay = 0.001 + Math.random() * 0.003;
    this.hue = 100 + Math.random() * 220;
    this.alpha = 0.2 + Math.random() * 0.5;
    this.drift = (Math.random() - 0.5) * 0.3;
    this.phase = Math.random() * Math.PI * 2;
  }
  update(time) {
    const n = Noise.noise3D(this.x * 0.002, this.y * 0.002, time * 0.1);
    this.x += Math.cos(n * Math.PI * 2) * this.speed + this.drift;
    this.y += Math.sin(n * Math.PI * 2) * this.speed * 0.3 - 0.1;
    this.life -= this.decay;

    // Mouse attraction
    const dx = mx - this.x, dy = my - this.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 200) {
      const force = (1 - dist / 200) * 0.5;
      this.x += dx * force * 0.01;
      this.y += dy * force * 0.01;
    }

    if (this.life <= 0 || this.x < -10 || this.x > W + 10 || this.y < -10 || this.y > H) {
      this.reset();
    }
  }
  draw(ctx, time) {
    const pulse = Math.sin(time * 2 + this.phase) * 0.2 + 0.8;
    const a = this.alpha * this.life * pulse;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${this.hue}, 70%, 70%, ${a})`;
    ctx.fill();
  }
}

const particles = Array.from({ length: 300 }, () => new AuroraParticle());

// ——— Reflection on water (bottom 30%) ———
function drawReflection(time) {
  const waterY = H * 0.7;
  const waterH = H - waterY;

  // Dark water base
  const waterGrad = ctx.createLinearGradient(0, waterY, 0, H);
  waterGrad.addColorStop(0, 'rgba(2, 8, 18, 0.85)');
  waterGrad.addColorStop(1, 'rgba(2, 8, 18, 0.98)');
  ctx.fillStyle = waterGrad;
  ctx.fillRect(0, waterY, W, waterH);

  // Subtle shimmer lines
  ctx.globalAlpha = 0.04;
  for (let i = 0; i < 15; i++) {
    const y = waterY + Math.random() * waterH;
    const len = 20 + Math.random() * 80;
    const x = Math.random() * W;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + len, y + (Math.random() - 0.5) * 2);
    ctx.strokeStyle = `hsla(${130 + Math.random() * 180}, 50%, 60%, 1)`;
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

// ——— Ground silhouette ———
function drawGround() {
  const groundY = H * 0.7;
  ctx.beginPath();
  ctx.moveTo(0, groundY);

  // Mountain-like silhouette with noise
  for (let x = 0; x <= W; x += 4) {
    const n1 = Noise.noise2D(x * 0.001, 0) * 60;
    const n2 = Noise.noise2D(x * 0.005, 10) * 20;
    const y = groundY + n1 + n2 - 30;
    ctx.lineTo(x, Math.min(y, groundY + 10));
  }
  ctx.lineTo(W, H);
  ctx.lineTo(0, H);
  ctx.closePath();
  ctx.fillStyle = '#020810';
  ctx.fill();
}

// ——— Main Loop ———
let time = 0;
function animate() {
  time += 0.01;

  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
  skyGrad.addColorStop(0, '#020818');
  skyGrad.addColorStop(0.4, '#030c20');
  skyGrad.addColorStop(0.7, '#041028');
  skyGrad.addColorStop(1, '#020812');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  // Stars
  stars.forEach(s => s.draw(ctx, time));

  // Aurora bands (additive blending)
  ctx.globalCompositeOperation = 'screen';
  bands.forEach(b => b.draw(ctx, time));
  ctx.globalCompositeOperation = 'source-over';

  // Ground silhouette
  drawGround();

  // Water reflection
  drawReflection(time);

  // Aurora particles (above ground, additive)
  ctx.globalCompositeOperation = 'screen';
  particles.forEach(p => {
    p.update(time);
    if (p.y < H * 0.7) p.draw(ctx, time);
  });
  ctx.globalCompositeOperation = 'source-over';

  requestAnimationFrame(animate);
}

animate();

// ——— Click to create aurora burst ———
canvas.addEventListener('click', e => {
  const cx = e.clientX, cy = e.clientY;
  for (let i = 0; i < 30; i++) {
    const p = new AuroraParticle();
    p.x = cx + (Math.random() - 0.5) * 40;
    p.y = cy + (Math.random() - 0.5) * 40;
    p.size = 1 + Math.random() * 3;
    p.alpha = 0.6 + Math.random() * 0.4;
    p.decay = 0.005 + Math.random() * 0.005;
    p.speed = 0.3 + Math.random() * 0.8;
    particles.push(p);
  }
  // Remove excess
  while (particles.length > 600) particles.shift();
});

// Handle resize for stars
window.addEventListener('resize', () => {
  stars.forEach(s => {
    s.x = Math.random() * W;
    s.y = Math.random() * H;
  });
});
</script>
</body>
</html>
