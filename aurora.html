<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurora ✶</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; cursor: none; }
  canvas { display: block; }
  #cursor {
    position: fixed;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: rgba(180, 255, 220, 0.8);
    box-shadow: 0 0 20px rgba(100, 255, 180, 0.6), 0 0 60px rgba(100, 255, 180, 0.2);
    pointer-events: none;
    z-index: 999;
    transform: translate(-50%, -50%);
    transition: opacity 0.3s;
  }
  #hint {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(140, 220, 180, 0.5);
    font-family: 'Courier New', monospace;
    font-size: 13px;
    letter-spacing: 2px;
    z-index: 10;
    animation: fadeHint 6s ease-in-out forwards;
  }
  @keyframes fadeHint {
    0%, 60% { opacity: 1; }
    100% { opacity: 0; }
  }
</style>
</head>
<body>
<div id="cursor"></div>
<div id="hint">move to shape the wind · click to pulse</div>
<canvas id="c"></canvas>
<script>
// ── Noise (Perlin 3D, self-contained) ──
const Noise = (() => {
  const p = new Uint8Array(512);
  const perm = new Uint8Array(256);
  for (let i = 0; i < 256; i++) perm[i] = i;
  for (let i = 255; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [perm[i], perm[j]] = [perm[j], perm[i]];
  }
  for (let i = 0; i < 512; i++) p[i] = perm[i & 255];

  const fade = t => t * t * t * (t * (t * 6 - 15) + 10);
  const lerp = (a, b, t) => a + t * (b - a);
  const grad = (hash, x, y, z) => {
    const h = hash & 15;
    const u = h < 8 ? x : y;
    const v = h < 4 ? y : (h === 12 || h === 14 ? x : z);
    return ((h & 1) ? -u : u) + ((h & 2) ? -v : v);
  };

  return {
    noise3D(x, y, z) {
      const X = Math.floor(x) & 255, Y = Math.floor(y) & 255, Z = Math.floor(z) & 255;
      x -= Math.floor(x); y -= Math.floor(y); z -= Math.floor(z);
      const u = fade(x), v = fade(y), w = fade(z);
      const A = p[X] + Y, AA = p[A] + Z, AB = p[A + 1] + Z;
      const B = p[X + 1] + Y, BA = p[B] + Z, BB = p[B + 1] + Z;
      return lerp(
        lerp(lerp(grad(p[AA], x, y, z), grad(p[BA], x - 1, y, z), u),
             lerp(grad(p[AB], x, y - 1, z), grad(p[BB], x - 1, y - 1, z), u), v),
        lerp(lerp(grad(p[AA + 1], x, y, z - 1), grad(p[BA + 1], x - 1, y, z - 1), u),
             lerp(grad(p[AB + 1], x, y - 1, z - 1), grad(p[BB + 1], x - 1, y - 1, z - 1), u), v), w);
    }
  };
})();

// ── Setup ──
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const cursorEl = document.getElementById('cursor');
let W, H;
let mouseX = -1000, mouseY = -1000;
let time = 0;
let pulseWaves = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ── Stars ──
const STAR_COUNT = 250;
const stars = Array.from({ length: STAR_COUNT }, () => ({
  x: Math.random() * W,
  y: Math.random() * H * 0.7,
  size: 0.3 + Math.random() * 1.5,
  twinkleSpeed: 0.5 + Math.random() * 2,
  twinkleOffset: Math.random() * Math.PI * 2,
  brightness: 0.3 + Math.random() * 0.7
}));

// ── Aurora Curtains ──
const CURTAIN_COUNT = 6;
const curtains = Array.from({ length: CURTAIN_COUNT }, (_, i) => ({
  baseY: H * (0.1 + i * 0.06),
  amplitude: 30 + i * 15,
  frequency: 0.002 + i * 0.0005,
  speed: 0.3 + i * 0.15,
  hue: 120 + i * 25, // green → teal → blue
  alpha: 0.015 + (CURTAIN_COUNT - i) * 0.008,
  width: 80 + i * 40,
  noiseScale: 0.003 + i * 0.001,
  noiseSpeed: 0.2 + i * 0.1
}));

// ── Dust Motes ──
const DUST_COUNT = 60;
const dusts = Array.from({ length: DUST_COUNT }, () => ({
  x: Math.random() * W,
  y: Math.random() * H,
  vx: (Math.random() - 0.5) * 0.3,
  vy: -0.1 - Math.random() * 0.3,
  size: 0.5 + Math.random() * 1.5,
  alpha: 0.1 + Math.random() * 0.3,
  hue: 120 + Math.random() * 80,
  life: Math.random()
}));

// ── Mouse ──
window.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  cursorEl.style.left = mouseX + 'px';
  cursorEl.style.top = mouseY + 'px';
  cursorEl.style.opacity = '1';
});
window.addEventListener('mouseleave', () => {
  cursorEl.style.opacity = '0';
});
window.addEventListener('click', e => {
  pulseWaves.push({
    x: e.clientX,
    y: e.clientY,
    radius: 0,
    maxRadius: 300 + Math.random() * 200,
    alpha: 0.4,
    hue: 140 + Math.random() * 60
  });
});

// ── Render ──
function drawBackground() {
  // Night sky gradient
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#020010');
  g.addColorStop(0.4, '#040818');
  g.addColorStop(0.7, '#060a12');
  g.addColorStop(1, '#030508');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

function drawStars() {
  for (const s of stars) {
    // Wrap on resize
    if (s.x > W) s.x = Math.random() * W;
    if (s.y > H * 0.7) s.y = Math.random() * H * 0.7;

    const twinkle = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(time * s.twinkleSpeed + s.twinkleOffset));
    const a = s.brightness * twinkle;

    // Mouse proximity glow
    const dx = s.x - mouseX, dy = s.y - mouseY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const mouseGlow = Math.max(0, 1 - dist / 300);

    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size + mouseGlow * 2, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200, 220, 255, ${a + mouseGlow * 0.5})`;
    ctx.fill();

    if (mouseGlow > 0.3) {
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size * 3, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(150, 200, 255, ${mouseGlow * 0.15})`;
      ctx.fill();
    }
  }
}

function drawAurora() {
  ctx.globalCompositeOperation = 'screen';

  for (const c of curtains) {
    const segments = 80;
    const segW = W / segments;

    for (let i = 0; i <= segments; i++) {
      const x = i * segW;
      const nx = x * c.noiseScale;
      const n1 = Noise.noise3D(nx, time * c.noiseSpeed, c.hue * 0.01);
      const n2 = Noise.noise3D(nx * 1.5 + 100, time * c.noiseSpeed * 0.7, c.hue * 0.02);

      // Mouse wind influence
      const dx = x - mouseX;
      const windInfluence = Math.exp(-(dx * dx) / (150000)) * 40;

      const waveY = Math.sin(x * c.frequency + time * c.speed) * c.amplitude;
      const noiseY = n1 * 50;
      const y = c.baseY + waveY + noiseY + windInfluence;

      const h = c.width + n2 * 30;

      // Vertical gradient for this column
      const grad = ctx.createLinearGradient(x, y - h * 0.3, x, y + h);
      const hue = c.hue + n1 * 30;
      grad.addColorStop(0, `hsla(${hue}, 80%, 70%, 0)`);
      grad.addColorStop(0.2, `hsla(${hue}, 85%, 60%, ${c.alpha * 0.5})`);
      grad.addColorStop(0.4, `hsla(${hue}, 90%, 55%, ${c.alpha})`);
      grad.addColorStop(0.7, `hsla(${hue + 20}, 85%, 50%, ${c.alpha * 0.6})`);
      grad.addColorStop(1, `hsla(${hue + 40}, 80%, 40%, 0)`);

      ctx.fillStyle = grad;
      ctx.fillRect(x, y - h * 0.3, segW + 1, h * 1.3);
    }
  }

  ctx.globalCompositeOperation = 'source-over';
}

function drawPulses() {
  ctx.globalCompositeOperation = 'screen';
  pulseWaves = pulseWaves.filter(pw => {
    pw.radius += 3;
    pw.alpha *= 0.97;

    if (pw.alpha < 0.005 || pw.radius > pw.maxRadius) return false;

    ctx.beginPath();
    ctx.arc(pw.x, pw.y, pw.radius, 0, Math.PI * 2);
    ctx.strokeStyle = `hsla(${pw.hue}, 80%, 60%, ${pw.alpha})`;
    ctx.lineWidth = 3;
    ctx.stroke();

    // Inner glow
    const g = ctx.createRadialGradient(pw.x, pw.y, pw.radius * 0.8, pw.x, pw.y, pw.radius);
    g.addColorStop(0, `hsla(${pw.hue}, 80%, 50%, 0)`);
    g.addColorStop(1, `hsla(${pw.hue}, 80%, 60%, ${pw.alpha * 0.3})`);
    ctx.fillStyle = g;
    ctx.fill();

    return true;
  });
  ctx.globalCompositeOperation = 'source-over';
}

function drawDust() {
  ctx.globalCompositeOperation = 'screen';
  for (const d of dusts) {
    // Noise-driven drift
    const n = Noise.noise3D(d.x * 0.005, d.y * 0.005, time * 0.3);
    d.x += d.vx + Math.cos(n * Math.PI * 2) * 0.3;
    d.y += d.vy;

    // Mouse attraction
    const dx = mouseX - d.x, dy = mouseY - d.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 200 && dist > 1) {
      d.x += dx / dist * 0.5;
      d.y += dy / dist * 0.5;
    }

    // Wrap
    if (d.y < -10) { d.y = H + 10; d.x = Math.random() * W; }
    if (d.x < -10) d.x = W + 10;
    if (d.x > W + 10) d.x = -10;

    d.life += 0.003;
    const pulse = 0.5 + 0.5 * Math.sin(d.life * 3);

    ctx.beginPath();
    ctx.arc(d.x, d.y, d.size * pulse, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${d.hue}, 70%, 70%, ${d.alpha * pulse})`;
    ctx.fill();
  }
  ctx.globalCompositeOperation = 'source-over';
}

function drawMouseGlow() {
  if (mouseX < 0) return;
  ctx.globalCompositeOperation = 'screen';
  const g = ctx.createRadialGradient(mouseX, mouseY, 0, mouseX, mouseY, 200);
  g.addColorStop(0, 'rgba(100, 255, 180, 0.03)');
  g.addColorStop(0.5, 'rgba(80, 200, 160, 0.01)');
  g.addColorStop(1, 'rgba(60, 180, 140, 0)');
  ctx.fillStyle = g;
  ctx.fillRect(mouseX - 200, mouseY - 200, 400, 400);
  ctx.globalCompositeOperation = 'source-over';
}

// ── Horizon silhouette ──
function drawHorizon() {
  ctx.fillStyle = '#020305';
  ctx.beginPath();
  ctx.moveTo(0, H);
  const segments = 100;
  for (let i = 0; i <= segments; i++) {
    const x = (i / segments) * W;
    const n = Noise.noise3D(x * 0.003, 0, 0);
    const hillH = H * 0.85 + n * H * 0.08;
    ctx.lineTo(x, hillH);
  }
  ctx.lineTo(W, H);
  ctx.closePath();
  ctx.fill();

  // Subtle tree line
  ctx.fillStyle = '#010204';
  ctx.beginPath();
  ctx.moveTo(0, H);
  for (let i = 0; i <= segments; i++) {
    const x = (i / segments) * W;
    const n = Noise.noise3D(x * 0.008, 5, 0);
    const treeH = H * 0.87 + n * H * 0.04;
    const treeSpikes = Math.sin(x * 0.15) * 3 + Math.sin(x * 0.4) * 2;
    ctx.lineTo(x, treeH + treeSpikes);
  }
  ctx.lineTo(W, H);
  ctx.closePath();
  ctx.fill();
}

// ── Loop ──
function frame() {
  time += 0.01;
  drawBackground();
  drawStars();
  drawAurora();
  drawDust();
  drawPulses();
  drawMouseGlow();
  drawHorizon();
  requestAnimationFrame(frame);
}

frame();

// Handle resize for stars
window.addEventListener('resize', () => {
  for (const s of stars) {
    s.x = Math.random() * W;
    s.y = Math.random() * H * 0.7;
  }
});
</script>
</body>
</html>
