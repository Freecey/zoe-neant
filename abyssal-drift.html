<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abyssal Drift — Zoe ✶</title>
  <script>p5.disableFriendlyErrors = true;</script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #020810; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// === Configuration ===
const CONFIG = {
  seed: 42,
  particleCount: 800,
  trailFade: 2,
  noiseScale: 0.003,
  flowStrength: 0.35,
  maxSpeed: 1.8,
  connectionDist: 90,
  connectionMinDist: 15,
  bloomDownsample: 6,
  bloomAlpha: 50,
};

// === Color Palette — Abyssal bioluminescence ===
const PALETTE = {
  bgH: 220, bgS: 80, bgB: 4,
  colors: [
    { h: 195, s: 85, b: 90 },  // bright cyan
    { h: 210, s: 70, b: 75 },  // deep blue
    { h: 330, s: 65, b: 80 },  // rose deep
    { h: 175, s: 75, b: 70 },  // teal
    { h: 260, s: 50, b: 60 },  // violet muted
    { h: 45, s: 90, b: 85 },   // warm bioluminescent accent
  ],
};

// === State ===
let particles = [];
let trailLayer, bloomBuf;
let t = 0;

// === Fractal Brownian Motion ===
function fbm(x, y, octaves, lac, gain) {
  let val = 0, amp = 1, freq = 1, sum = 0;
  for (let i = 0; i < octaves; i++) {
    val += noise(x * freq, y * freq, t * 0.3) * amp;
    sum += amp;
    amp *= gain;
    freq *= lac;
  }
  return val / sum;
}

// === Domain Warped Noise ===
function warpedNoise(x, y) {
  let q0 = fbm(x + 0.0, y + 0.0, 4, 2.0, 0.5);
  let q1 = fbm(x + 5.2, y + 1.3, 4, 2.0, 0.5);
  let r0 = fbm(x + 3.0 * q0 + 1.7, y + 3.0 * q1 + 9.2, 4, 2.0, 0.5);
  let r1 = fbm(x + 3.0 * q0 + 8.3, y + 3.0 * q1 + 2.8, 4, 2.0, 0.5);
  return fbm(x + 3.0 * r0, y + 3.0 * r1, 3, 2.0, 0.5);
}

// === Particle ===
class Particle {
  constructor() {
    this.x = random(width);
    this.y = random(height);
    this.vx = 0;
    this.vy = 0;
    this.prevX = this.x;
    this.prevY = this.y;
    this.life = 1.0;
    this.maxLife = random(300, 800);
    this.age = 0;
    this.size = random(1, 4);
    let c = PALETTE.colors[floor(random(PALETTE.colors.length))];
    this.h = c.h + random(-10, 10);
    this.s = c.s + random(-10, 10);
    this.b = c.b + random(-5, 5);
    this.depth = random(0.3, 1.0); // parallax depth
  }

  respawn() {
    this.x = random(width);
    this.y = random(height);
    this.vx = 0;
    this.vy = 0;
    this.prevX = this.x;
    this.prevY = this.y;
    this.life = 1.0;
    this.maxLife = random(300, 800);
    this.age = 0;
    let c = PALETTE.colors[floor(random(PALETTE.colors.length))];
    this.h = c.h + random(-10, 10);
    this.s = c.s + random(-10, 10);
    this.b = c.b + random(-5, 5);
    this.depth = random(0.3, 1.0);
  }

  update() {
    let nx = this.x * CONFIG.noiseScale;
    let ny = this.y * CONFIG.noiseScale;

    // Curl noise for divergence-free flow
    let eps = 0.5;
    let dndx = (warpedNoise(nx + eps, ny) - warpedNoise(nx - eps, ny)) / (2 * eps);
    let dndy = (warpedNoise(nx, ny + eps) - warpedNoise(nx, ny - eps)) / (2 * eps);

    let fx = dndy * CONFIG.flowStrength * this.depth;
    let fy = -dndx * CONFIG.flowStrength * this.depth;

    this.vx += fx;
    this.vy += fy;

    // Gentle drag
    this.vx *= 0.96;
    this.vy *= 0.96;

    // Speed limit
    let spd = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
    let maxSpd = CONFIG.maxSpeed * this.depth;
    if (spd > maxSpd) {
      this.vx = (this.vx / spd) * maxSpd;
      this.vy = (this.vy / spd) * maxSpd;
    }

    this.prevX = this.x;
    this.prevY = this.y;
    this.x += this.vx;
    this.y += this.vy;

    this.age++;
    // Fade in / out lifecycle
    let lifeRatio = this.age / this.maxLife;
    if (lifeRatio < 0.1) {
      this.life = lifeRatio / 0.1;
    } else if (lifeRatio > 0.8) {
      this.life = (1.0 - lifeRatio) / 0.2;
    } else {
      this.life = 1.0;
    }
    this.life *= this.depth;

    // Wrap edges
    if (this.x > width + 10) { this.x = -10; this.prevX = this.x; }
    if (this.x < -10) { this.x = width + 10; this.prevX = this.x; }
    if (this.y > height + 10) { this.y = -10; this.prevY = this.y; }
    if (this.y < -10) { this.y = height + 10; this.prevY = this.y; }

    if (this.age >= this.maxLife) this.respawn();
  }
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  pixelDensity(1);
  randomSeed(CONFIG.seed);
  noiseSeed(CONFIG.seed);
  colorMode(HSB, 360, 100, 100, 100);

  trailLayer = createGraphics(width, height);
  trailLayer.colorMode(HSB, 360, 100, 100, 100);
  trailLayer.background(PALETTE.bgH, PALETTE.bgS, PALETTE.bgB);

  bloomBuf = createGraphics(Math.ceil(width / CONFIG.bloomDownsample), Math.ceil(height / CONFIG.bloomDownsample));

  for (let i = 0; i < CONFIG.particleCount; i++) {
    particles.push(new Particle());
  }
}

function draw() {
  t = frameCount * 0.003;

  // === Trail fade ===
  trailLayer.noStroke();
  trailLayer.fill(PALETTE.bgH, PALETTE.bgS, PALETTE.bgB, CONFIG.trailFade);
  trailLayer.rect(0, 0, width, height);

  // === Update & draw particles ===
  for (let p of particles) {
    p.update();

    let alpha = p.life * 80;
    let strokeW = p.size * p.depth;

    // Trail line
    trailLayer.stroke(p.h, p.s, p.b, alpha);
    trailLayer.strokeWeight(strokeW);
    trailLayer.line(p.prevX, p.prevY, p.x, p.y);

    // Glow dot at head
    trailLayer.noStroke();
    trailLayer.fill(p.h, p.s * 0.6, Math.min(p.b + 15, 100), alpha * 0.4);
    trailLayer.ellipse(p.x, p.y, p.size * 3 * p.depth, p.size * 3 * p.depth);
  }

  // === Organic connections (only between nearby foreground particles) ===
  let connParticles = particles.filter(p => p.depth > 0.7);
  let maxConn = Math.min(connParticles.length, 200); // limit for perf
  for (let i = 0; i < maxConn; i++) {
    let a = connParticles[i];
    for (let j = i + 1; j < maxConn; j++) {
      let b = connParticles[j];
      let dx = a.x - b.x;
      let dy = a.y - b.y;
      let distSq = dx * dx + dy * dy;
      let maxD = CONFIG.connectionDist;
      let minD = CONFIG.connectionMinDist;
      if (distSq > maxD * maxD || distSq < minD * minD) continue;

      let dist = Math.sqrt(distSq);
      let mx = (a.x + b.x) * 0.5;
      let my = (a.y + b.y) * 0.5;
      let nx = -dy / dist;
      let ny = dx / dist;

      let warp = noise(a.x * 0.005 + t * 0.1, a.y * 0.005) - 0.5;
      let warpAmt = warp * dist * 0.4;
      let cx1 = mx + nx * warpAmt * 0.7;
      let cy1 = my + ny * warpAmt * 0.7;
      let cx2 = mx - nx * warpAmt * 0.3;
      let cy2 = my - ny * warpAmt * 0.3;

      let alpha = map(dist, minD, maxD, 8, 0) * Math.min(a.life, b.life);
      let hue = ((a.h + b.h) * 0.5) % 360;

      trailLayer.noFill();
      trailLayer.stroke(hue, 45, 55, alpha);
      trailLayer.strokeWeight(0.4);
      trailLayer.bezier(a.x, a.y, cx1, cy1, cx2, cy2, b.x, b.y);
    }
  }

  // === Composite ===
  background(PALETTE.bgH, PALETTE.bgS, PALETTE.bgB);

  // Bloom pass
  bloomBuf.clear();
  bloomBuf.image(trailLayer, 0, 0, bloomBuf.width, bloomBuf.height);
  bloomBuf.filter(BLUR, 4);

  // Draw trails
  image(trailLayer, 0, 0);

  // Additive bloom overlay
  blendMode(ADD);
  tint(255, CONFIG.bloomAlpha);
  image(bloomBuf, 0, 0, width, height);
  noTint();
  blendMode(BLEND);

  // Vignette via canvas gradient
  drawVignette();
}

function drawVignette() {
  let ctx = drawingContext;
  let cx = width / 2, cy = height / 2;
  let maxR = Math.sqrt(cx * cx + cy * cy);
  let grad = ctx.createRadialGradient(cx, cy, maxR * 0.25, cx, cy, maxR);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(0.6, 'rgba(2,8,16,0.15)');
  grad.addColorStop(1, 'rgba(2,8,16,0.9)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, width, height);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  trailLayer = createGraphics(width, height);
  trailLayer.colorMode(HSB, 360, 100, 100, 100);
  trailLayer.background(PALETTE.bgH, PALETTE.bgS, PALETTE.bgB);
  bloomBuf = createGraphics(Math.ceil(width / CONFIG.bloomDownsample), Math.ceil(height / CONFIG.bloomDownsample));
}

function keyPressed() {
  if (key === 's' || key === 'S') saveCanvas('abyssal-drift', 'png');
  if (key === 'g' || key === 'G') saveGif('abyssal-drift', 5);
  if (key === 'r' || key === 'R') {
    CONFIG.seed = floor(random(99999));
    randomSeed(CONFIG.seed);
    noiseSeed(CONFIG.seed);
    particles = [];
    for (let i = 0; i < CONFIG.particleCount; i++) {
      particles.push(new Particle());
    }
    trailLayer.background(PALETTE.bgH, PALETTE.bgS, PALETTE.bgB);
  }
}
</script>
</body>
</html>
