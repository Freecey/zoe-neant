<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucioles — Zoe ✶</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #010205; overflow: hidden; cursor: none; }
  canvas { display: block; }
  #cursor {
    position: fixed; pointer-events: none; z-index: 999;
    width: 12px; height: 12px; border-radius: 50%;
    background: radial-gradient(circle, rgba(200,255,100,0.6), transparent);
    transform: translate(-50%, -50%);
    box-shadow: 0 0 20px rgba(180,240,80,0.3);
  }
  #hint {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: rgba(120,160,80,0.35); font: 11px/1 monospace;
    letter-spacing: 0.1em; text-transform: uppercase;
    pointer-events: none; transition: opacity 3s;
  }
</style>
</head>
<body>
<div id="cursor"></div>
<div id="hint">bouge doucement · clique pour éclater</div>
<canvas id="c"></canvas>
<script>
// ─── Perlin Noise 3D ───
const Noise = (() => {
  const p = new Uint8Array(512);
  const perm = new Uint8Array(256);
  for (let i = 0; i < 256; i++) perm[i] = i;
  for (let i = 255; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [perm[i], perm[j]] = [perm[j], perm[i]];
  }
  for (let i = 0; i < 512; i++) p[i] = perm[i & 255];
  const fade = t => t * t * t * (t * (t * 6 - 15) + 10);
  const lerp = (a, b, t) => a + t * (b - a);
  const grad = (hash, x, y, z) => {
    const h = hash & 15;
    const u = h < 8 ? x : y;
    const v = h < 4 ? y : h === 12 || h === 14 ? x : z;
    return ((h & 1) === 0 ? u : -u) + ((h & 2) === 0 ? v : -v);
  };
  return {
    noise3D(x, y, z) {
      const X = Math.floor(x) & 255, Y = Math.floor(y) & 255, Z = Math.floor(z) & 255;
      x -= Math.floor(x); y -= Math.floor(y); z -= Math.floor(z);
      const u = fade(x), v = fade(y), w = fade(z);
      const A = p[X] + Y, AA = p[A] + Z, AB = p[A + 1] + Z;
      const B = p[X + 1] + Y, BA = p[B] + Z, BB = p[B + 1] + Z;
      return lerp(
        lerp(lerp(grad(p[AA], x, y, z), grad(p[BA], x - 1, y, z), u),
             lerp(grad(p[AB], x, y - 1, z), grad(p[BB], x - 1, y - 1, z), u), v),
        lerp(lerp(grad(p[AA + 1], x, y, z - 1), grad(p[BA + 1], x - 1, y, z - 1), u),
             lerp(grad(p[AB + 1], x, y - 1, z - 1), grad(p[BB + 1], x - 1, y - 1, z - 1), u), v), w);
    },
    noise2D(x, y) { return this.noise3D(x, y, 0); }
  };
})();

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const cursorEl = document.getElementById('cursor');
const hintEl = document.getElementById('hint');

let W, H;
function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize();
addEventListener('resize', resize);

let mx = W / 2, my = H / 2, mouseActive = false;
addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY; mouseActive = true;
  cursorEl.style.left = mx + 'px';
  cursorEl.style.top = my + 'px';
  if (hintEl.style.opacity !== '0') hintEl.style.opacity = '0';
});
addEventListener('touchmove', e => {
  e.preventDefault();
  mx = e.touches[0].clientX; my = e.touches[0].clientY; mouseActive = true;
}, { passive: false });

// ─── Config ───
const COUNT = 500;
const NS = 0.0015; // noise scale
const REPEL_RADIUS = 180;
const BURST_RADIUS = 250;

// ─── Firefly ───
class Firefly {
  constructor(x, y, burst) {
    this.x = x ?? Math.random() * W;
    this.y = y ?? Math.random() * H;
    this.burst = !!burst;
    if (burst) {
      const a = Math.random() * Math.PI * 2;
      const sp = 2 + Math.random() * 5;
      this.vx = Math.cos(a) * sp;
      this.vy = Math.sin(a) * sp;
      this.life = 0.5 + Math.random() * 1.2;
    } else {
      this.vx = 0; this.vy = 0;
      this.life = Infinity;
    }
    this.baseHue = 55 + Math.random() * 50; // warm yellow-green
    this.pulsePhase = Math.random() * Math.PI * 2;
    this.pulseSpeed = 0.02 + Math.random() * 0.04;
    this.size = 1.2 + Math.random() * 2.2;
    this.brightness = 0;
  }
  update(t) {
    if (this.burst) {
      this.x += this.vx; this.y += this.vy;
      this.vx *= 0.97; this.vy *= 0.97;
      this.life -= 0.016;
      this.brightness = Math.max(0, this.life) * 0.9;
      return this.life > 0;
    }
    // Noise-driven wandering
    const n = Noise.noise3D(this.x * NS, this.y * NS, t * 0.15);
    const angle = n * Math.PI * 4;
    const speed = 0.4 + (n + 1) * 0.3;
    this.vx += Math.cos(angle) * speed * 0.15;
    this.vy += Math.sin(angle) * speed * 0.15;
    // Mouse repulsion (gentle)
    const dx = this.x - mx, dy = this.y - my;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < REPEL_RADIUS && dist > 0) {
      const force = (1 - dist / REPEL_RADIUS) * 1.2;
      this.vx += (dx / dist) * force;
      this.vy += (dy / dist) * force;
    }
    // Damping
    this.vx *= 0.92; this.vy *= 0.92;
    this.x += this.vx; this.y += this.vy;
    // Wrap
    if (this.x < -20) this.x = W + 20;
    if (this.x > W + 20) this.x = -20;
    if (this.y < -20) this.y = H + 20;
    if (this.y > H + 20) this.y = -20;
    // Pulsing glow
    this.pulsePhase += this.pulseSpeed;
    const pulse = (Math.sin(this.pulsePhase) + 1) * 0.5;
    this.brightness = 0.15 + pulse * 0.7;
    // Occasionally sync pulse with neighbors (simulated via noise)
    const sync = Noise.noise2D(this.x * 0.01, t * 0.5);
    if (sync > 0.3) this.brightness *= 1.3;
    return true;
  }
  draw(ctx) {
    const a = this.brightness;
    if (a < 0.02) return;
    const hue = this.baseHue;
    // Outer glow
    const r = this.size * (4 + a * 6);
    const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r);
    g.addColorStop(0, `hsla(${hue}, 90%, 70%, ${a * 0.35})`);
    g.addColorStop(0.4, `hsla(${hue}, 80%, 50%, ${a * 0.12})`);
    g.addColorStop(1, `hsla(${hue}, 70%, 40%, 0)`);
    ctx.fillStyle = g;
    ctx.fillRect(this.x - r, this.y - r, r * 2, r * 2);
    // Core
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * (0.5 + a * 0.8), 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${hue + 10}, 60%, 90%, ${a * 0.9})`;
    ctx.fill();
  }
}

// ─── Glow Orbs (background atmosphere) ───
class GlowOrb {
  constructor() {
    this.x = Math.random() * W; this.y = Math.random() * H;
    this.vx = (Math.random() - 0.5) * 0.2;
    this.vy = (Math.random() - 0.5) * 0.2;
    this.radius = 60 + Math.random() * 120;
    this.hue = 50 + Math.random() * 70;
    this.alpha = 0.005 + Math.random() * 0.01;
    this.pulse = Math.random() * Math.PI * 2;
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    this.vx += (Math.random() - 0.5) * 0.005;
    this.vy += (Math.random() - 0.5) * 0.005;
    this.vx *= 0.995; this.vy *= 0.995;
    this.pulse += 0.008;
    if (this.x < -100) this.x = W + 100;
    if (this.x > W + 100) this.x = -100;
    if (this.y < -100) this.y = H + 100;
    if (this.y > H + 100) this.y = -100;
  }
  draw(ctx) {
    const r = this.radius + Math.sin(this.pulse) * 15;
    const a = this.alpha + Math.sin(this.pulse) * 0.003;
    const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r);
    g.addColorStop(0, `hsla(${this.hue}, 70%, 40%, ${a})`);
    g.addColorStop(1, `hsla(${this.hue}, 60%, 30%, 0)`);
    ctx.fillStyle = g;
    ctx.fillRect(this.x - r, this.y - r, r * 2, r * 2);
  }
}

// ─── Init ───
let fireflies = [];
for (let i = 0; i < COUNT; i++) fireflies.push(new Firefly());
const orbs = [];
for (let i = 0; i < 40; i++) orbs.push(new GlowOrb());

// ─── Click: burst ───
addEventListener('click', e => {
  const cx = e.clientX, cy = e.clientY;
  // Repel nearby fireflies strongly
  fireflies.forEach(f => {
    if (f.burst) return;
    const dx = f.x - cx, dy = f.y - cy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < BURST_RADIUS && dist > 0) {
      const force = (1 - dist / BURST_RADIUS) * 6;
      f.vx += (dx / dist) * force;
      f.vy += (dy / dist) * force;
    }
  });
  // Spawn burst particles
  for (let i = 0; i < 35; i++) {
    fireflies.push(new Firefly(cx, cy, true));
  }
});

// ─── Render ───
let time = 0;
function frame() {
  time += 0.016;
  // Fade (creates subtle trails)
  ctx.fillStyle = 'rgba(1, 2, 5, 0.12)';
  ctx.fillRect(0, 0, W, H);

  // Glow orbs
  ctx.globalCompositeOperation = 'screen';
  orbs.forEach(o => { o.update(); o.draw(ctx); });

  // Fireflies
  ctx.globalCompositeOperation = 'lighter';
  fireflies = fireflies.filter(f => {
    const alive = f.update(time);
    if (alive) f.draw(ctx);
    return alive;
  });

  ctx.globalCompositeOperation = 'source-over';
  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
