<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attracteur — Zoe ✶</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #040206; overflow: hidden; cursor: none; }
  canvas { display: block; }
  #cursor {
    position: fixed; pointer-events: none; z-index: 100;
    width: 16px; height: 16px; border-radius: 50%;
    border: 1px solid rgba(180,80,200,0.6);
    box-shadow: 0 0 12px rgba(180,80,200,0.3);
    transform: translate(-50%, -50%);
    transition: width 0.2s, height 0.2s;
  }
  #hint {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    color: rgba(160,100,180,0.35); font-family: Georgia, serif; font-size: 13px;
    letter-spacing: 3px; pointer-events: none;
    animation: fadeHint 7s ease-in forwards;
  }
  @keyframes fadeHint { 0%,60% { opacity: 1; } 100% { opacity: 0; } }
</style>
</head>
<body>
<div id="cursor"></div>
<div id="hint">move to morph the attractor · click to cycle type · scroll to zoom</div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const cursor = document.getElementById('cursor');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

let mouse = { x: W / 2, y: H / 2, down: false };
document.addEventListener('mousemove', e => {
  mouse.x = e.clientX; mouse.y = e.clientY;
  cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px';
});
document.addEventListener('mousedown', () => { mouse.down = true; cycleType(); });
document.addEventListener('mouseup', () => { mouse.down = false; });

let zoom = 1;
window.addEventListener('wheel', e => { zoom *= e.deltaY > 0 ? 0.95 : 1.05; zoom = Math.max(0.3, Math.min(3, zoom)); }, { passive: true });

// ─── Attractor types ───
const TYPES = [
  {
    name: 'lorenz',
    dt: 0.006,
    scale: 14,
    params: () => {
      const mx = (mouse.x / W - 0.5) * 6;
      return { sigma: 10 + mx, rho: 28, beta: 8/3 };
    },
    step: (p, c) => {
      return {
        x: p.x + c.sigma * (p.y - p.x) * c.dt,
        y: p.y + (p.x * (c.rho - p.z) - p.y) * c.dt,
        z: p.z + (p.x * p.y - c.beta * p.z) * c.dt
      };
    }
  },
  {
    name: 'aizawa',
    dt: 0.01,
    scale: 20,
    params: () => {
      const mx = (mouse.x / W - 0.5) * 0.5;
      return { a: 0.95 + mx, b: 0.7, c: 0.6, d: 3.5, e: 0.25, f: 0.1 };
    },
    step: (p, c) => {
      return {
        x: p.x + ((p.z - c.b) * p.x - c.d * p.y) * c.dt,
        y: p.y + (c.d * p.x + (p.z - c.b) * p.y) * c.dt,
        z: p.z + (c.c + c.a * p.z - Math.pow(p.z, 3) / 3 - (Math.pow(p.x, 2) + Math.pow(p.y, 2)) * (1 + c.e * p.z) + c.f * p.z * Math.pow(p.x, 3)) * c.dt
      };
    }
  },
  {
    name: 'clifford',
    dt: 1,
    scale: 0.5,
    params: () => {
      const mx = (mouse.x / W - 0.5) * 1.5;
      const my = (mouse.y / H - 0.5) * 1.5;
      return { a: -1.7 + mx, b: 1.8, c: -1.9, d: -0.4 + my * 0.5 };
    },
    step: (p, c) => {
      return {
        x: Math.sin(c.a * p.y) + c.c * Math.cos(c.a * p.x),
        y: Math.sin(c.b * p.x) + c.d * Math.cos(c.b * p.y),
        z: p.z
      };
    }
  },
  {
    name: 'halvorsen',
    dt: 0.008,
    scale: 12,
    params: () => {
      const mx = (mouse.x / W - 0.5) * 0.3;
      return { a: 1.4 + mx };
    },
    step: (p, c) => {
      return {
        x: p.x + (-c.a * p.x - 4 * p.y - 4 * p.z - Math.pow(p.y, 2)) * c.dt,
        y: p.y + (-c.a * p.y - 4 * p.z - 4 * p.x - Math.pow(p.z, 2)) * c.dt,
        z: p.z + (-c.a * p.z - 4 * p.x - 4 * p.y - Math.pow(p.x, 2)) * c.dt
      };
    }
  }
];

let typeIdx = 0;
let typeLabel = 'lorenz';
function cycleType() {
  typeIdx = (typeIdx + 1) % TYPES.length;
  typeLabel = TYPES[typeIdx].name;
  particles.forEach(p => { p.x = (Math.random() - 0.5) * 0.5; p.y = (Math.random() - 0.5) * 0.5; p.z = (Math.random() - 0.5) * 0.5; });
  ctx.fillStyle = 'rgba(4,2,6,1)';
  ctx.fillRect(0, 0, W, H);
}

// ─── Particles tracing the attractor ───
const N = 500;
const particles = [];
for (let i = 0; i < N; i++) {
  particles.push({
    x: (Math.random() - 0.5) * 0.5,
    y: (Math.random() - 0.5) * 0.5,
    z: (Math.random() - 0.5) * 0.5,
    age: Math.random() * 200,
    hueOff: Math.random() * 60
  });
}

let angle = 0;
let t = 0;

function loop() {
  t += 0.016;
  angle += 0.003;

  // Slow fade — trails persist longer
  ctx.fillStyle = 'rgba(4, 2, 6, 0.035)';
  ctx.fillRect(0, 0, W, H);

  const type = TYPES[typeIdx];
  const c = type.params();
  const cx = W / 2, cy = H / 2;
  const scale = type.scale * zoom;
  const cosA = Math.cos(angle), sinA = Math.sin(angle);

  for (const p of particles) {
    const next = type.step(p, c);
    p.x = next.x; p.y = next.y; p.z = next.z;
    p.age++;

    // 3D → 2D rotation
    const rx = p.x * cosA - p.y * sinA;
    const ry = p.x * sinA + p.y * cosA;
    const depth = (p.z + 25) / 50; // 0..1ish
    const sx = cx + rx * scale;
    const sy = cy + (p.z - 10) * scale * 0.7 + ry * scale * 0.15;

    const hue = (280 + p.hueOff + t * 8 + p.age * 0.3) % 360;
    const light = 40 + Math.max(0, Math.min(40, depth * 40));
    const alpha = 0.04 + Math.max(0, depth * 0.06);
    const size = 0.6 + Math.max(0, depth * 1.2);

    ctx.fillStyle = `hsla(${hue}, 80%, ${light}%, ${alpha})`;
    ctx.beginPath();
    ctx.arc(sx, sy, size, 0, Math.PI * 2);
    ctx.fill();
  }

  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
