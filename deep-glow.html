<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deep Glow — Abyssal Bioluminescence</title>
  <script>p5.disableFriendlyErrors = true;</script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #020510; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// === Deep Glow — Abyssal Bioluminescence ===
// Creatures of the deep: pulsing, drifting, trailing phosphorescence
// Mouse creates a gentle current that guides them

const CONFIG = {
  creatureCount: 65,
  trailFade: 3,
  currentStrength: 0.15,
  noiseScale: 0.003,
  noiseSpeed: 0.0004,
  glowPulse: 0.015,
};

// Palette: deep ocean bioluminescence
const PALETTE = {
  // Core creature colors
  cyan: [185, 75, 95],
  teal: [170, 60, 80],
  violet: [270, 50, 85],
  blue: [220, 70, 90],
  rose: [330, 40, 80],
  mint: [160, 55, 75],
  amber: [35, 60, 70],
};

const PALETTE_KEYS = Object.keys(PALETTE);

let trailLayer;
let creatures = [];
let time = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  pixelDensity(1);
  colorMode(HSB, 360, 100, 100, 100);

  trailLayer = createGraphics(width, height);
  trailLayer.pixelDensity(1);
  trailLayer.colorMode(HSB, 360, 100, 100, 100);

  for (let i = 0; i < CONFIG.creatureCount; i++) {
    creatures.push(new Creature());
  }
}

function draw() {
  time += CONFIG.noiseSpeed * deltaTime;

  // Fade trail layer — slow dissolve
  trailLayer.blendMode(REMOVE);
  trailLayer.noStroke();
  trailLayer.fill(0, 0, 0, CONFIG.trailFade);
  trailLayer.rect(0, 0, width, height);
  trailLayer.blendMode(BLEND);

  // Update and draw creatures
  for (let c of creatures) {
    c.update();
    c.drawTrail(trailLayer);
  }

  // Composite
  background(225, 80, 4);
  image(trailLayer, 0, 0);

  // Draw creatures on top (current frame only)
  for (let c of creatures) {
    c.drawBody();
  }

  // Vignette
  drawVignette();
}

function drawVignette() {
  let ctx = drawingContext;
  let cx = width / 2, cy = height / 2;
  let maxR = Math.sqrt(cx * cx + cy * cy);
  let grad = ctx.createRadialGradient(cx, cy, maxR * 0.25, cx, cy, maxR);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(0.6, 'rgba(2,5,16,0.3)');
  grad.addColorStop(1, 'rgba(2,5,16,0.9)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, width, height);
}

class Creature {
  constructor() {
    this.x = Math.random() * width;
    this.y = Math.random() * height;
    this.vx = 0;
    this.vy = 0;
    this.size = 2 + Math.random() * 6;
    this.mass = this.size * 0.5;

    // Pick a color from palette
    let col = PALETTE[PALETTE_KEYS[Math.floor(Math.random() * PALETTE_KEYS.length)]];
    this.hue = col[0] + (Math.random() - 0.5) * 20;
    this.sat = col[1] + (Math.random() - 0.5) * 15;
    this.bri = col[2] + (Math.random() - 0.5) * 10;

    // Pulse
    this.pulsePhase = Math.random() * Math.PI * 2;
    this.pulseSpeed = 0.008 + Math.random() * 0.02;

    // Tentacles (2-5)
    this.tentacleCount = 2 + Math.floor(Math.random() * 4);
    this.tentacleLen = this.size * (2 + Math.random() * 4);
    this.tentaclePhase = Math.random() * Math.PI * 2;

    // Personality
    this.drift = 0.2 + Math.random() * 0.4;
    this.noiseOffX = Math.random() * 1000;
    this.noiseOffY = Math.random() * 1000;
    this.alpha = 40 + Math.random() * 40;
  }

  update() {
    // Noise-driven drift (ocean currents)
    let nx = noise(this.x * CONFIG.noiseScale + this.noiseOffX, time);
    let ny = noise(this.y * CONFIG.noiseScale + this.noiseOffY, time + 500);
    let angle = (nx - 0.5) * Math.PI * 4 + (ny - 0.5) * Math.PI * 2;

    this.vx += Math.cos(angle) * this.drift * 0.1;
    this.vy += Math.sin(angle) * this.drift * 0.1;

    // Mouse current — gentle attraction
    if (mouseX > 0 && mouseX < width && mouseY > 0 && mouseY < height) {
      let dx = mouseX - this.x;
      let dy = mouseY - this.y;
      let d = Math.sqrt(dx * dx + dy * dy);
      if (d > 20 && d < 350) {
        let force = CONFIG.currentStrength * (1 - d / 350) / this.mass;
        this.vx += (dx / d) * force;
        this.vy += (dy / d) * force;
      }
    }

    // Damping
    this.vx *= 0.96;
    this.vy *= 0.96;

    this.x += this.vx;
    this.y += this.vy;

    // Wrap edges
    if (this.x < -20) this.x = width + 20;
    if (this.x > width + 20) this.x = -20;
    if (this.y < -20) this.y = height + 20;
    if (this.y > height + 20) this.y = -20;

    // Pulse
    this.pulsePhase += this.pulseSpeed;
  }

  drawTrail(g) {
    let pulse = Math.sin(this.pulsePhase) * 0.5 + 0.5;
    let glowSize = this.size * (0.8 + pulse * 0.6);
    let alpha = this.alpha * (0.3 + pulse * 0.4);

    // Core glow on trail layer
    g.noStroke();
    g.fill(this.hue, this.sat, this.bri, alpha * 0.4);
    g.ellipse(this.x, this.y, glowSize * 3, glowSize * 3);
    g.fill(this.hue, this.sat - 10, this.bri + 5, alpha * 0.7);
    g.ellipse(this.x, this.y, glowSize * 1.5, glowSize * 1.5);
    g.fill(this.hue, this.sat - 20, Math.min(100, this.bri + 15), alpha);
    g.ellipse(this.x, this.y, glowSize, glowSize);
  }

  drawBody() {
    let pulse = Math.sin(this.pulsePhase) * 0.5 + 0.5;
    let glowSize = this.size * (0.8 + pulse * 0.6);

    // Tentacles
    let tPhase = this.pulsePhase * 0.5;
    let velAngle = Math.atan2(this.vy, this.vx);
    for (let i = 0; i < this.tentacleCount; i++) {
      let spread = (i / (this.tentacleCount - 1) - 0.5) * Math.PI * 0.8;
      let baseAngle = velAngle + Math.PI + spread;
      let sway = Math.sin(tPhase + i * 1.2) * 0.3;

      let segments = 5;
      let prevX = this.x;
      let prevY = this.y;

      for (let s = 1; s <= segments; s++) {
        let t = s / segments;
        let len = this.tentacleLen * t;
        let waveAngle = baseAngle + sway * t * 2 + Math.sin(tPhase + s * 0.5) * 0.4 * t;
        let tx = this.x + Math.cos(waveAngle) * len;
        let ty = this.y + Math.sin(waveAngle) * len;

        let alpha = (1 - t) * 30 * (0.5 + pulse * 0.5);
        stroke(this.hue, this.sat, this.bri, alpha);
        strokeWeight(Math.max(0.3, (1 - t) * this.size * 0.3));
        line(prevX, prevY, tx, ty);
        prevX = tx;
        prevY = ty;
      }
    }
    noStroke();

    // Outer glow
    fill(this.hue, this.sat, this.bri, 8 + pulse * 12);
    ellipse(this.x, this.y, glowSize * 5, glowSize * 5);

    // Mid glow
    fill(this.hue, this.sat - 10, this.bri + 5, 15 + pulse * 20);
    ellipse(this.x, this.y, glowSize * 2.5, glowSize * 2.5);

    // Inner bright core
    fill(this.hue, this.sat - 30, Math.min(100, this.bri + 20), 40 + pulse * 35);
    ellipse(this.x, this.y, glowSize, glowSize);

    // Hot center
    fill(this.hue, this.sat - 50, Math.min(100, this.bri + 40), 60 + pulse * 40);
    ellipse(this.x, this.y, glowSize * 0.4, glowSize * 0.4);
  }
}

function windowResized() {
  let oldTrail = trailLayer;
  resizeCanvas(windowWidth, windowHeight);
  trailLayer = createGraphics(width, height);
  trailLayer.pixelDensity(1);
  trailLayer.colorMode(HSB, 360, 100, 100, 100);
  // Copy old trails
  trailLayer.image(oldTrail, 0, 0);
}

function keyPressed() {
  if (key === 's' || key === 'S') saveCanvas('deep-glow', 'png');
  if (key === 'g' || key === 'G') saveGif('deep-glow', 5);
  if (key === ' ') {
    // Respawn all creatures
    creatures = [];
    for (let i = 0; i < CONFIG.creatureCount; i++) {
      creatures.push(new Creature());
    }
    trailLayer.clear();
  }
}
</script>
</body>
</html>
