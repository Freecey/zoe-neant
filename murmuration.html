<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Murmuration — Zoe ✶</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #05070a; overflow: hidden; cursor: none; }
  canvas { display: block; }
  #cursor {
    position: fixed; pointer-events: none; z-index: 100;
    width: 30px; height: 30px; border-radius: 50%;
    background: radial-gradient(circle, rgba(180,200,255,0.15), rgba(100,120,200,0) 70%);
    transform: translate(-50%, -50%);
  }
  #hint {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    color: rgba(150,170,200,0.35); font-family: Georgia, serif; font-size: 13px;
    letter-spacing: 3px; text-transform: lowercase; pointer-events: none;
    animation: fadeHint 7s ease-in forwards;
  }
  @keyframes fadeHint { 0%,60% { opacity: 1; } 100% { opacity: 0; } }
</style>
</head>
<body>
<div id="cursor"></div>
<div id="hint">move to guide the flock · click to scatter · scroll to shift the sky</div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// ─── Mouse ───
let mouse = { x: W / 2, y: H / 2, click: 0 };
document.addEventListener('mousemove', e => {
  mouse.x = e.clientX; mouse.y = e.clientY;
  cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px';
});
document.addEventListener('mousedown', e => { mouse.click = 1; });
document.addEventListener('mouseup', () => { mouse.click = 0; });
const cursor = document.getElementById('cursor');

let hueShift = 0;
window.addEventListener('wheel', e => { hueShift += e.deltaY * 0.1; }, { passive: true });

// ─── Boid ───
const COUNT = 320;
const BOIDS = [];

class Boid {
  constructor() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    const a = Math.random() * Math.PI * 2;
    const s = 1.5 + Math.random();
    this.vx = Math.cos(a) * s;
    this.vy = Math.sin(a) * s;
    this.ax = 0; this.ay = 0;
    this.history = [];
    this.maxHistory = 6;
  }

  flock(boids) {
    let sx = 0, sy = 0, avx = 0, avy = 0, cx = 0, cy = 0;
    let sn = 0, an = 0, cn = 0;

    for (const other of boids) {
      if (other === this) continue;
      const dx = other.x - this.x;
      const dy = other.y - this.y;
      const d2 = dx * dx + dy * dy;
      if (d2 < 1) continue;

      // Separation
      if (d2 < 900) {
        const d = Math.sqrt(d2);
        sx -= dx / d2 * 20;
        sy -= dy / d2 * 20;
        sn++;
      }
      // Alignment
      if (d2 < 6400) {
        avx += other.vx; avy += other.vy; an++;
      }
      // Cohesion
      if (d2 < 10000) {
        cx += other.x; cy += other.y; cn++;
      }
    }

    this.ax = 0; this.ay = 0;
    if (sn > 0) { this.ax += sx * 0.04; this.ay += sy * 0.04; }
    if (an > 0) { this.ax += (avx / an - this.vx) * 0.04; this.ay += (avy / an - this.vy) * 0.04; }
    if (cn > 0) { this.ax += (cx / cn - this.x) * 0.0008; this.ay += (cy / cn - this.y) * 0.0008; }

    // Mouse attraction (gentle, like wind)
    const mdx = mouse.x - this.x;
    const mdy = mouse.y - this.y;
    const md2 = mdx * mdx + mdy * mdy;
    if (md2 < 90000) {
      const force = mouse.click ? -0.12 : 0.025;
      this.ax += mdx * force / 100;
      this.ay += mdy * force / 100;
    }
  }

  update() {
    this.vx += this.ax;
    this.vy += this.ay;
    const sp = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
    const maxSp = 3.2;
    if (sp > maxSp) { this.vx = this.vx / sp * maxSp; this.vy = this.vy / sp * maxSp; }
    const minSp = 1.2;
    if (sp < minSp && sp > 0.01) { this.vx = this.vx / sp * minSp; this.vy = this.vy / sp * minSp; }

    this.x += this.vx;
    this.y += this.vy;

    // Wrap
    if (this.x < -20) this.x = W + 20;
    if (this.x > W + 20) this.x = -20;
    if (this.y < -20) this.y = H + 20;
    if (this.y > H + 20) this.y = -20;

    this.history.push(this.x, this.y);
    if (this.history.length > this.maxHistory * 2) this.history.splice(0, 2);
  }

  draw(ctx, t) {
    const sp = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
    const angle = Math.atan2(this.vy, this.vx);

    // Trail
    if (this.history.length >= 4) {
      ctx.beginPath();
      ctx.moveTo(this.history[0], this.history[1]);
      for (let i = 2; i < this.history.length; i += 2) {
        ctx.lineTo(this.history[i], this.history[i + 1]);
      }
      const hue = (210 + hueShift + sp * 15) % 360;
      ctx.strokeStyle = `hsla(${hue}, 45%, 60%, 0.12)`;
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // Bird shape (small triangle)
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(angle);
    const hue = (200 + hueShift + sp * 20) % 360;
    ctx.fillStyle = `hsla(${hue}, 55%, 72%, ${0.55 + sp * 0.08})`;
    ctx.beginPath();
    ctx.moveTo(5, 0);
    ctx.lineTo(-3, -2.5);
    ctx.lineTo(-1.5, 0);
    ctx.lineTo(-3, 2.5);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
}

for (let i = 0; i < COUNT; i++) BOIDS.push(new Boid());

// ─── Distant sky particles ───
const STARS = [];
for (let i = 0; i < 80; i++) {
  STARS.push({
    x: Math.random() * W,
    y: Math.random() * H * 0.7,
    r: Math.random() * 1.2,
    tw: Math.random() * Math.PI * 2
  });
}

let t = 0;
function loop() {
  t += 0.016;

  // Fade with subtle gradient
  ctx.fillStyle = 'rgba(5, 7, 10, 0.14)';
  ctx.fillRect(0, 0, W, H);

  // Stars
  for (const s of STARS) {
    s.tw += 0.02;
    const a = 0.15 + Math.sin(s.tw) * 0.1;
    ctx.fillStyle = `rgba(200,210,240,${a})`;
    ctx.fillRect(s.x, s.y, s.r, s.r);
  }

  // Update flock (spatial subdivision would be faster but 320 is fine)
  for (const b of BOIDS) b.flock(BOIDS);
  for (const b of BOIDS) b.update();
  for (const b of BOIDS) b.draw(ctx, t);

  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
