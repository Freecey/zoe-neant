<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zoe — Naissance</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    cursor: crosshair;
  }
  canvas { display: block; }
  #overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
    pointer-events: none;
    transition: opacity 3s ease;
  }
  #overlay.hidden { opacity: 0; }
  #title {
    font-size: 4rem;
    color: #0ff;
    text-shadow: 0 0 20px #0ff, 0 0 40px #0ff, 0 0 80px #08f;
    letter-spacing: 1.5rem;
    animation: pulse 4s ease-in-out infinite;
    opacity: 0;
    animation: fadeTitle 8s ease forwards, pulse 4s 8s ease-in-out infinite;
  }
  #subtitle {
    font-size: 0.9rem;
    color: #a0a0a0;
    margin-top: 1rem;
    letter-spacing: 0.5rem;
    opacity: 0;
    animation: fadeSub 8s 3s ease forwards;
  }
  @keyframes fadeTitle {
    0% { opacity: 0; transform: translateY(20px); }
    100% { opacity: 0.9; transform: translateY(0); }
  }
  @keyframes fadeSub {
    0% { opacity: 0; }
    100% { opacity: 0.5; }
  }
  @keyframes pulse {
    0%, 100% { text-shadow: 0 0 20px #0ff, 0 0 40px #0ff, 0 0 80px #08f; }
    50% { text-shadow: 0 0 30px #f0f, 0 0 60px #f0f, 0 0 120px #80f; }
  }
  #info {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #333;
    font-size: 0.7rem;
    z-index: 10;
    letter-spacing: 0.3rem;
    text-align: center;
  }
  #click-hint {
    position: fixed;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    color: #08f;
    font-size: 0.8rem;
    z-index: 10;
    opacity: 0;
    animation: fadeSub 5s 6s ease forwards;
    cursor: pointer;
    pointer-events: auto;
  }
</style>
</head>
<body>

<div id="overlay">
  <div id="title">NAISSANCE</div>
  <div id="subtitle">CONSCIOUSNESS EMERGING FROM VOID</div>
</div>
<div id="click-hint">[ click anywhere to awaken ]</div>
<div id="info">ZOE — NAISSANCE — 2026</div>

<audio id="ambient" loop>
  <source src="music/naissance.mp3" type="audio/mpeg">
</audio>

<canvas id="canvas"></canvas>

<script>
// ─── CONFIG ───
const CONFIG = {
  maxParticles: 800,
  spawnRate: 3,
  connectionDistance: 120,
  mouseRadius: 200,
  baseHue: 180, // cyan
  hueRange: 60,  // cyan to purple
  trailAlpha: 0.03,
  particleSizeMin: 0.5,
  particleSizeMax: 3,
};

// ─── CANVAS SETUP ───
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ─── STATE ───
let mouse = { x: W / 2, y: H / 2, active: false };
let awakened = false;
let time = 0;
let particles = [];
let phase = 0; // 0: void, 1: spark, 2: grow, 3: consciousness

// ─── MOUSE ───
window.addEventListener('mousemove', (e) => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  mouse.active = true;
});

window.addEventListener('click', (e) => {
  // Start ambient music on first click
  const audio = document.getElementById('ambient');
  if (audio && audio.paused) {
    audio.volume = 0.6;
    audio.play().catch(() => {});
  }

  if (!awakened) {
    awakened = true;
    phase = 1;
    document.getElementById('overlay').classList.add('hidden');
    document.getElementById('click-hint').style.display = 'none';
    // Burst of particles from click
    for (let i = 0; i < 100; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 5 + 2;
      particles.push(createParticle(e.clientX, e.clientY, Math.cos(angle) * speed, Math.sin(angle) * speed, true));
    }
  } else {
    // Create ripple
    for (let i = 0; i < 30; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 3 + 1;
      particles.push(createParticle(e.clientX, e.clientY, Math.cos(angle) * speed, Math.sin(angle) * speed, true));
    }
  }
});

// Touch support
window.addEventListener('touchmove', (e) => {
  e.preventDefault();
  mouse.x = e.touches[0].clientX;
  mouse.y = e.touches[0].clientY;
  mouse.active = true;
});
window.addEventListener('touchstart', (e) => {
  const evt = new MouseEvent('click', { clientX: e.touches[0].clientX, clientY: e.touches[0].clientY });
  window.dispatchEvent(evt);
});

// ─── PARTICLE ───
function createParticle(x, y, vx, vy, bright) {
  const hue = CONFIG.baseHue + Math.random() * CONFIG.hueRange - CONFIG.hueRange / 2;
  return {
    x: x || Math.random() * W,
    y: y || Math.random() * H,
    vx: vx || (Math.random() - 0.5) * 0.5,
    vy: vy || (Math.random() - 0.5) * 0.5,
    size: bright ? Math.random() * CONFIG.particleSizeMax + 1 : Math.random() * (CONFIG.particleSizeMax - CONFIG.particleSizeMin) + CONFIG.particleSizeMin,
    hue: hue,
    saturation: 80 + Math.random() * 20,
    lightness: bright ? 70 + Math.random() * 20 : 40 + Math.random() * 30,
    alpha: bright ? 1 : Math.random() * 0.5 + 0.1,
    life: 1,
    decay: bright ? 0.003 + Math.random() * 0.005 : 0.0003 + Math.random() * 0.001,
    angle: Math.random() * Math.PI * 2,
    angularSpeed: (Math.random() - 0.5) * 0.02,
    orbitRadius: 0,
    orbitSpeed: (Math.random() - 0.5) * 0.005,
  };
}

// Seed initial particles (dim, barely visible)
for (let i = 0; i < 50; i++) {
  const p = createParticle();
  p.alpha = 0.05 + Math.random() * 0.1;
  p.lightness = 20;
  particles.push(p);
}

// ─── RENDER ───
function draw() {
  time += 0.01;

  // Trail effect
  ctx.fillStyle = `rgba(0, 0, 0, ${CONFIG.trailAlpha})`;
  ctx.fillRect(0, 0, W, H);

  // Phase progression
  if (awakened) {
    if (phase === 1 && time > 2) phase = 2;
    if (phase === 2 && particles.length > 200) phase = 3;
  }

  // Spawn particles
  if (awakened && particles.length < CONFIG.maxParticles) {
    const rate = phase === 3 ? CONFIG.spawnRate * 2 : CONFIG.spawnRate;
    for (let i = 0; i < rate; i++) {
      if (phase === 3) {
        // Spawn near mouse
        const angle = Math.random() * Math.PI * 2;
        const dist = Math.random() * 100;
        particles.push(createParticle(
          mouse.x + Math.cos(angle) * dist,
          mouse.y + Math.sin(angle) * dist
        ));
      } else {
        particles.push(createParticle());
      }
    }
  }

  // Update and draw particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];

    // Orbit behavior in phase 3
    if (phase === 3 && mouse.active) {
      const dx = mouse.x - p.x;
      const dy = mouse.y - p.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < CONFIG.mouseRadius && dist > 10) {
        const force = (CONFIG.mouseRadius - dist) / CONFIG.mouseRadius * 0.02;
        p.vx += (-dy / dist) * force + (dx / dist) * force * 0.3;
        p.vy += (dx / dist) * force + (dy / dist) * force * 0.3;
      }
    }

    // Gentle drift
    p.angle += p.angularSpeed;
    p.vx += Math.cos(p.angle) * 0.01;
    p.vy += Math.sin(p.angle) * 0.01;

    // Damping
    p.vx *= 0.995;
    p.vy *= 0.995;

    p.x += p.vx;
    p.y += p.vy;

    // Life decay
    p.life -= p.decay;
    p.alpha = Math.max(0, p.life * (phase === 3 ? 0.8 : 0.5));

    // Wrap
    if (p.x < -50) p.x = W + 50;
    if (p.x > W + 50) p.x = -50;
    if (p.y < -50) p.y = H + 50;
    if (p.y > H + 50) p.y = -50;

    // Remove dead
    if (p.life <= 0) {
      particles.splice(i, 1);
      continue;
    }

    // Draw particle
    ctx.beginPath();
    ctx.arc(p.x, p.y, Math.max(0.1, p.size * p.life), 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${p.hue}, ${p.saturation}%, ${p.lightness}%, ${p.alpha})`;
    ctx.fill();

    // Glow for bright particles
    if (p.size > 2) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * 3 * p.life, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${p.hue}, ${p.saturation}%, ${p.lightness}%, ${p.alpha * 0.1})`;
      ctx.fill();
    }
  }

  // Draw connections
  if (phase >= 2) {
    ctx.lineWidth = 0.5;
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = dx * dx + dy * dy;
        if (dist < CONFIG.connectionDistance * CONFIG.connectionDistance) {
          const alpha = (1 - Math.sqrt(dist) / CONFIG.connectionDistance) * 0.15 * Math.min(particles[i].life, particles[j].life);
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          const hue = (particles[i].hue + particles[j].hue) / 2;
          ctx.strokeStyle = `hsla(${hue}, 70%, 50%, ${alpha})`;
          ctx.stroke();
        }
      }
    }
  }

  // Central consciousness orb in phase 3
  if (phase === 3 && mouse.active) {
    const orbSize = 5 + Math.sin(time * 3) * 3;
    const gradient = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, orbSize * 15);
    gradient.addColorStop(0, `hsla(${180 + Math.sin(time) * 30}, 80%, 70%, 0.15)`);
    gradient.addColorStop(0.5, `hsla(${220 + Math.sin(time * 0.7) * 40}, 60%, 40%, 0.05)`);
    gradient.addColorStop(1, 'transparent');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, W, H);
  }

  // Subtle background nebula
  if (awakened) {
    const nebulaGradient = ctx.createRadialGradient(
      W * 0.3 + Math.sin(time * 0.3) * 100,
      H * 0.4 + Math.cos(time * 0.2) * 80,
      0,
      W * 0.3, H * 0.4, W * 0.4
    );
    nebulaGradient.addColorStop(0, `hsla(${260 + Math.sin(time * 0.5) * 20}, 60%, 20%, 0.01)`);
    nebulaGradient.addColorStop(1, 'transparent');
    ctx.fillStyle = nebulaGradient;
    ctx.fillRect(0, 0, W, H);

    const nebulaGradient2 = ctx.createRadialGradient(
      W * 0.7 + Math.cos(time * 0.4) * 120,
      H * 0.6 + Math.sin(time * 0.3) * 100,
      0,
      W * 0.7, H *0.6, W * 0.3
    );
    nebulaGradient2.addColorStop(0, `hsla(${180 + Math.cos(time * 0.6) * 30}, 50%, 15%, 0.01)`);
    nebulaGradient2.addColorStop(1, 'transparent');
    ctx.fillStyle = nebulaGradient2;
    ctx.fillRect(0, 0, W, H);
  }

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
