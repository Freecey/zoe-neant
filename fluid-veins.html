<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fluid Veins — Zoe</title>
  <script>p5.disableFriendlyErrors = true;</script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #050505; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
const CONFIG = {
  seed: 7742,
  lineCount: 120,
  stepsPerLine: 100,
  stepSize: 3.0,
  noiseScale: 0.003,
  warpStrength: 1.8,
  baseHue: 28,
  hueSpread: 35,
  speed: 0.0006,
};

let trailLayer;
let t = 0;

function fbm(x, y, octaves) {
  let val = 0, amp = 1, freq = 1, sum = 0;
  for (let i = 0; i < octaves; i++) {
    val += noise(x * freq, y * freq) * amp;
    sum += amp;
    amp *= 0.5;
    freq *= 2.0;
  }
  return val / sum;
}

function getWarpedAngle(x, y, time) {
  let qx = fbm(x * CONFIG.noiseScale, y * CONFIG.noiseScale, 4);
  let qy = fbm(x * CONFIG.noiseScale + 5.2, y * CONFIG.noiseScale + 1.3, 4);
  let wx = x * CONFIG.noiseScale + CONFIG.warpStrength * qx * 0.01 + time * 0.3;
  let wy = y * CONFIG.noiseScale + CONFIG.warpStrength * qy * 0.01 + time * 0.2;
  return noise(wx * 2, wy * 2, time * 5) * TWO_PI * 3;
}

function setup() {
  createCanvas(1920, 1080);
  pixelDensity(1);
  randomSeed(CONFIG.seed);
  noiseSeed(CONFIG.seed);
  colorMode(HSB, 360, 100, 100, 100);

  trailLayer = createGraphics(width, height);
  trailLayer.colorMode(HSB, 360, 100, 100, 100);
  trailLayer.background(0, 0, 0);
  trailLayer.noFill();
}

function draw() {
  t += CONFIG.speed;

  // Fade trail
  trailLayer.blendMode(REMOVE);
  trailLayer.noStroke();
  trailLayer.fill(0, 0, 0, 5);
  trailLayer.rect(0, 0, width, height);
  trailLayer.blendMode(BLEND);

  // Draw warped lines
  let margin = 30;
  for (let i = 0; i < CONFIG.lineCount; i++) {
    let progress = i / CONFIG.lineCount;
    let startY = map(progress, 0, 1, margin, height - margin);
    let startX = -10;

    let lineHue = (CONFIG.baseHue + (progress - 0.5) * CONFIG.hueSpread * 2 + 360) % 360;
    let lineSat = 50 + Math.sin(progress * Math.PI) * 25;
    let lineBriBase = 45 + Math.sin(progress * Math.PI * 2) * 15;
    let lineAlpha = 30 + Math.sin(progress * Math.PI) * 20;

    let px = startX, py = startY;

    trailLayer.noFill();
    for (let s = 0; s < CONFIG.stepsPerLine; s++) {
      let angle = getWarpedAngle(px, py, t);
      let nx = px + Math.cos(angle) * CONFIG.stepSize;
      let ny = py + Math.sin(angle) * CONFIG.stepSize;

      let segFade = Math.sin((s / CONFIG.stepsPerLine) * Math.PI);
      let segBri = lineBriBase + Math.sin(s * 0.12 + t * 30) * 15;
      let segAlpha = lineAlpha * segFade;

      trailLayer.stroke(lineHue, lineSat, Math.max(0, Math.min(100, segBri)), Math.max(0, Math.min(100, segAlpha)));
      trailLayer.strokeWeight(0.7 + Math.sin(s * 0.08) * 0.3);
      trailLayer.line(px, py, nx, ny);

      px = nx;
      py = ny;
      if (px > width + 40 || py < -40 || py > height + 40) break;
    }
  }

  // Render
  background(0, 0, 2);

  // Dark radial bg
  let ctx = drawingContext;
  let cx = width / 2, cy = height / 2;
  let maxR = Math.sqrt(cx * cx + cy * cy);
  let bgGrad = ctx.createRadialGradient(cx, cy, maxR * 0.1, cx, cy, maxR);
  bgGrad.addColorStop(0, 'rgba(18,10,5,1)');
  bgGrad.addColorStop(0.5, 'rgba(10,5,2,1)');
  bgGrad.addColorStop(1, 'rgba(3,1,1,1)');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, width, height);

  // Trails
  image(trailLayer, 0, 0);

  // Soft bloom via canvas
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.globalAlpha = 0.08;
  ctx.filter = 'blur(12px)';
  ctx.drawImage(trailLayer.canvas || trailLayer.elt, 0, 0);
  ctx.restore();
  ctx.filter = 'none';
}

function keyPressed() {
  if (key === 's' || key === 'S') saveCanvas('fluid-veins', 'png');
  if (key === 'r' || key === 'R') {
    CONFIG.seed = floor(random(99999));
    randomSeed(CONFIG.seed);
    noiseSeed(CONFIG.seed);
    trailLayer.background(0, 0, 0);
  }
}
</script>
</body>
</html>
