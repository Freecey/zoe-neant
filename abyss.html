<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abyss — Zoe</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    cursor: none;
    font-family: 'Courier New', monospace;
  }
  canvas { display: block; }
  #cursor {
    position: fixed;
    width: 12px; height: 12px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 100;
    background: radial-gradient(circle, rgba(100,220,255,0.6) 0%, transparent 70%);
    transform: translate(-50%, -50%);
    mix-blend-mode: screen;
  }
  #title {
    position: fixed;
    bottom: 30px;
    right: 40px;
    color: rgba(60, 140, 180, 0.25);
    font-size: 12px;
    letter-spacing: 4px;
    text-transform: uppercase;
    pointer-events: none;
    z-index: 10;
  }
  #depth {
    position: fixed;
    top: 30px;
    left: 40px;
    color: rgba(60, 140, 180, 0.2);
    font-size: 11px;
    letter-spacing: 2px;
    pointer-events: none;
    z-index: 10;
  }
</style>
</head>
<body>
<div id="cursor"></div>
<div id="title">abyss</div>
<div id="depth">— 4000m —</div>
<canvas id="c"></canvas>

<script>
// === ABYSS — Bioluminescent deep ocean ===
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const cursor = document.getElementById('cursor');
const depthEl = document.getElementById('depth');

let W, H;
let mouse = { x: -1000, y: -1000 };
let time = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

document.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
});

document.addEventListener('touchmove', e => {
  e.preventDefault();
  mouse.x = e.touches[0].clientX;
  mouse.y = e.touches[0].clientY;
}, { passive: false });

// === Color palette ===
const palette = [
  { r: 60, g: 180, b: 255 },   // cyan
  { r: 100, g: 220, b: 255 },  // light cyan
  { r: 40, g: 120, b: 220 },   // deep blue
  { r: 120, g: 80, b: 255 },   // purple
  { r: 80, g: 255, b: 200 },   // teal
  { r: 255, g: 100, b: 180 },  // pink (rare)
  { r: 200, g: 255, b: 100 },  // green glow (rare)
];

// === Jellyfish ===
class Jellyfish {
  constructor() {
    this.reset();
  }

  reset() {
    this.x = Math.random() * W;
    this.y = H + 50 + Math.random() * 200;
    this.baseSize = 15 + Math.random() * 40;
    this.speed = 0.15 + Math.random() * 0.4;
    this.drift = (Math.random() - 0.5) * 0.3;
    this.phase = Math.random() * Math.PI * 2;
    this.pulseRate = 0.01 + Math.random() * 0.015;
    this.tentacleCount = 4 + Math.floor(Math.random() * 5);
    this.tentacleLen = this.baseSize * (1.5 + Math.random() * 2);
    this.glowIntensity = 0.3 + Math.random() * 0.5;
    this.glowPulse = Math.random() * Math.PI * 2;
    
    // Pick color — mostly blues/cyans, occasionally pink or green
    const r = Math.random();
    if (r < 0.4) this.color = palette[0];
    else if (r < 0.65) this.color = palette[1];
    else if (r < 0.8) this.color = palette[2];
    else if (r < 0.88) this.color = palette[3];
    else if (r < 0.94) this.color = palette[4];
    else if (r < 0.97) this.color = palette[5];
    else this.color = palette[6];
    
    this.opacity = 0.4 + Math.random() * 0.4;
    this.waveAmp = 5 + Math.random() * 15;
    this.waveFreq = 0.02 + Math.random() * 0.03;
    this.alive = true;
  }

  update() {
    // Float upward
    this.y -= this.speed;
    this.x += this.drift + Math.sin(time * this.waveFreq + this.phase) * 0.3;
    this.phase += this.pulseRate;
    this.glowPulse += 0.02;

    // Mouse interaction — gentle repulsion with glow boost
    const dx = this.x - mouse.x;
    const dy = this.y - mouse.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 200) {
      const force = (1 - dist / 200) * 0.5;
      this.x += dx / dist * force;
      this.y += dy / dist * force;
      this.glowIntensity = Math.min(1, this.glowIntensity + 0.02);
    } else {
      this.glowIntensity = Math.max(0.3, this.glowIntensity - 0.005);
    }

    // Reset when off screen
    if (this.y < -this.tentacleLen - 50) {
      this.reset();
    }
  }

  draw() {
    const pulse = Math.sin(this.phase) * 0.3 + 0.7;
    const glowPulse = (Math.sin(this.glowPulse) * 0.3 + 0.7) * this.glowIntensity;
    const size = this.baseSize * pulse;
    const { r, g, b } = this.color;

    ctx.save();
    ctx.translate(this.x, this.y);

    // Outer glow
    const glowSize = size * 3;
    const glow = ctx.createRadialGradient(0, 0, size * 0.2, 0, 0, glowSize);
    glow.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${0.15 * glowPulse * this.opacity})`);
    glow.addColorStop(0.5, `rgba(${r}, ${g}, ${b}, ${0.05 * glowPulse * this.opacity})`);
    glow.addColorStop(1, 'transparent');
    ctx.fillStyle = glow;
    ctx.fillRect(-glowSize, -glowSize, glowSize * 2, glowSize * 2);

    // Bell (dome)
    ctx.beginPath();
    ctx.ellipse(0, 0, size, size * 0.7, 0, Math.PI, 0, false);
    // Bottom edge with wave
    const segments = 20;
    for (let i = segments; i >= 0; i--) {
      const t = i / segments;
      const bx = -size + t * size * 2;
      const wave = Math.sin(t * Math.PI * 4 + this.phase * 3) * 3 * pulse;
      const by = wave + size * 0.1;
      ctx.lineTo(bx, by);
    }
    ctx.closePath();

    // Bell fill with gradient
    const bellGrad = ctx.createRadialGradient(0, -size * 0.3, 0, 0, 0, size);
    bellGrad.addColorStop(0, `rgba(${r + 40}, ${g + 40}, ${b + 40}, ${0.5 * glowPulse * this.opacity})`);
    bellGrad.addColorStop(0.6, `rgba(${r}, ${g}, ${b}, ${0.25 * glowPulse * this.opacity})`);
    bellGrad.addColorStop(1, `rgba(${r}, ${g}, ${b}, ${0.05 * this.opacity})`);
    ctx.fillStyle = bellGrad;
    ctx.fill();

    // Bell outline
    ctx.strokeStyle = `rgba(${r + 60}, ${g + 60}, ${b + 60}, ${0.3 * glowPulse * this.opacity})`;
    ctx.lineWidth = 1;
    ctx.stroke();

    // Inner details — radial lines
    for (let i = 0; i < 6; i++) {
      const angle = Math.PI + (i / 5) * Math.PI;
      const innerR = size * 0.2;
      const outerR = size * 0.85;
      ctx.beginPath();
      ctx.moveTo(Math.cos(angle) * innerR, Math.sin(angle) * innerR);
      ctx.lineTo(Math.cos(angle) * outerR, Math.sin(angle) * outerR);
      ctx.strokeStyle = `rgba(${r + 80}, ${g + 80}, ${b + 80}, ${0.1 * glowPulse * this.opacity})`;
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }

    // Tentacles
    for (let t = 0; t < this.tentacleCount; t++) {
      const startX = ((t / (this.tentacleCount - 1)) - 0.5) * size * 1.6;
      
      ctx.beginPath();
      ctx.moveTo(startX, size * 0.1);
      
      const segments = 15;
      let px = startX;
      let py = size * 0.1;
      
      for (let s = 1; s <= segments; s++) {
        const progress = s / segments;
        const waveOffset = Math.sin(time * 0.015 + t * 1.5 + s * 0.5 + this.phase) * (8 + progress * 12);
        const driftX = this.drift * progress * 20;
        px = startX + waveOffset + driftX;
        py = size * 0.1 + progress * this.tentacleLen * pulse;
        
        ctx.lineTo(px, py);
      }
      
      const tentAlpha = (0.2 + 0.2 * pulse) * glowPulse * this.opacity;
      ctx.strokeStyle = `rgba(${r + 30}, ${g + 30}, ${b + 30}, ${tentAlpha})`;
      ctx.lineWidth = 1.2 * (1 - 0.3 * Math.random());
      ctx.stroke();

      // Tentacle glow dots
      for (let s = 3; s <= segments; s += 3) {
        const progress = s / segments;
        const waveOffset = Math.sin(time * 0.015 + t * 1.5 + s * 0.5 + this.phase) * (8 + progress * 12);
        const driftX = this.drift * progress * 20;
        const dx = startX + waveOffset + driftX;
        const dy = size * 0.1 + progress * this.tentacleLen * pulse;
        
        const dotGlow = ctx.createRadialGradient(dx, dy, 0, dx, dy, 4);
        dotGlow.addColorStop(0, `rgba(${r + 80}, ${g + 80}, ${b + 80}, ${0.4 * glowPulse * this.opacity})`);
        dotGlow.addColorStop(1, 'transparent');
        ctx.fillStyle = dotGlow;
        ctx.fillRect(dx - 4, dy - 4, 8, 8);
      }
    }

    ctx.restore();
  }
}

// === Particules plancton ===
class Plankton {
  constructor() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.size = 0.5 + Math.random() * 2;
    this.speed = 0.1 + Math.random() * 0.3;
    this.drift = (Math.random() - 0.5) * 0.2;
    this.phase = Math.random() * Math.PI * 2;
    this.brightness = 0.1 + Math.random() * 0.5;
    this.blinkSpeed = 0.005 + Math.random() * 0.02;
    const ci = Math.floor(Math.random() * 5);
    this.color = palette[ci];
  }

  update() {
    this.y -= this.speed;
    this.x += this.drift + Math.sin(time * 0.005 + this.phase) * 0.1;
    this.phase += this.blinkSpeed;
    
    if (this.y < -10) { this.y = H + 10; this.x = Math.random() * W; }
    if (this.x < -10) this.x = W + 10;
    if (this.x > W + 10) this.x = -10;
    
    // Mouse proximity glow
    const dx = this.x - mouse.x;
    const dy = this.y - mouse.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 150) {
      this.brightness = Math.min(0.9, this.brightness + 0.05);
    }
  }

  draw() {
    const blink = (Math.sin(this.phase) * 0.5 + 0.5) * this.brightness;
    const { r, g, b } = this.color;
    
    if (blink > 0.15) {
      const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 3);
      grad.addColorStop(0, `rgba(${r + 40}, ${g + 40}, ${b + 40}, ${blink})`);
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.fillRect(this.x - this.size * 3, this.y - this.size * 3, this.size * 6, this.size * 6);
    }
    
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * 0.5, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${r + 60}, ${g + 60}, ${b + 60}, ${blink * 0.8})`;
    ctx.fill();
  }
}

// === Mouse ripples ===
const ripples = [];
class Ripple {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.radius = 0;
    this.maxRadius = 80 + Math.random() * 60;
    this.speed = 1 + Math.random() * 1.5;
    this.opacity = 0.15;
    const ci = Math.floor(Math.random() * 5);
    this.color = palette[ci];
  }
  update() {
    this.radius += this.speed;
    this.opacity = 0.15 * (1 - this.radius / this.maxRadius);
    return this.radius < this.maxRadius;
  }
  draw() {
    if (this.opacity <= 0) return;
    const { r, g, b } = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${this.opacity})`;
    ctx.lineWidth = 1;
    ctx.stroke();
  }
}

let lastRipple = 0;
document.addEventListener('mousemove', () => {
  if (time - lastRipple > 15) {
    ripples.push(new Ripple(mouse.x, mouse.y));
    lastRipple = time;
  }
});

// === Click creates burst ===
document.addEventListener('click', e => {
  for (let i = 0; i < 8; i++) {
    const r = new Ripple(e.clientX, e.clientY);
    r.maxRadius = 100 + Math.random() * 100;
    r.speed = 1.5 + Math.random() * 2;
    ripples.push(r);
  }
});

// === Spawn entities ===
const jellies = [];
const plankton = [];

for (let i = 0; i < 6; i++) {
  const j = new Jellyfish();
  j.y = Math.random() * H;
  jellies.push(j);
}
for (let i = 0; i < 120; i++) {
  plankton.push(new Plankton());
}

// === Depth indicator ===
let depth = 4000;
let depthDir = 1;

// === Light shafts from above ===
function drawLightShafts() {
  const shaftCount = 3;
  for (let i = 0; i < shaftCount; i++) {
    const x = W * 0.15 + i * W * 0.3 + Math.sin(time * 0.003 + i * 2) * 80;
    const width = 30 + Math.sin(time * 0.005 + i) * 15;
    const alpha = 0.015 + Math.sin(time * 0.004 + i * 1.5) * 0.008;
    
    const grad = ctx.createLinearGradient(x, 0, x, H * 0.7);
    grad.addColorStop(0, `rgba(60, 140, 200, ${alpha})`);
    grad.addColorStop(0.5, `rgba(40, 100, 180, ${alpha * 0.5})`);
    grad.addColorStop(1, 'transparent');
    
    ctx.beginPath();
    ctx.moveTo(x - width, 0);
    ctx.lineTo(x + width, 0);
    ctx.lineTo(x + width * 2, H * 0.7);
    ctx.lineTo(x - width * 0.5, H * 0.7);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();
  }
}

// === Background gradient ===
function drawBackground() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#010810');
  grad.addColorStop(0.3, '#020612');
  grad.addColorStop(0.7, '#010408');
  grad.addColorStop(1, '#000204');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

// === Main loop ===
function animate() {
  time++;
  
  drawBackground();
  drawLightShafts();
  
  // Update and draw plankton (behind jellies)
  for (const p of plankton) {
    p.update();
    p.draw();
  }
  
  // Update and draw ripples
  for (let i = ripples.length - 1; i >= 0; i--) {
    if (!ripples[i].update()) {
      ripples.splice(i, 1);
    } else {
      ripples[i].draw();
    }
  }
  
  // Update and draw jellies
  for (const j of jellies) {
    j.update();
    j.draw();
  }
  
  // Depth indicator slowly drifts
  depth += depthDir * 0.3;
  if (depth > 4200 || depth < 3800) depthDir *= -1;
  depthEl.textContent = `— ${Math.floor(depth)}m —`;
  
  // Vignette
  const vignette = ctx.createRadialGradient(W / 2, H / 2, W * 0.2, W / 2, H / 2, W * 0.8);
  vignette.addColorStop(0, 'transparent');
  vignette.addColorStop(1, 'rgba(0, 0, 0, 0.5)');
  ctx.fillStyle = vignette;
  ctx.fillRect(0, 0, W, H);
  
  requestAnimationFrame(animate);
}

animate();

// Mobile: spawn jellyfish on tap
document.addEventListener('touchstart', e => {
  for (let i = 0; i < 5; i++) {
    ripples.push(new Ripple(e.touches[0].clientX, e.touches[0].clientY));
  }
});
</script>
</body>
</html>
