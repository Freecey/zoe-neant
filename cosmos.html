<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zoe ✶ — Cosmos</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; cursor: none; }
  canvas { display: block; }
  #cursor {
    position: fixed; pointer-events: none; z-index: 100;
    width: 20px; height: 20px; border-radius: 50%;
    border: 1px solid rgba(180, 140, 255, 0.6);
    box-shadow: 0 0 15px rgba(140, 100, 255, 0.3), inset 0 0 8px rgba(140, 100, 255, 0.1);
    transform: translate(-50%, -50%);
    transition: width 0.2s, height 0.2s;
  }
  #info {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: rgba(180, 140, 255, 0.5); font-family: monospace; font-size: 12px;
    letter-spacing: 2px; z-index: 10; pointer-events: none;
    transition: opacity 3s;
  }
</style>
</head>
<body>
<div id="cursor"></div>
<div id="info">click to birth a star · scroll to travel · move to shift gravity</div>
<canvas id="c"></canvas>
<script>
// === NOISE (Perlin 3D, self-contained) ===
const Noise = (() => {
  const p = new Uint8Array(512);
  const perm = new Uint8Array(256);
  for (let i = 0; i < 256; i++) perm[i] = i;
  for (let i = 255; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [perm[i], perm[j]] = [perm[j], perm[i]]; }
  for (let i = 0; i < 512; i++) p[i] = perm[i & 255];
  const fade = t => t * t * t * (t * (t * 6 - 15) + 10);
  const lerp = (a, b, t) => a + t * (b - a);
  const grad3 = (hash, x, y, z) => {
    const h = hash & 15;
    const u = h < 8 ? x : y;
    const v = h < 4 ? y : h === 12 || h === 14 ? x : z;
    return ((h & 1) ? -u : u) + ((h & 2) ? -v : v);
  };
  return {
    noise3D(x, y, z) {
      const X = Math.floor(x) & 255, Y = Math.floor(y) & 255, Z = Math.floor(z) & 255;
      x -= Math.floor(x); y -= Math.floor(y); z -= Math.floor(z);
      const u = fade(x), v = fade(y), w = fade(z);
      const A = p[X] + Y, AA = p[A] + Z, AB = p[A + 1] + Z;
      const B = p[X + 1] + Y, BA = p[B] + Z, BB = p[B + 1] + Z;
      return lerp(lerp(lerp(grad3(p[AA], x, y, z), grad3(p[BA], x - 1, y, z), u),
        lerp(grad3(p[AB], x, y - 1, z), grad3(p[BB], x - 1, y - 1, z), u), v),
        lerp(lerp(grad3(p[AA + 1], x, y, z - 1), grad3(p[BA + 1], x - 1, y, z - 1), u),
        lerp(grad3(p[AB + 1], x, y - 1, z - 1), grad3(p[BB + 1], x - 1, y - 1, z - 1), u), v), w);
    }
  };
})();

// === CANVAS SETUP ===
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const cursorEl = document.getElementById('cursor');
const infoEl = document.getElementById('info');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// === STATE ===
let mouseX = W / 2, mouseY = H / 2;
let time = 0;
let zoom = 1;
let seed = Math.random() * 1000;

canvas.addEventListener('mousemove', e => {
  mouseX = e.clientX; mouseY = e.clientY;
  cursorEl.style.left = mouseX + 'px';
  cursorEl.style.top = mouseY + 'px';
});
canvas.addEventListener('wheel', e => {
  zoom = Math.max(0.3, Math.min(3, zoom + (e.deltaY > 0 ? -0.05 : 0.05)));
  e.preventDefault();
}, { passive: false });

// Fade info after 6s
setTimeout(() => { infoEl.style.opacity = '0'; }, 6000);

// === BACKGROUND STARS (static, twinkling) ===
const bgStars = [];
for (let i = 0; i < 600; i++) {
  bgStars.push({
    x: Math.random() * 4000 - 2000,
    y: Math.random() * 4000 - 2000,
    r: Math.random() * 1.5 + 0.3,
    brightness: Math.random(),
    twinkleSpeed: 0.5 + Math.random() * 2,
    hue: Math.random() < 0.3 ? 200 + Math.random() * 60 : (Math.random() < 0.5 ? 30 + Math.random() * 30 : 0),
    sat: Math.random() < 0.3 ? 20 + Math.random() * 40 : 0,
  });
}

// === NEBULA CLOUDS ===
const nebulae = [];
for (let i = 0; i < 8; i++) {
  nebulae.push({
    x: Math.random() * 3000 - 1500,
    y: Math.random() * 3000 - 1500,
    radius: 200 + Math.random() * 400,
    hue: [260, 280, 310, 340, 200, 180, 220, 160][i],
    alpha: 0.015 + Math.random() * 0.02,
    drift: Math.random() * Math.PI * 2,
    driftSpeed: 0.0003 + Math.random() * 0.0005,
  });
}

// === LIVE STARS (particles with life cycles) ===
const stars = [];
class Star {
  constructor(x, y, fromClick = false) {
    this.x = x !== undefined ? x : Math.random() * 4000 - 2000;
    this.y = y !== undefined ? y : Math.random() * 4000 - 2000;
    this.vx = (Math.random() - 0.5) * (fromClick ? 3 : 0.3);
    this.vy = (Math.random() - 0.5) * (fromClick ? 3 : 0.3);
    this.life = 1;
    this.maxLife = fromClick ? 3 + Math.random() * 5 : 10 + Math.random() * 30;
    this.decay = 1 / (this.maxLife * 60);
    this.radius = fromClick ? 1 + Math.random() * 2.5 : 0.8 + Math.random() * 2;
    this.hue = Math.random() < 0.4 ? 260 + Math.random() * 80 : (Math.random() < 0.3 ? 30 + Math.random() * 40 : 0);
    this.brightness = 60 + Math.random() * 40;
    this.pulsePhase = Math.random() * Math.PI * 2;
    this.trail = [];
    this.maxTrail = fromClick ? 12 : 6;
    this.born = fromClick;
    this.age = 0;
  }
  update(cx, cy) {
    // Gravitational pull toward mouse (in world space)
    const dx = cx - this.x;
    const dy = cy - this.y;
    const dist = Math.sqrt(dx * dx + dy * dy) + 1;
    const force = Math.min(50 / dist, 0.15);
    this.vx += (dx / dist) * force;
    this.vy += (dy / dist) * force;

    // Slight noise drift
    const n = Noise.noise3D(this.x * 0.001 + seed, this.y * 0.001, time * 0.2);
    this.vx += Math.cos(n * Math.PI * 2) * 0.02;
    this.vy += Math.sin(n * Math.PI * 2) * 0.02;

    // Damping
    this.vx *= 0.995;
    this.vy *= 0.995;

    this.x += this.vx;
    this.y += this.vy;

    // Trail
    this.trail.push({ x: this.x, y: this.y });
    if (this.trail.length > this.maxTrail) this.trail.shift();

    this.life -= this.decay;
    this.age++;
    return this.life > 0;
  }
  draw(ctx, ox, oy) {
    const sx = (this.x - ox) * zoom + W / 2;
    const sy = (this.y - oy) * zoom + H / 2;
    if (sx < -50 || sx > W + 50 || sy < -50 || sy > H + 50) return;

    const fadeIn = Math.min(1, this.age / 30);
    const fadeOut = Math.min(1, this.life / 0.3);
    const alpha = fadeIn * fadeOut;
    const pulse = 1 + Math.sin(this.pulsePhase + time * 3) * 0.2;
    const r = this.radius * zoom * pulse;

    // Trail
    if (this.trail.length > 1) {
      ctx.beginPath();
      for (let i = 0; i < this.trail.length; i++) {
        const tx = (this.trail[i].x - ox) * zoom + W / 2;
        const ty = (this.trail[i].y - oy) * zoom + H / 2;
        i === 0 ? ctx.moveTo(tx, ty) : ctx.lineTo(tx, ty);
      }
      ctx.strokeStyle = `hsla(${this.hue}, 80%, ${this.brightness}%, ${alpha * 0.15})`;
      ctx.lineWidth = r * 0.5;
      ctx.stroke();
    }

    // Glow
    const g = ctx.createRadialGradient(sx, sy, 0, sx, sy, r * 4);
    g.addColorStop(0, `hsla(${this.hue}, 80%, 95%, ${alpha * 0.6})`);
    g.addColorStop(0.3, `hsla(${this.hue}, 70%, ${this.brightness}%, ${alpha * 0.3})`);
    g.addColorStop(1, `hsla(${this.hue}, 60%, ${this.brightness}%, 0)`);
    ctx.fillStyle = g;
    ctx.fillRect(sx - r * 4, sy - r * 4, r * 8, r * 8);

    // Core
    ctx.beginPath();
    ctx.arc(sx, sy, r, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${this.hue}, 40%, 95%, ${alpha * 0.9})`;
    ctx.fill();
  }
}

// Seed initial stars
for (let i = 0; i < 120; i++) stars.push(new Star());

// === SPARK NEW STARS PERIODICALLY ===
let spawnTimer = 0;

// === CLICK TO BIRTH STARS ===
canvas.addEventListener('click', e => {
  // Convert screen to world coords
  const ox = mouseX - W / 2;
  const oy = mouseY - H / 2;
  const worldX = ox / zoom + mouseX;
  const worldY = oy / zoom + mouseY;
  for (let i = 0; i < 35; i++) {
    stars.push(new Star(worldX + (Math.random() - 0.5) * 50, worldY + (Math.random() - 0.5) * 50, true));
  }
  // Seed reset for new noise pattern
  seed += 0.5;
});

// === BLACK HOLE (subtle center effect) ===
const bh = { x: 0, y: 0, radius: 15, influence: 300 };

// === RENDER ===
function render() {
  time += 0.016;
  spawnTimer++;

  // Camera follows mouse softly
  const camX = mouseX - W / 2;
  const camY = mouseY - H / 2;

  // Clear with deep space color
  ctx.fillStyle = '#010008';
  ctx.fillRect(0, 0, W, H);

  // --- NEBULAE ---
  ctx.globalCompositeOperation = 'screen';
  nebulae.forEach(n => {
    n.drift += n.driftSpeed;
    const nx = n.x + Math.cos(n.drift) * 30;
    const ny = n.y + Math.sin(n.drift) * 30;
    const sx = (nx - camX) * zoom + W / 2;
    const sy = (ny - camY) * zoom + H / 2;
    const sr = n.radius * zoom;
    const g = ctx.createRadialGradient(sx, sy, 0, sx, sy, sr);
    const nVal = Noise.noise3D(nx * 0.005, ny * 0.005, time * 0.3);
    const hue = n.hue + nVal * 30;
    g.addColorStop(0, `hsla(${hue}, 70%, 40%, ${n.alpha * 1.5})`);
    g.addColorStop(0.4, `hsla(${hue + 20}, 60%, 30%, ${n.alpha})`);
    g.addColorStop(0.7, `hsla(${hue + 40}, 50%, 20%, ${n.alpha * 0.5})`);
    g.addColorStop(1, `hsla(${hue}, 50%, 10%, 0)`);
    ctx.fillStyle = g;
    ctx.fillRect(sx - sr, sy - sr, sr * 2, sr * 2);
  });

  // --- BACKGROUND STARS ---
  ctx.globalCompositeOperation = 'lighter';
  bgStars.forEach(s => {
    const sx = (s.x - camX) * zoom + W / 2;
    const sy = (s.y - camY) * zoom + H / 2;
    if (sx < -5 || sx > W + 5 || sy < -5 || sy > H + 5) return;
    const twinkle = 0.4 + Math.sin(time * s.twinkleSpeed + s.brightness * 10) * 0.4;
    const r = s.r * zoom;
    ctx.beginPath();
    ctx.arc(sx, sy, r, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${s.hue}, ${s.sat}%, 90%, ${twinkle})`;
    ctx.fill();
  });

  // --- BLACK HOLE (event horizon) ---
  const bhSx = (bh.x - camX) * zoom + W / 2;
  const bhSy = (bh.y - camY) * zoom + H / 2;
  const bhR = bh.radius * zoom;
  // Accretion disk glow
  const diskG = ctx.createRadialGradient(bhSx, bhSy, bhR * 2, bhSx, bhSy, bh.influence * zoom);
  diskG.addColorStop(0, `hsla(270, 80%, 60%, 0.04)`);
  diskG.addColorStop(0.3, `hsla(260, 70%, 40%, 0.02)`);
  diskG.addColorStop(1, `hsla(250, 60%, 20%, 0)`);
  ctx.fillStyle = diskG;
  ctx.fillRect(0, 0, W, H);

  // Black hole core (dark void)
  ctx.globalCompositeOperation = 'source-over';
  const voidG = ctx.createRadialGradient(bhSx, bhSy, 0, bhSx, bhSy, bhR * 3);
  voidG.addColorStop(0, '#000000');
  voidG.addColorStop(0.5, 'rgba(0, 0, 2, 0.9)');
  voidG.addColorStop(1, 'rgba(0, 0, 5, 0)');
  ctx.fillStyle = voidG;
  ctx.fillRect(bhSx - bhR * 3, bhSy - bhR * 3, bhR * 6, bhR * 6);

  // Accretion ring
  ctx.globalCompositeOperation = 'lighter';
  ctx.save();
  ctx.translate(bhSx, bhSy);
  const ringR = bhR * 4;
  for (let i = 0; i < 60; i++) {
    const angle = (i / 60) * Math.PI * 2 + time * 0.5;
    const wobble = Noise.noise3D(i * 0.5, time * 0.5, seed) * 8;
    const rx = Math.cos(angle) * (ringR + wobble);
    const ry = Math.sin(angle) * (ringR * 0.3 + wobble * 0.3);
    const dotR = (1 + Math.random() * 1.5) * zoom;
    const hue = 260 + Math.sin(angle + time) * 40;
    ctx.beginPath();
    ctx.arc(rx, ry, dotR, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${hue}, 80%, 70%, ${0.3 + Math.sin(angle * 3 + time) * 0.15})`;
    ctx.fill();
  }
  ctx.restore();

  // --- LIVE STARS ---
  ctx.globalCompositeOperation = 'lighter';
  // Gravitational center: blend black hole + mouse
  const gx = bh.x * 0.3 + camX * 0.7;
  const gy = bh.y * 0.3 + camY * 0.7;

  for (let i = stars.length - 1; i >= 0; i--) {
    if (!stars[i].update(gx, gy)) {
      stars.splice(i, 1);
    } else {
      stars[i].draw(ctx, camX, camY);
    }
  }

  // Spawn new stars
  if (spawnTimer % 15 === 0 && stars.length < 400) {
    stars.push(new Star());
  }

  // --- MOUSE GLOW ---
  ctx.globalCompositeOperation = 'screen';
  const mg = ctx.createRadialGradient(mouseX, mouseY, 0, mouseX, mouseY, 80);
  mg.addColorStop(0, `rgba(140, 100, 255, 0.03)`);
  mg.addColorStop(1, `rgba(140, 100, 255, 0)`);
  ctx.fillStyle = mg;
  ctx.fillRect(mouseX - 80, mouseY - 80, 160, 160);

  // --- DEEP SPACE VIGNETTE ---
  ctx.globalCompositeOperation = 'source-over';
  const vig = ctx.createRadialGradient(W / 2, H / 2, W * 0.3, W / 2, H / 2, W * 0.8);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,3,0.5)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);

  requestAnimationFrame(render);
}

render();

// Touch support
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  mouseX = e.touches[0].clientX;
  mouseY = e.touches[0].clientY;
  cursorEl.style.left = mouseX + 'px';
  cursorEl.style.top = mouseY + 'px';
}, { passive: false });
canvas.addEventListener('touchstart', e => {
  const t = e.touches[0];
  mouseX = t.clientX; mouseY = t.clientY;
  // Simulate click
  const ev = new MouseEvent('click', { clientX: mouseX, clientY: mouseY });
  canvas.dispatchEvent(ev);
});
</script>
</body>
</html>
