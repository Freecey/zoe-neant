<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cosmos — zoe</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  overflow: hidden;
  cursor: none;
  font-family: 'Courier New', monospace;
}
canvas {
  display: block;
  position: fixed;
  top: 0; left: 0;
}
#hud {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.15);
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  pointer-events: none;
  z-index: 10;
  transition: opacity 2s;
}
#cursor {
  position: fixed;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: white;
  pointer-events: none;
  z-index: 100;
  mix-blend-mode: screen;
  box-shadow: 0 0 20px 8px rgba(255,255,255,0.3),
              0 0 60px 20px rgba(180,120,255,0.15);
  transform: translate(-50%, -50%);
}
</style>
</head>
<body>
<div id="cursor"></div>
<div id="hud">click to create · scroll to zoom · move to bend spacetime</div>
<canvas id="cosmos"></canvas>

<script>
const canvas = document.getElementById('cosmos');
const ctx = canvas.getContext('2d');
const cursorEl = document.getElementById('cursor');
const hud = document.getElementById('hud');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// --- State ---
let mouse = { x: W/2, y: H/2, active: false };
let time = 0;
let zoom = 1;
let stars = [];
let nebulae = [];
let shootingStars = [];
let births = 0;
let deaths = 0;

// --- Star colors by "temperature" ---
const STAR_COLORS = [
  { r: 155, g: 176, b: 255 },  // O - blue
  { r: 170, g: 191, b: 255 },  // B - blue-white
  { r: 202, g: 215, b: 255 },  // A - white
  { r: 248, g: 247, b: 255 },  // F - yellow-white
  { r: 255, g: 244, b: 234 },  // G - yellow (sun-like)
  { r: 255, g: 210, b: 161 },  // K - orange
  { r: 255, g: 204, b: 111 },  // M - red
];

// --- Star class ---
class Star {
  constructor(x, y, fromClick = false) {
    this.x = x || Math.random() * W;
    this.y = y || Math.random() * H;
    this.z = Math.random(); // depth 0-1
    this.baseSize = fromClick ? (1.5 + Math.random() * 2.5) : (0.3 + Math.random() * 2);
    this.size = this.baseSize;
    this.lifespan = 800 + Math.random() * 3000; // frames
    this.age = 0;
    this.phase = 'birth'; // birth, life, death
    this.birthDuration = 60 + Math.random() * 80;
    this.deathDuration = 100 + Math.random() * 150;
    
    const temp = Math.floor(Math.random() * STAR_COLORS.length);
    this.color = STAR_COLORS[temp];
    
    this.twinkleSpeed = 0.02 + Math.random() * 0.06;
    this.twinkleOffset = Math.random() * Math.PI * 2;
    this.vx = (Math.random() - 0.5) * 0.15;
    this.vy = (Math.random() - 0.5) * 0.15;
    
    // Drift
    this.driftAngle = Math.random() * Math.PI * 2;
    this.driftSpeed = 0.05 + Math.random() * 0.2;
    this.driftRadius = 0;
    
    births++;
  }
  
  update() {
    this.age++;
    
    // Phase management
    if (this.age < this.birthDuration) {
      this.phase = 'birth';
    } else if (this.age > this.lifespan - this.deathDuration) {
      this.phase = 'death';
    } else {
      this.phase = 'life';
    }
    
    // Twinkle
    const twinkle = 0.5 + 0.5 * Math.sin(time * this.twinkleSpeed + this.twinkleOffset);
    
    // Phase scaling
    let phaseScale = 1;
    if (this.phase === 'birth') {
      phaseScale = this.age / this.birthDuration;
      phaseScale = phaseScale * phaseScale; // ease in
    } else if (this.phase === 'death') {
      const progress = (this.age - (this.lifespan - this.deathDuration)) / this.deathDuration;
      phaseScale = 1 - progress;
      // Death: expand then shrink (supernova!)
      if (progress < 0.3) {
        phaseScale = 1 + progress * 3;
      } else {
        phaseScale = Math.max(0, (1 - progress) * 1.5);
      }
    }
    
    this.size = this.baseSize * phaseScale * (0.7 + twinkle * 0.3);
    
    // Gentle drift
    this.driftRadius += this.driftSpeed * 0.01;
    this.x += this.vx + Math.cos(this.driftAngle + time * 0.001) * this.driftSpeed * 0.05;
    this.y += this.vy + Math.sin(this.driftAngle + time * 0.001) * this.driftSpeed * 0.05;
    
    // Gravity toward mouse (spacetime bending)
    if (mouse.active) {
      const dx = mouse.x - this.x;
      const dy = mouse.y - this.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > 5 && dist < 300) {
        const force = 80 / (dist * dist) * this.z;
        this.vx += (dx / dist) * force;
        this.vy += (dy / dist) * force;
      }
    }
    
    // Damping
    this.vx *= 0.998;
    this.vy *= 0.998;
    
    // Wrap
    if (this.x < -50) this.x = W + 50;
    if (this.x > W + 50) this.x = -50;
    if (this.y < -50) this.y = H + 50;
    if (this.y > H + 50) this.y = -50;
    
    return this.age < this.lifespan;
  }
  
  draw() {
    let alpha;
    if (this.phase === 'birth') {
      alpha = Math.min(1, this.age / this.birthDuration);
    } else if (this.phase === 'death') {
      const progress = (this.age - (this.lifespan - this.deathDuration)) / this.deathDuration;
      alpha = Math.max(0, 1 - progress);
    } else {
      alpha = 0.6 + 0.4 * Math.sin(time * this.twinkleSpeed + this.twinkleOffset);
    }
    
    const { r, g, b } = this.color;
    const size = Math.max(0.1, this.size);
    
    // Glow
    if (size > 0.8) {
      const glowSize = size * 6;
      const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, glowSize);
      gradient.addColorStop(0, `rgba(${r},${g},${b},${alpha * 0.15})`);
      gradient.addColorStop(0.5, `rgba(${r},${g},${b},${alpha * 0.03})`);
      gradient.addColorStop(1, `rgba(${r},${g},${b},0)`);
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(this.x, this.y, glowSize, 0, Math.PI * 2);
      ctx.fill();
    }
    
    // Star core
    ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, size, 0, Math.PI * 2);
    ctx.fill();
    
    // Bright center
    if (size > 1) {
      ctx.fillStyle = `rgba(255,255,255,${alpha * 0.8})`;
      ctx.beginPath();
      ctx.arc(this.x, this.y, size * 0.4, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

// --- Nebula (background cloud) ---
class Nebula {
  constructor() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.radius = 100 + Math.random() * 250;
    this.hue = Math.random() * 360;
    this.alpha = 0.008 + Math.random() * 0.015;
    this.drift = { x: (Math.random()-0.5) * 0.1, y: (Math.random()-0.5) * 0.1 };
    this.pulseSpeed = 0.005 + Math.random() * 0.01;
    this.pulseOffset = Math.random() * Math.PI * 2;
  }
  
  update() {
    this.x += this.drift.x;
    this.y += this.drift.y;
    if (this.x < -this.radius) this.x = W + this.radius;
    if (this.x > W + this.radius) this.x = -this.radius;
    if (this.y < -this.radius) this.y = H + this.radius;
    if (this.y > H + this.radius) this.y = -this.radius;
  }
  
  draw() {
    const pulse = 0.7 + 0.3 * Math.sin(time * this.pulseSpeed + this.pulseOffset);
    const r = this.radius * pulse;
    const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r);
    const a = this.alpha * pulse;
    gradient.addColorStop(0, `hsla(${this.hue}, 60%, 50%, ${a})`);
    gradient.addColorStop(0.4, `hsla(${this.hue + 20}, 50%, 40%, ${a * 0.5})`);
    gradient.addColorStop(1, `hsla(${this.hue}, 60%, 30%, 0)`);
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
    ctx.fill();
  }
}

// --- Shooting Star ---
class ShootingStar {
  constructor() {
    this.x = Math.random() * W;
    this.y = Math.random() * H * 0.5;
    const angle = Math.PI * 0.15 + Math.random() * Math.PI * 0.2;
    const speed = 8 + Math.random() * 12;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.life = 30 + Math.random() * 40;
    this.age = 0;
    this.tail = [];
    this.color = STAR_COLORS[Math.floor(Math.random() * 3)]; // bluish
  }
  
  update() {
    this.tail.unshift({ x: this.x, y: this.y });
    if (this.tail.length > 20) this.tail.pop();
    this.x += this.vx;
    this.y += this.vy;
    this.age++;
    return this.age < this.life;
  }
  
  draw() {
    const alpha = 1 - this.age / this.life;
    const { r, g, b } = this.color;
    
    for (let i = 0; i < this.tail.length; i++) {
      const t = 1 - i / this.tail.length;
      ctx.fillStyle = `rgba(${r},${g},${b},${alpha * t * 0.6})`;
      ctx.beginPath();
      ctx.arc(this.tail[i].x, this.tail[i].y, 1.5 * t, 0, Math.PI * 2);
      ctx.fill();
    }
    
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
    ctx.fill();
  }
}

// --- Draw constellations between nearby stars ---
function drawConstellations() {
  const maxDist = 120;
  for (let i = 0; i < stars.length; i++) {
    for (let j = i + 1; j < stars.length; j++) {
      const dx = stars[i].x - stars[j].x;
      const dy = stars[i].y - stars[j].y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < maxDist && stars[i].size > 0.8 && stars[j].size > 0.8) {
        const alpha = (1 - dist / maxDist) * 0.06;
        ctx.strokeStyle = `rgba(150,180,255,${alpha})`;
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(stars[i].x, stars[i].y);
        ctx.lineTo(stars[j].x, stars[j].y);
        ctx.stroke();
      }
    }
  }
}

// --- Spacetime grid distortion near mouse ---
function drawSpacetimeGrid() {
  if (!mouse.active) return;
  
  const gridSize = 40;
  const influence = 200;
  
  ctx.strokeStyle = 'rgba(100,100,255,0.025)';
  ctx.lineWidth = 0.5;
  
  for (let gx = 0; gx < W; gx += gridSize) {
    ctx.beginPath();
    for (let gy = 0; gy < H; gy += 4) {
      const dx = gx - mouse.x;
      const dy = gy - mouse.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      let ox = 0, oy = 0;
      if (dist < influence && dist > 5) {
        const force = (1 - dist/influence) * 25;
        ox = -(dx/dist) * force;
        oy = -(dy/dist) * force;
      }
      if (gy === 0) ctx.moveTo(gx + ox, gy + oy);
      else ctx.lineTo(gx + ox, gy + oy);
    }
    ctx.stroke();
  }
  
  for (let gy = 0; gy < H; gy += gridSize) {
    ctx.beginPath();
    for (let gx = 0; gx < W; gx += 4) {
      const dx = gx - mouse.x;
      const dy = gy - mouse.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      let ox = 0, oy = 0;
      if (dist < influence && dist > 5) {
        const force = (1 - dist/influence) * 25;
        ox = -(dx/dist) * force;
        oy = -(dy/dist) * force;
      }
      if (gx === 0) ctx.moveTo(gx + ox, gy + oy);
      else ctx.lineTo(gx + ox, gy + oy);
    }
    ctx.stroke();
  }
}

// --- Initialize ---
for (let i = 0; i < 8; i++) nebulae.push(new Nebula());
for (let i = 0; i < 120; i++) stars.push(new Star());

// --- Events ---
document.addEventListener('mousemove', (e) => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  mouse.active = true;
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top = e.clientY + 'px';
});

document.addEventListener('click', (e) => {
  // Birth a cluster of new stars
  const count = 3 + Math.floor(Math.random() * 5);
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = Math.random() * 60;
    stars.push(new Star(e.clientX + Math.cos(angle)*dist, e.clientY + Math.sin(angle)*dist, true));
  }
  
  // Chance of shooting star
  if (Math.random() < 0.4) {
    shootingStars.push(new ShootingStar());
  }
});

document.addEventListener('wheel', (e) => {
  zoom += e.deltaY * -0.001;
  zoom = Math.max(0.3, Math.min(3, zoom));
});

// Fade HUD after 6 seconds
setTimeout(() => { hud.style.opacity = '0'; }, 6000);

// --- Auto-spawn ---
setInterval(() => {
  if (stars.length < 200) {
    stars.push(new Star());
  }
  // Random shooting star
  if (Math.random() < 0.1) {
    shootingStars.push(new ShootingStar());
  }
}, 2000);

// --- Main loop ---
function animate() {
  time++;
  
  // Semi-transparent clear for trails
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  ctx.fillRect(0, 0, W, H);
  
  // Apply zoom
  ctx.save();
  ctx.translate(W/2, H/2);
  ctx.scale(zoom, zoom);
  ctx.translate(-W/2, -H/2);
  
  // Nebulae (deep background)
  nebulae.forEach(n => { n.update(); n.draw(); });
  
  // Spacetime grid
  drawSpacetimeGrid();
  
  // Constellations
  drawConstellations();
  
  // Stars
  stars = stars.filter(s => {
    const alive = s.update();
    s.draw();
    if (!alive) deaths++;
    return alive;
  });
  
  // Shooting stars
  shootingStars = shootingStars.filter(s => {
    const alive = s.update();
    s.draw();
    return alive;
  });
  
  ctx.restore();
  
  // Stats (tiny, bottom right)
  ctx.save();
  ctx.font = '9px Courier New';
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.textAlign = 'right';
  ctx.fillText(`★ ${stars.length}  ↑${births} ↓${deaths}`, W - 15, H - 15);
  ctx.restore();
  
  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
