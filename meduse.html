<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Méduse — Zoe ✶</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #010812; overflow: hidden; cursor: none; }
  canvas { display: block; }
  #cursor {
    position: fixed; pointer-events: none; z-index: 999;
    width: 16px; height: 16px; border-radius: 50%;
    border: 1.5px solid rgba(100, 220, 255, 0.5);
    transform: translate(-50%, -50%);
    box-shadow: 0 0 12px rgba(80, 180, 240, 0.3);
    transition: width 0.2s, height 0.2s;
  }
</style>
</head>
<body>
<div id="cursor"></div>
<canvas id="c"></canvas>
<script>
// ============================================================
//  MÉDUSE — Abyssal Jellyfish
//  Pure Canvas · Perlin Noise · No API
//  Zoe ✶ — Mai 2026
// ============================================================

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const cursor = document.getElementById('cursor');
let W, H, time = 0;
let mouseX = -999, mouseY = -999;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ---- Perlin Noise (compact) ----
const Noise = (() => {
  const p = new Uint8Array(512);
  const perm = new Uint8Array(256);
  for (let i = 0; i < 256; i++) perm[i] = i;
  for (let i = 255; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [perm[i], perm[j]] = [perm[j], perm[i]];
  }
  for (let i = 0; i < 512; i++) p[i] = perm[i & 255];
  const fade = t => t * t * t * (t * (t * 6 - 15) + 10);
  const lerp = (t, a, b) => a + t * (b - a);
  const grad = (hash, x, y, z) => {
    const h = hash & 15;
    const u = h < 8 ? x : y;
    const v = h < 4 ? y : (h === 12 || h === 14 ? x : z);
    return ((h & 1) ? -u : u) + ((h & 2) ? -v : v);
  };
  return {
    noise3D(x, y, z) {
      const X = Math.floor(x) & 255, Y = Math.floor(y) & 255, Z = Math.floor(z) & 255;
      x -= Math.floor(x); y -= Math.floor(y); z -= Math.floor(z);
      const u = fade(x), v = fade(y), w = fade(z);
      const A = p[X] + Y, AA = p[A] + Z, AB = p[A + 1] + Z;
      const B = p[X + 1] + Y, BA = p[B] + Z, BB = p[B + 1] + Z;
      return lerp(w,
        lerp(v, lerp(u, grad(p[AA], x, y, z), grad(p[BA], x - 1, y, z)),
                lerp(u, grad(p[AB], x, y - 1, z), grad(p[BB], x - 1, y - 1, z))),
        lerp(v, lerp(u, grad(p[AA + 1], x, y, z - 1), grad(p[BA + 1], x - 1, y, z - 1)),
                lerp(u, grad(p[AB + 1], x, y - 1, z - 1), grad(p[BB + 1], x - 1, y - 1, z - 1)))
      );
    }
  };
})();

// ---- Bioluminescent Plankton ----
class Plankton {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.size = 0.5 + Math.random() * 2;
    this.speed = 0.2 + Math.random() * 0.6;
    this.hue = 180 + Math.random() * 60; // cyan-blue
    this.alpha = 0.2 + Math.random() * 0.5;
    this.pulse = Math.random() * Math.PI * 2;
    this.pulseSpeed = 0.01 + Math.random() * 0.03;
  }
  update() {
    const n = Noise.noise3D(this.x * 0.003, this.y * 0.003, time * 0.15);
    const angle = n * Math.PI * 4;
    this.x += Math.cos(angle) * this.speed;
    this.y += Math.sin(angle) * this.speed;

    // Mouse attraction
    const dx = mouseX - this.x, dy = mouseY - this.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 200 && dist > 1) {
      this.x += (dx / dist) * 0.8;
      this.y += (dy / dist) * 0.8;
    }

    this.pulse += this.pulseSpeed;
    if (this.x < -20 || this.x > W + 20 || this.y < -20 || this.y > H + 20) this.reset();
  }
  draw() {
    const a = this.alpha * (0.5 + 0.5 * Math.sin(this.pulse));
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${this.hue}, 80%, 65%, ${a})`;
    ctx.fill();
  }
}

// ---- Méduse ----
class Jellyfish {
  constructor(x, y, size) {
    this.baseX = x;
    this.baseY = y;
    this.size = size; // bell radius
    this.tentacleCount = 8 + Math.floor(Math.random() * 6);
    this.hue = 260 + Math.random() * 60; // violet → blue
    this.pulsePhase = Math.random() * Math.PI * 2;
    this.pulseSpeed = 0.015 + Math.random() * 0.01;
    this.driftX = (Math.random() - 0.5) * 0.3;
    this.driftY = -0.1 - Math.random() * 0.3; // slowly upward
    this.tentacleSegs = 30 + Math.floor(Math.random() * 20);
    this.oralArms = 3 + Math.floor(Math.random() * 3);
  }

  update() {
    this.pulsePhase += this.pulseSpeed;
    // Gentle drift
    const noiseX = Noise.noise3D(this.baseX * 0.001, time * 0.1, 0) * 0.5;
    const noiseY = Noise.noise3D(0, this.baseY * 0.001, time * 0.1) * 0.3;
    this.baseX += this.driftX + noiseX;
    this.baseY += this.driftY + noiseY;

    // Mouse repulsion (jellyfish are shy)
    const dx = this.baseX - mouseX, dy = this.baseY - mouseY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 250 && dist > 1) {
      this.baseX += (dx / dist) * 1.2;
      this.baseY += (dy / dist) * 1.2;
    }

    // Wrap
    if (this.baseY < -this.size * 4) { this.baseY = H + this.size * 2; this.baseX = Math.random() * W; }
    if (this.baseX < -100) this.baseX = W + 80;
    if (this.baseX > W + 100) this.baseX = -80;
  }

  drawBell() {
    const pulse = Math.sin(this.pulsePhase);
    const bellW = this.size * (0.9 + pulse * 0.15);
    const bellH = this.size * (0.65 + pulse * 0.1);
    const cx = this.baseX, cy = this.baseY;

    // Outer glow
    const glowGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, this.size * 2.5);
    glowGrad.addColorStop(0, `hsla(${this.hue}, 70%, 50%, 0.06)`);
    glowGrad.addColorStop(0.5, `hsla(${this.hue + 20}, 60%, 40%, 0.02)`);
    glowGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = glowGrad;
    ctx.fillRect(cx - this.size * 3, cy - this.size * 3, this.size * 6, this.size * 6);

    // Bell shape — dome
    ctx.save();
    ctx.translate(cx, cy);

    // Main bell body
    ctx.beginPath();
    ctx.moveTo(-bellW, 0);
    // Left curve up to top
    ctx.bezierCurveTo(
      -bellW, -bellH * 1.2,
      -bellW * 0.3, -bellH * 1.8,
      0, -bellH * 1.6
    );
    // Top to right
    ctx.bezierCurveTo(
      bellW * 0.3, -bellH * 1.8,
      bellW, -bellH * 1.2,
      bellW, 0
    );
    // Bottom rim — slightly concave (pulsing)
    const rimDip = pulse * this.size * 0.08;
    ctx.bezierCurveTo(
      bellW * 0.5, rimDip,
      -bellW * 0.5, rimDip,
      -bellW, 0
    );
    ctx.closePath();

    // Gradient fill — translucent
    const bellGrad = ctx.createLinearGradient(0, -bellH * 1.6, 0, 0);
    bellGrad.addColorStop(0, `hsla(${this.hue}, 60%, 60%, 0.15)`);
    bellGrad.addColorStop(0.4, `hsla(${this.hue + 15}, 50%, 50%, 0.12)`);
    bellGrad.addColorStop(0.8, `hsla(${this.hue + 30}, 40%, 45%, 0.08)`);
    bellGrad.addColorStop(1, `hsla(${this.hue}, 50%, 55%, 0.2)`);
    ctx.fillStyle = bellGrad;
    ctx.fill();

    // Rim highlight
    ctx.strokeStyle = `hsla(${this.hue - 20}, 70%, 70%, ${0.25 + pulse * 0.1})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Inner organs (radial canals)
    for (let i = 0; i < 4; i++) {
      const angle = (Math.PI * 2 / 4) * i + pulse * 0.05;
      const innerNoise = Noise.noise3D(i * 10, time * 0.5, 0) * 3;
      ctx.beginPath();
      ctx.moveTo(0, -bellH * 0.3);
      ctx.quadraticCurveTo(
        Math.cos(angle) * bellW * 0.5 + innerNoise,
        -bellH * 0.8,
        Math.cos(angle) * bellW * 0.7,
        -bellH * 0.05
      );
      ctx.strokeStyle = `hsla(${this.hue + 20}, 50%, 65%, 0.12)`;
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    ctx.restore();
  }

  drawTentacles() {
    const cx = this.baseX, cy = this.baseY;
    const pulse = Math.sin(this.pulsePhase);
    const bellW = this.size * (0.9 + pulse * 0.15);

    for (let t = 0; t < this.tentacleCount; t++) {
      const spread = (t / (this.tentacleCount - 1)) * 2 - 1; // -1 to 1
      const startX = cx + spread * bellW * 0.85;
      const startY = cy + pulse * this.size * 0.05;

      const tentLen = this.size * (1.5 + Math.random() * 0.5);
      const segs = this.tentacleSegs;

      ctx.beginPath();
      let px = startX, py = startY;
      ctx.moveTo(px, py);

      for (let s = 1; s <= segs; s++) {
        const progress = s / segs;
        const segLen = tentLen / segs;
        const waveNoise = Noise.noise3D(
          startX * 0.01 + t * 0.5,
          s * 0.15,
          time * 0.8 + t * 0.3
        );
        const wave = waveNoise * (15 + progress * 25);
        const drift = Math.sin(time * 0.5 + t + progress * 2) * 3 * progress;

        px = startX + wave + drift;
        py = startY + segLen * s * (0.8 + 0.2 * Math.sin(time * 0.3 + t));
        ctx.lineTo(px, py);
      }

      const alpha = 0.08 + (1 - Math.abs(spread)) * 0.06;
      ctx.strokeStyle = `hsla(${this.hue + spread * 20}, 60%, 60%, ${alpha})`;
      ctx.lineWidth = 1 + (1 - Math.abs(spread)) * 0.5;
      ctx.stroke();
    }

    // Oral arms (thicker, shorter, more opaque)
    for (let a = 0; a < this.oralArms; a++) {
      const angle = (a / this.oralArms) * Math.PI - Math.PI / 2;
      const startX = cx + Math.cos(angle) * bellW * 0.3;
      const startY = cy + pulse * this.size * 0.03;
      const armLen = this.size * (1.2 + Noise.noise3D(a * 7, time * 0.2, 0) * 0.3);
      const segs = 20;

      ctx.beginPath();
      let px = startX, py = startY;
      ctx.moveTo(px, py);

      for (let s = 1; s <= segs; s++) {
        const progress = s / segs;
        const waveNoise = Noise.noise3D(
          a * 3.7,
          s * 0.2 + time * 0.6,
          a * 5
        );
        px = startX + waveNoise * 20 * progress;
        py = startY + armLen * progress;
        ctx.lineTo(px, py);
      }

      ctx.strokeStyle = `hsla(${this.hue - 10}, 50%, 55%, 0.15)`;
      ctx.lineWidth = 2.5;
      ctx.stroke();

      // Frilled edges
      for (let s = 3; s < segs; s += 2) {
        const progress = s / segs;
        const waveNoise = Noise.noise3D(a * 3.7, s * 0.2 + time * 0.6, a * 5);
        const fx = startX + waveNoise * 20 * progress;
        const fy = startY + armLen * progress;
        const frillSize = 4 + progress * 6;

        ctx.beginPath();
        ctx.arc(fx + frillSize, fy, frillSize * (0.5 + Noise.noise3D(s, time, a) * 0.3), 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${this.hue + 10}, 45%, 55%, ${0.04 + progress * 0.03})`;
        ctx.fill();
      }
    }
  }

  draw() {
    this.drawTentacles();
    this.drawBell();
  }
}

// ---- Glow Orbs (ambient) ----
class GlowOrb {
  constructor() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.vx = (Math.random() - 0.5) * 0.2;
    this.vy = (Math.random() - 0.5) * 0.2;
    this.radius = 40 + Math.random() * 80;
    this.hue = 200 + Math.random() * 60;
    this.alpha = 0.006 + Math.random() * 0.01;
    this.pulse = Math.random() * Math.PI * 2;
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    this.pulse += 0.008;
    if (this.x < -100) this.x = W + 50;
    if (this.x > W + 100) this.x = -50;
    if (this.y < -100) this.y = H + 50;
    if (this.y > H + 100) this.y = -50;
  }
  draw() {
    const r = this.radius + Math.sin(this.pulse) * 15;
    const a = this.alpha + Math.sin(this.pulse) * 0.003;
    const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r);
    g.addColorStop(0, `hsla(${this.hue}, 60%, 40%, ${a})`);
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.fillRect(this.x - r, this.y - r, r * 2, r * 2);
  }
}

// ---- Initialize ----
const planktons = Array.from({ length: 250 }, () => new Plankton());
const glowOrbs = Array.from({ length: 60 }, () => new GlowOrb());

// Spawn jellyfish — sizes and positions
const jellies = [];
const jellyCount = 5;
for (let i = 0; i < jellyCount; i++) {
  const s = 30 + Math.random() * 50;
  jellies.push(new Jellyfish(
    Math.random() * W,
    H * 0.2 + Math.random() * H * 0.7,
    s
  ));
}

// ---- Mouse ----
window.addEventListener('mousemove', e => {
  mouseX = e.clientX; mouseY = e.clientY;
  cursor.style.left = mouseX + 'px';
  cursor.style.top = mouseY + 'px';
});
window.addEventListener('touchmove', e => {
  mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY;
});

// Click — spawn a burst of plankton
canvas.addEventListener('click', e => {
  for (let i = 0; i < 40; i++) {
    const p = new Plankton();
    p.x = e.clientX + (Math.random() - 0.5) * 60;
    p.y = e.clientY + (Math.random() - 0.5) * 60;
    p.size = 1 + Math.random() * 3;
    p.alpha = 0.6;
    p.hue = 180 + Math.random() * 40;
    planktons.push(p);
  }
  // Trim excess
  while (planktons.length > 500) planktons.shift();
});

// ---- Render ----
function render() {
  time += 0.016;

  // Fade — deep ocean
  ctx.fillStyle = 'rgba(1, 8, 18, 0.12)';
  ctx.fillRect(0, 0, W, H);

  // Glow orbs (background atmosphere)
  ctx.globalCompositeOperation = 'screen';
  glowOrbs.forEach(g => { g.update(); g.draw(); });
  ctx.globalCompositeOperation = 'source-over';

  // Plankton
  ctx.globalCompositeOperation = 'lighter';
  planktons.forEach(p => { p.update(); p.draw(); });

  // Jellyfish
  jellies.forEach(j => { j.update(); j.draw(); });

  ctx.globalCompositeOperation = 'source-over';

  requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
